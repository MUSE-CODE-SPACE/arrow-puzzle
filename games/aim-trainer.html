<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aim Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#0a0a1a;color:#e2e8f0}
body{display:flex;flex-direction:column;align-items:center}

.ad-placeholder{width:100%;max-width:480px;height:50px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:12px;letter-spacing:1px;flex-shrink:0}
.ad-top{border-radius:0 0 8px 8px}
.ad-bottom{border-radius:8px 8px 0 0;margin-top:auto}

.header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0}
.back-link{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px;transition:color .2s}
.back-link:hover{color:#e2e8f0}
.title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ec4899,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.game-container{flex:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:480px;padding:0 16px;min-height:0;overflow:hidden}

/* Mode select */
.mode-select{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%;gap:12px}
.mode-title{font-size:24px;font-weight:800;margin-bottom:8px;text-align:center;background:linear-gradient(135deg,#ec4899,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mode-subtitle{font-size:14px;color:#94a3b8;margin-bottom:16px;text-align:center}
.mode-btn{width:100%;max-width:320px;padding:16px 20px;border:1px solid rgba(168,85,247,.3);background:rgba(168,85,247,.08);border-radius:14px;color:#e2e8f0;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;text-align:left}
.mode-btn:hover{background:rgba(168,85,247,.18);border-color:rgba(168,85,247,.5);transform:translateY(-2px)}
.mode-btn .mode-name{font-size:17px;margin-bottom:4px}
.mode-btn .mode-desc{font-size:12px;color:#94a3b8;font-weight:400}
.mode-best{font-size:11px;color:#a855f7;margin-top:4px;font-weight:600}

/* Stats bar */
.stats-bar{width:100%;display:flex;justify-content:space-between;padding:8px 0;flex-shrink:0;gap:4px}
.stat-item{text-align:center;flex:1}
.stat-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:16px;font-weight:800;color:#e2e8f0}
.stat-value.combo{color:#f59e0b}

/* Game area */
.aim-area{flex:1;width:100%;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;cursor:crosshair;min-height:200px}

/* Target */
.target{position:absolute;border-radius:50%;pointer-events:auto;cursor:crosshair;transform:scale(0);animation:targetAppear .15s ease-out forwards}
.target.miss{animation:targetMiss .3s ease-out forwards;pointer-events:none}
@keyframes targetAppear{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes targetMiss{0%{transform:scale(1);opacity:1}100%{transform:scale(.3);opacity:0}}

/* Precision rings */
.target .ring{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.25);top:50%;left:50%;transform:translate(-50%,-50%)}
.target .ring.r1{width:70%;height:70%}
.target .ring.r2{width:40%;height:40%}
.target .bullseye{position:absolute;width:18%;height:18%;border-radius:50%;background:rgba(255,255,255,.9);top:50%;left:50%;transform:translate(-50%,-50%)}

/* Shrink animation */
.target.shrinking{transition:width .1s linear,height .1s linear,margin-left .1s linear,margin-top .1s linear}

/* Hit particles */
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFly .5s ease-out forwards}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}

/* Score flyup */
.score-fly{position:absolute;pointer-events:none;font-weight:800;font-size:18px;animation:flyUp .7s ease-out forwards;z-index:10}
@keyframes flyUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-50px) scale(.7);opacity:0}}

/* Combo popup */
.combo-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;font-size:28px;font-weight:900;color:#f59e0b;text-shadow:0 0 20px rgba(245,158,11,.5);z-index:20;animation:comboPop .6s ease-out forwards}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0)}20%{transform:translate(-50%,-50%) scale(1.3)}40%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* Countdown */
.countdown-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,10,26,.8);z-index:30;font-size:72px;font-weight:900;color:#a855f7;border-radius:16px}
.countdown-overlay span{animation:countPulse .6s ease-out}
@keyframes countPulse{0%{transform:scale(2);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:1}}

/* Result overlay */
.result-overlay{position:fixed;inset:0;background:rgba(10,10,26,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .3s}
.result-overlay.show{opacity:1}
.result-card{background:linear-gradient(145deg,#111128,#0e0e24);border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:28px 24px;max-width:360px;width:90%;text-align:center}
.result-rating{font-size:32px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#f59e0b,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.result-stat{background:rgba(255,255,255,.04);border-radius:10px;padding:10px}
.result-stat-label{font-size:11px;color:#64748b;margin-bottom:2px}
.result-stat-value{font-size:20px;font-weight:800}
.result-best{font-size:13px;color:#a855f7;font-weight:600;margin-bottom:16px}
.result-btns{display:flex;gap:10px}
.result-btn{flex:1;padding:12px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.result-btn:hover{transform:translateY(-2px)}
.result-btn.primary{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff}
.result-btn.secondary{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}

/* Timer bar for speed mode */
.timer-bar{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:4px;flex-shrink:0;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#ec4899,#a855f7);border-radius:2px;transition:width .1s linear}

@media(max-width:380px){
  .stat-value{font-size:14px}
  .mode-btn{padding:12px 16px}
}
</style>
</head>
<body>

<div class="ad-placeholder ad-top"><span data-i18n="ad_area">광고 영역</span></div>

<div class="header">
  <a class="back-link" href="../index.html" data-i18n="back">← 메인으로</a>
  <div class="title" id="gameTitle">Aim Trainer</div>
</div>

<div class="game-container" id="gameContainer">
  <!-- Mode Select -->
  <div class="mode-select" id="modeSelect">
    <div class="mode-title" id="modeTitle">Aim Trainer</div>
    <div class="mode-subtitle" id="modeSubtitle"></div>
    <button class="mode-btn" onclick="startGame('classic')">
      <div class="mode-name" id="classicName"></div>
      <div class="mode-desc" id="classicDesc"></div>
      <div class="mode-best" id="classicBest"></div>
    </button>
    <button class="mode-btn" onclick="startGame('speed')">
      <div class="mode-name" id="speedName"></div>
      <div class="mode-desc" id="speedDesc"></div>
      <div class="mode-best" id="speedBest"></div>
    </button>
    <button class="mode-btn" onclick="startGame('precision')">
      <div class="mode-name" id="precisionName"></div>
      <div class="mode-desc" id="precisionDesc"></div>
      <div class="mode-best" id="precisionBest"></div>
    </button>
  </div>

  <!-- In-game UI -->
  <div id="gameUI" style="display:none;width:100%;flex:1;display:none;flex-direction:column;min-height:0">
    <div class="timer-bar" id="timerBar" style="display:none"><div class="timer-fill" id="timerFill"></div></div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-label" id="labelHits"></div><div class="stat-value" id="statHits">0</div></div>
      <div class="stat-item"><div class="stat-label" id="labelMisses"></div><div class="stat-value" id="statMisses">0</div></div>

      <div class="stat-item"><div class="stat-label" id="labelCombo"></div><div class="stat-value combo" id="statCombo">0</div></div>
    </div>
    <div class="aim-area" id="aimArea"></div>
  </div>
</div>

<div class="ad-placeholder ad-bottom"><span data-i18n="ad_area">광고 영역</span></div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-rating" id="resultRating"></div>
    <div style="font-size:14px;color:#94a3b8;margin-bottom:4px" id="resultMode"></div>
    <div class="result-stats" id="resultStats"></div>
    <div class="result-best" id="resultBest"></div>
    <div class="result-btns">
      <button class="result-btn secondary" onclick="backToMenu()" id="btnMenu"></button>
      <button class="result-btn secondary" onclick="shareResult()" id="btnShare"></button>
      <button class="result-btn primary" onclick="retryGame()" id="btnRetry"></button>
    </div>
  </div>
</div>

const lang = getGameLang();
const gt = getTranslations();
const t = AIM_I18N[lang] || AIM_I18N.ko;

// ===== Audio =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playHitSound() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function playMissSound() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth'; o.frequency.setValueAtTime(150, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function playComboSound(combo) {
  const base = 600 + Math.min(combo, 10) * 60;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle'; o.frequency.setValueAtTime(base, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(base * 1.5, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}

// ===== State =====
let mode = 'classic';
let hits = 0, misses = 0, combo = 0, maxCombo = 0;
let reactionTimes = [];
let precisionScores = [];
let targetCount = 0;
let totalTargets = 30;
let speedTimeLeft = 30;
let speedInterval = null;
let gameActive = false;
let currentTarget = null;
let targetSpawnTime = 0;
let shrinkTimer = null;

const aimArea = document.getElementById('aimArea');

// ===== Target colors =====
const targetGradients = [
  ['#ec4899', '#a855f7'],
  ['#f59e0b', '#ef4444'],
  ['#3b82f6', '#06b6d4'],
  ['#10b981', '#3b82f6'],
  ['#f97316', '#ec4899'],
  ['#8b5cf6', '#ec4899'],
];

// ===== Init UI =====
function initUI() {
  document.title = t.gameTitle;
  document.getElementById('gameTitle').textContent = t.gameTitle;
  document.getElementById('modeTitle').textContent = t.gameTitle;
  document.getElementById('modeSubtitle').textContent = t.subtitle;

  document.getElementById('speedDesc').textContent = t.speedDesc;
  document.getElementById('precisionName').textContent = t.precision;
  document.getElementById('precisionDesc').textContent = t.precisionDesc;
  document.getElementById('labelHits').textContent = t.hits;
  document.getElementById('labelMisses').textContent = t.misses;
  document.getElementById('labelAccuracy').textContent = t.accuracy;
  document.getElementById('labelAvgTime').textContent = t.avgTime;
  document.getElementById('labelCombo').textContent = t.combo;
  document.getElementById('btnMenu').textContent = t.menu;
  document.getElementById('btnShare').textContent = t.share;
  document.getElementById('btnRetry').textContent = t.retry;
  applyGameI18n();
  updateBestScores();
}

function updateBestScores() {
  const cb = localStorage.getItem('aim_best_classic');
  const sb = localStorage.getItem('aim_best_speed');
  const pb = localStorage.getItem('aim_best_precision');
  document.getElementById('classicBest').textContent = cb ? `${t.best}: ${cb}ms` : '';
  document.getElementById('speedBest').textContent = sb ? `${t.best}: ${sb}` : '';
  document.getElementById('precisionBest').textContent = pb ? `${t.best}: ${pb}` : '';
}

// ===== Game Start =====
function startGame(m) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  mode = m;
  hits = 0; misses = 0; combo = 0; maxCombo = 0;
  reactionTimes = []; precisionScores = []; targetCount = 0;
  speedTimeLeft = 30;

  document.getElementById('modeSelect').style.display = 'none';
  const gameUI = document.getElementById('gameUI');
  gameUI.style.display = 'flex';

  document.getElementById('timerBar').style.display = mode === 'speed' ? 'block' : 'none';
  updateStats();

  // Countdown
  showCountdown(3, () => {
    gameActive = true;
    if (mode === 'speed') startSpeedTimer();
    spawnTarget();
  });
}

function showCountdown(n, cb) {
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  aimArea.appendChild(overlay);

  let count = n;
  function tick() {
    if (count <= 0) {
      overlay.remove();
      cb();
      return;
    }
    overlay.innerHTML = `<span style="animation:countPulse .5s ease-out">${count}</span>`;
    count--;
    setTimeout(tick, 600);
  }
  tick();
}

// ===== Speed Timer =====
function startSpeedTimer() {
  const fill = document.getElementById('timerFill');
  const start = Date.now();
  const duration = 30000;
  speedInterval = setInterval(() => {
    const elapsed = Date.now() - start;
    const pct = Math.max(0, 1 - elapsed / duration) * 100;
    fill.style.width = pct + '%';
    speedTimeLeft = Math.max(0, Math.ceil((duration - elapsed) / 1000));
    if (elapsed >= duration) {
      clearInterval(speedInterval);
      speedInterval = null;
      endGame();
    }
  }, 50);
}

// ===== Spawn Target =====
function spawnTarget() {
  if (!gameActive) return;

  // Remove existing target
  if (currentTarget) {
    currentTarget.remove();
    currentTarget = null;
  }

  const rect = aimArea.getBoundingClientRect();
  const areaW = rect.width;
  const areaH = rect.height;

  // Random size
  const minSize = mode === 'precision' ? 60 : 40;
  const maxSize = mode === 'precision' ? 80 : 65;
  const size = minSize + Math.random() * (maxSize - minSize);

  // Random position with padding
  const pad = 10;
  const x = pad + Math.random() * (areaW - size - pad * 2);
  const y = pad + Math.random() * (areaH - size - pad * 2);

  // Random gradient
  const grad = targetGradients[Math.floor(Math.random() * targetGradients.length)];

  const el = document.createElement('div');
  el.className = 'target';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.background = `radial-gradient(circle at 35% 35%, ${grad[0]}, ${grad[1]})`;
  el.style.boxShadow = `0 0 20px ${grad[0]}40, 0 0 40px ${grad[1]}20`;

  // Precision rings
  if (mode === 'precision') {
    el.innerHTML = '<div class="ring r1"></div><div class="ring r2"></div><div class="bullseye"></div>';
  }

  el.addEventListener('mousedown', (e) => onTargetHit(e, el, size));
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    onTargetHit(touch, el, size);
  }, { passive: false });

  aimArea.appendChild(el);
  currentTarget = el;
  targetSpawnTime = Date.now();

  // Auto-miss timer (target disappears)
  const shrinkDuration = mode === 'speed' ? 1500 : 2500;
  if (shrinkTimer) clearTimeout(shrinkTimer);
  shrinkTimer = setTimeout(() => {
    if (currentTarget === el && gameActive) {
      onTargetMiss(el);
    }
  }, shrinkDuration);
}

// ===== Target Hit =====
function onTargetHit(e, el, size) {
  if (!gameActive || el !== currentTarget) return;

  const now = Date.now();
  const reaction = now - targetSpawnTime;
  reactionTimes.push(reaction);

  // Calculate precision score if in precision mode
  if (mode === 'precision') {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clickX = e.clientX;
    const clickY = e.clientY;
    const dist = Math.sqrt((clickX - cx) ** 2 + (clickY - cy) ** 2);
    const maxDist = size / 2;
    const score = Math.max(0, Math.round((1 - dist / maxDist) * 100));
    precisionScores.push(score);
  }

  hits++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  targetCount++;

  if (shrinkTimer) { clearTimeout(shrinkTimer); shrinkTimer = null; }

  // Effects
  playHitSound();
  spawnParticles(e.clientX, e.clientY, el);
  showScoreFly(e.clientX, e.clientY, reaction);

  if (combo >= 3) {
    playComboSound(combo);
    showComboPop(combo);
  }

  el.remove();
  currentTarget = null;
  updateStats();

  // Check end condition for classic/precision
  if ((mode === 'classic' || mode === 'precision') && targetCount >= totalTargets) {
    endGame();
  } else {
    setTimeout(spawnTarget, 200);
  }
}

// ===== Target Miss (timeout) =====
function onTargetMiss(el) {
  if (!gameActive) return;
  misses++;
  combo = 0;
  targetCount++;

  playMissSound();
  el.classList.add('miss');
  currentTarget = null;
  updateStats();

  if ((mode === 'classic' || mode === 'precision') && targetCount >= totalTargets) {
    setTimeout(endGame, 300);
  } else {
    setTimeout(spawnTarget, 400);
  }
}

// ===== Click on empty area (miss in precision/classic) =====
aimArea.addEventListener('mousedown', (e) => {
  if (!gameActive) return;
  if (e.target === aimArea) {
    misses++;
    combo = 0;
    playMissSound();
    updateStats();
  }
});
aimArea.addEventListener('touchstart', (e) => {
  if (!gameActive) return;
  if (e.target === aimArea) {
    misses++;
    combo = 0;
    playMissSound();
    updateStats();
  }
}, { passive: true });

// ===== Particles =====
function spawnParticles(cx, cy, targetEl) {
  const rect = aimArea.getBoundingClientRect();
  const colors = ['#ec4899', '#a855f7', '#f59e0b', '#3b82f6', '#10b981'];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 4 + Math.random() * 6;
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
    const dist = 30 + Math.random() * 40;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.width = s + 'px';
    p.style.height = s + 'px';
    p.style.left = (cx - rect.left) + 'px';
    p.style.top = (cy - rect.top) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.animation = `particleFly .4s ease-out forwards`;
    // Override keyframes inline with custom direction
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) scale(0)`, opacity: 0 }
    ], { duration: 400, easing: 'ease-out' });
    aimArea.appendChild(p);
    setTimeout(() => p.remove(), 400);
  }
}

// ===== Score Fly =====
function showScoreFly(cx, cy, reaction) {
  const rect = aimArea.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'score-fly';
  el.style.left = (cx - rect.left) + 'px';
  el.style.top = (cy - rect.top - 10) + 'px';

  if (mode === 'precision') {
    const score = precisionScores[precisionScores.length - 1];
    el.textContent = score + 'pts';
    el.style.color = score >= 80 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';
  } else {
    el.textContent = reaction + 'ms';
    el.style.color = reaction < 300 ? '#10b981' : reaction < 500 ? '#f59e0b' : '#ef4444';
  }

  aimArea.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// ===== Combo Pop =====
function showComboPop(c) {
  const el = document.createElement('div');
  el.className = 'combo-popup';
  el.textContent = `${c}x ${t.combo}!`;
  aimArea.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ===== Update Stats =====
function updateStats() {
  document.getElementById('statHits').textContent = hits;
  document.getElementById('statMisses').textContent = misses;
  const total = hits + misses;
  const acc = total > 0 ? Math.round((hits / total) * 100) : 100;
  document.getElementById('statAccuracy').textContent = acc + '%';
  const avg = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;
  document.getElementById('statAvgTime').textContent = avg + 'ms';
  document.getElementById('statCombo').textContent = combo;
}

// ===== End Game =====
function endGame() {
  gameActive = false;
  if (speedInterval) { clearInterval(speedInterval); speedInterval = null; }
  if (shrinkTimer) { clearTimeout(shrinkTimer); shrinkTimer = null; }
  if (currentTarget) { currentTarget.remove(); currentTarget = null; }

  const total = hits + misses;
  const acc = total > 0 ? Math.round((hits / total) * 100) : 0;
  const avgReaction = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;

  // Rating
  let rating;
  if (acc >= 95) rating = t.sharpshooter;
  else if (acc >= 85) rating = t.marksman;
  else if (acc >= 70) rating = t.good;
  else rating = t.keepPracticing;

  document.getElementById('resultRating').textContent = rating;

  // Mode label
  const modeNames = { classic: t.classic, speed: t.speed, precision: t.precision };
  document.getElementById('resultMode').textContent = modeNames[mode];

  // Stats
  let statsHtml = '';
  statsHtml += `<div class="result-stat"><div class="result-stat-label">${t.hits}</div><div class="result-stat-value">${hits}</div></div>`;
  statsHtml += `<div class="result-stat"><div class="result-stat-label">${t.accuracy}</div><div class="result-stat-value">${acc}%</div></div>`;
  statsHtml += `<div class="result-stat"><div class="result-stat-label">${t.avgReaction}</div><div class="result-stat-value">${avgReaction}ms</div></div>`;
  statsHtml += `<div class="result-stat"><div class="result-stat-label">${t.maxCombo}</div><div class="result-stat-value">${maxCombo}x</div></div>`;

  if (mode === 'precision') {
    const avgPrec = precisionScores.length > 0 ? Math.round(precisionScores.reduce((a, b) => a + b, 0) / precisionScores.length) : 0;
    statsHtml += `<div class="result-stat"><div class="result-stat-label">${t.totalScore}</div><div class="result-stat-value">${avgPrec}</div></div>`;
  }

  document.getElementById('resultStats').innerHTML = statsHtml;

  // Best score logic
  if(typeof PuzzleUser!=='undefined') PuzzleUser.recordGame('aim-trainer',{score:hits,aimAccuracy:acc});

  let scoreValue, bestKey, isNewBest = false;
  if (mode === 'classic') {
    scoreValue = avgReaction;
    bestKey = 'aim_best_classic';
    const prev = localStorage.getItem(bestKey);
    if (!prev || scoreValue < parseInt(prev)) {
      localStorage.setItem(bestKey, scoreValue);
      isNewBest = true;
    }
  } else if (mode === 'speed') {
    scoreValue = hits;
    bestKey = 'aim_best_speed';
    const prev = localStorage.getItem(bestKey);
    if (!prev || scoreValue > parseInt(prev)) {
      localStorage.setItem(bestKey, scoreValue);
      isNewBest = true;
    }
  } else {
    const avgPrec = precisionScores.length > 0 ? Math.round(precisionScores.reduce((a, b) => a + b, 0) / precisionScores.length) : 0;
    scoreValue = avgPrec;
    bestKey = 'aim_best_precision';
    const prev = localStorage.getItem(bestKey);
    if (!prev || scoreValue > parseInt(prev)) {
      localStorage.setItem(bestKey, scoreValue);
      isNewBest = true;
    }
  }

  document.getElementById('resultBest').textContent = isNewBest ? t.newBest : '';

  const overlay = document.getElementById('resultOverlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('show'));
}

// ===== Navigation =====
function backToMenu() {
  closeResult();
  document.getElementById('gameUI').style.display = 'none';
  document.getElementById('modeSelect').style.display = 'flex';
  aimArea.innerHTML = '';
  updateBestScores();
}

function retryGame() {
  closeResult();
  aimArea.innerHTML = '';
  document.getElementById('gameUI').style.display = 'none';
  startGame(mode);
}

function closeResult() {
  const overlay = document.getElementById('resultOverlay');
  overlay.classList.remove('show');
  setTimeout(() => overlay.style.display = 'none', 300);
}

function shareResult() {
  const total = hits + misses;
  const acc = total > 0 ? Math.round((hits / total) * 100) : 0;
  const avgReaction = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;
  const modeNames = { classic: t.classic, speed: t.speed, precision: t.precision };

  let score;
  if (mode === 'classic') score = avgReaction;
  else if (mode === 'speed') score = hits;
  else score = precisionScores.length > 0 ? Math.round(precisionScores.reduce((a, b) => a + b, 0) / precisionScores.length) : 0;

  let msg = `${modeNames[mode]} | ${t.accuracy}: ${acc}% | ${t.maxCombo}: ${maxCombo}x`;

  PuzzleShare.showShareModal({
    gameName: t.gameTitle,
    title: t.gameTitle,
    score: score,
    message: msg,
    lang: lang,
  });
}

// ===== Init =====
initUI();
</script>
