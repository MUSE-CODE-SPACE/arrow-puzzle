<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Bomb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#0a0a1a;color:#e2e8f0}
body{display:flex;flex-direction:column;align-items:center}

.ad-placeholder{width:100%;max-width:480px;height:50px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:12px;letter-spacing:1px;flex-shrink:0}
.ad-top{border-radius:0 0 8px 8px}
.ad-bottom{border-radius:8px 8px 0 0;margin-top:auto}

.header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0}
.back-link{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px;transition:color .2s}
.back-link:hover{color:#e2e8f0}
.title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#f97316,#ef4444,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.score-bar{width:100%;max-width:480px;display:flex;justify-content:space-around;padding:6px 16px;flex-shrink:0}
.score-box{text-align:center}
.score-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.score-value{font-size:22px;font-weight:900;color:#f1f5f9;line-height:1.1}
.score-value.round-val{color:#f97316}
.score-value.score-val{color:#22d3ee}
.score-value.best-val{color:#fbbf24}
.score-value.lives-val{color:#ef4444;letter-spacing:2px}

.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:480px;padding:8px 16px;min-height:0;overflow:hidden;position:relative}

/* Start screen */
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;width:100%;text-align:center}
.start-screen h2{font-size:28px;font-weight:900;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.start-screen p{color:#94a3b8;font-size:14px;max-width:300px;line-height:1.5}
.start-screen .best-record{font-size:14px;color:#fbbf24;font-weight:600;margin-top:4px}
.btn-start{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border:none;padding:16px 48px;border-radius:14px;font-size:18px;font-weight:800;font-family:'Outfit',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px rgba(249,115,22,.4);margin-top:8px}
.btn-start:hover{transform:scale(1.05)}
.btn-start:active{transform:scale(.97)}

/* Game screen */
.game-screen{display:none;flex-direction:column;align-items:center;width:100%;height:100%;gap:8px;position:relative}
.game-screen.active{display:flex}

/* Prompt */
.prompt-area{width:100%;text-align:center;margin-bottom:4px}
.prompt-label{font-size:13px;color:#94a3b8;font-weight:600;margin-bottom:4px}
.prompt-letters{font-size:48px;font-weight:900;color:#fbbf24;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 30px rgba(251,191,36,.3)}

/* Timer bar */
.timer-bar-wrap{width:100%;max-width:320px;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:4px 0}
.timer-bar{height:100%;border-radius:4px;transition:width .1s linear,background .3s;background:linear-gradient(90deg,#22c55e,#22d3ee)}
.timer-bar.warn{background:linear-gradient(90deg,#fbbf24,#f97316)}
.timer-bar.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}
.timer-text{font-size:14px;font-weight:700;color:#94a3b8}

/* Bomb */
.bomb-container{position:relative;width:160px;height:200px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bomb-body{width:120px;height:120px;background:radial-gradient(circle at 35% 35%,#475569,#1e293b,#0f172a);border-radius:50%;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 -4px 12px rgba(0,0,0,.5),inset 0 4px 8px rgba(148,163,184,.1);transition:transform .05s}
.bomb-body::before{content:'';position:absolute;top:8px;left:20px;width:24px;height:16px;background:radial-gradient(ellipse,rgba(255,255,255,.15),transparent);border-radius:50%;transform:rotate(-20deg)}
.bomb-fuse-base{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:20px;background:linear-gradient(180deg,#78716c,#57534e);border-radius:4px 4px 0 0}
.bomb-fuse{position:absolute;top:-40px;left:50%;width:4px;height:36px;background:#a8a29e;border-radius:2px;transform-origin:bottom center;transform:translateX(-50%) rotate(15deg)}
.bomb-fuse::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,#fef08a,#f97316,#ef4444);box-shadow:0 0 16px #f97316,0 0 32px #ef4444,0 0 48px rgba(249,115,22,.4);animation:fuseBurn .3s infinite alternate}

@keyframes fuseBurn{
  0%{transform:translateX(-50%) scale(1);opacity:.8;box-shadow:0 0 16px #f97316,0 0 32px #ef4444}
  100%{transform:translateX(-50%) scale(1.4);opacity:1;box-shadow:0 0 24px #fbbf24,0 0 48px #f97316,0 0 64px rgba(249,115,22,.5)}
}

/* Fuse sparks */
.spark{position:absolute;width:3px;height:3px;border-radius:50%;background:#fef08a;pointer-events:none;animation:sparkFly .6s ease-out forwards}
@keyframes sparkFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}

/* Bomb shaking */
.bomb-container.shake-1{animation:bombShake1 .4s infinite}
.bomb-container.shake-2{animation:bombShake2 .2s infinite}
.bomb-container.shake-3{animation:bombShake3 .1s infinite}

@keyframes bombShake1{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes bombShake2{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-4px) rotate(-1deg)}75%{transform:translateX(4px) rotate(1deg)}}
@keyframes bombShake3{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-6px) rotate(-2deg)}75%{transform:translateX(6px) rotate(2deg)}}

/* Explosion */
.explosion-overlay{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity .1s}
.explosion-overlay.show{opacity:1;pointer-events:auto}
.explosion-flash{position:fixed;inset:0;background:radial-gradient(circle at 50% 45%,rgba(249,115,22,.6),rgba(239,68,68,.3),transparent 70%);animation:flashBang .6s ease-out forwards}
@keyframes flashBang{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}

.explosion-particle{position:absolute;border-radius:50%;pointer-events:none}

/* Correct word flash */
.correct-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(34,197,94,.15),transparent 70%);pointer-events:none;opacity:0;transition:opacity .2s}
.correct-flash.show{opacity:1}

/* Input */
.input-row{width:100%;max-width:360px;padding:4px 0;flex-shrink:0}
#wordInput{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;outline:none;transition:border-color .2s;letter-spacing:1px;text-align:center;text-transform:lowercase}
#wordInput:focus{border-color:rgba(249,115,22,.5)}
#wordInput::placeholder{color:#475569;text-transform:none}

/* Used words */
.used-words{width:100%;max-width:360px;min-height:28px;display:flex;flex-wrap:wrap;gap:4px 6px;justify-content:center;padding:2px 0;overflow:hidden;max-height:56px}
.used-word{font-size:11px;color:#64748b;background:rgba(255,255,255,.04);padding:2px 8px;border-radius:6px;font-weight:600}

/* Feedback message */
.feedback{font-size:14px;font-weight:700;min-height:22px;transition:opacity .2s}
.feedback.correct{color:#22c55e}
.feedback.wrong{color:#ef4444}
.feedback.bonus{color:#fbbf24}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;visibility:hidden;transition:all .3s}
.overlay.show{opacity:1;visibility:visible}
.overlay-box{background:#1a1a2e;border-radius:20px;padding:32px;text-align:center;max-width:340px;width:90%;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay-box h2{font-size:28px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay-box .subtitle{font-size:15px;color:#94a3b8;margin-bottom:12px}
.overlay-box .final-score{font-size:56px;font-weight:900;color:#f97316;margin:8px 0}
.overlay-box .final-score span{font-size:20px;color:#94a3b8;font-weight:600}
.overlay-box .stats-row{display:flex;justify-content:space-around;margin:16px 0;padding:12px 0;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.overlay-box .stat{text-align:center}
.overlay-box .stat-val{font-size:24px;font-weight:900;color:#f1f5f9}
.overlay-box .stat-lbl{font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600}
.overlay-box .best-label{font-size:14px;color:#fbbf24;margin-bottom:16px;font-weight:600}
.overlay-box .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(249,115,22,.4)}
.btn-primary:hover{transform:scale(1.05)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.12);padding:14px 24px;border-radius:12px;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:transform .15s}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-secondary:active{transform:scale(.97)}

@media(max-width:400px){
  .prompt-letters{font-size:36px}
  .bomb-container{width:130px;height:170px}
  .bomb-body{width:100px;height:100px}
  .score-value{font-size:18px}
  #wordInput{font-size:18px;padding:12px 14px}
}
</style>
</head>
<body>

<div class="ad-placeholder ad-top"><span>AD SPACE</span></div>

<div class="header">
  <a href="../index.html" class="back-link" id="backLink">← Back</a>
  <div class="title" id="gameTitle">Word Bomb</div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-box"><div class="score-label" id="lblRound">ROUND</div><div class="score-value round-val" id="roundDisplay">1</div></div>
  <div class="score-box"><div class="score-label" id="lblScore">SCORE</div><div class="score-value score-val" id="scoreDisplay">0</div></div>
  <div class="score-box"><div class="score-label" id="lblBest">BEST</div><div class="score-value best-val" id="bestDisplay">0</div></div>
  <div class="score-box"><div class="score-label" id="lblLives">LIVES</div><div class="score-value lives-val" id="livesDisplay">&#10084;&#10084;&#10084;</div></div>
</div>

<div class="game-area" id="gameArea">
  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <h2 id="startTitle">Word Bomb</h2>
    <p id="startDesc">A bomb is ticking! Type an English word containing the shown letters before time runs out!</p>
    <div class="best-record" id="bestRecord"></div>
    <button class="btn-start" onclick="game.start()" id="btnStart">START</button>
  </div>

  <!-- Game screen -->
  <div class="game-screen" id="gameScreen">
    <div class="prompt-area">
      <div class="prompt-label" id="promptLabel">Type a word containing:</div>
      <div class="prompt-letters" id="promptLetters">TH</div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar" style="width:100%"></div>
    </div>
    <div class="timer-text" id="timerText">10.0s</div>

    <div class="bomb-container" id="bombContainer">
      <div class="bomb-fuse" id="bombFuse"></div>
      <div class="bomb-fuse-base"></div>
      <div class="bomb-body" id="bombBody"></div>
    </div>

    <div class="correct-flash" id="correctFlash"></div>

    <div class="feedback" id="feedback">&nbsp;</div>

    <div class="input-row">
      <input type="text" id="wordInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="">
    </div>

    <div class="used-words" id="usedWords"></div>
  </div>
</div>

<div class="ad-placeholder ad-bottom"><span>AD SPACE</span></div>

<!-- Explosion overlay -->
<div class="explosion-overlay" id="explosionOverlay"></div>

<!-- Result overlay -->
<div class="overlay" id="resultOverlay">
  <div class="overlay-box">
    <h2 id="resultTitle">Game Over</h2>
    <div class="subtitle" id="resultSubtitle">The bomb exploded!</div>
    <div class="final-score" id="finalScore">0 <span id="lblPoints">PTS</span></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="finalRound">0</div><div class="stat-lbl" id="lblFinalRound">Round</div></div>
      <div class="stat"><div class="stat-val" id="finalWords">0</div><div class="stat-lbl" id="lblFinalWords">Words</div></div>
      <div class="stat"><div class="stat-val" id="finalLongest">-</div><div class="stat-lbl" id="lblFinalLongest">Longest</div></div>
    </div>
    <div class="best-label" id="bestLabel"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="game.backToMenu()" id="btnMenu">Menu</button>
      <button class="btn-primary" onclick="game.start()" id="btnRetry">Retry</button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="share.js"></script>
<script src="user-system.js"></script>
<script src="ads.js"></script>
<script src="recommend.js"></script>

  const lang = getGameLang();
  const dict = WB_I18N[lang] || WB_I18N.en;
  return dict[key] || WB_I18N.en[key] || key;
}

// ===== WEB AUDIO SOUND ENGINE =====
const AudioEngine = {
  ctx: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  _play(fn) {
    this.init();
    this.resume();
    try { fn(this.ctx); } catch(e) {}
  },
  fuseBurn() {
    this._play(ctx => {
      const bufferSize = ctx.sampleRate * 0.15;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 3000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.03, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      source.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      source.start(); source.stop(ctx.currentTime + 0.15);
    });
  },
  correctWord() {
    this._play(ctx => {
      [523, 659, 784].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.06);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.2);
        o.start(ctx.currentTime + i * 0.06);
        o.stop(ctx.currentTime + i * 0.06 + 0.2);
      });
    });
  },
  bonusWord() {
    this._play(ctx => {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.07);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.07);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.25);
        o.start(ctx.currentTime + i * 0.07);
        o.stop(ctx.currentTime + i * 0.07 + 0.25);
      });
    });
  },
  explosion() {
    this._play(ctx => {
      // Noise burst
      const bufferSize = ctx.sampleRate * 0.8;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.5);
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, ctx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.6);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      source.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      source.start(); source.stop(ctx.currentTime + 0.8);
      // Low boom
      const o = ctx.createOscillator();
      const g2 = ctx.createGain();
      o.connect(g2); g2.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(80, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.5);
      g2.gain.setValueAtTime(0.25, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
    });
  },
  error() {
    this._play(ctx => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(); o.stop(ctx.currentTime + 0.15);
    });
  },
  gameOver() {
    this._play(ctx => {
      [400, 350, 300, 200].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.2);
        g.gain.setValueAtTime(0.06, ctx.currentTime + i * 0.2);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.3);
        o.start(ctx.currentTime + i * 0.2);
        o.stop(ctx.currentTime + i * 0.2 + 0.3);
      });
    });
  }
};

const game = {
  round: 1,
  score: 0,
  lives: 3,
  currentPrompt: '',
  usedWords: new Set(),
  timeLimit: 10,
  timeLeft: 10,
  timer: null,
  timerInterval: null,
  started: false,
  finished: false,
  longestWord: '',
  wordsFound: 0,
  sparkInterval: null,
  fuseInterval: null,

  init() {
    this.applyTranslations();
    this.loadBest();
    const input = document.getElementById('wordInput');
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        this.submitWord();
      }
    });
    // Keep input focused
    document.addEventListener('click', () => {
      if (this.started && !this.finished) {
        document.getElementById('wordInput').focus();
      }
    });
  },

  applyTranslations() {
    const t = getTranslations();
    document.getElementById('backLink').textContent = t.back || '← Back';
    document.getElementById('gameTitle').textContent = tt('title');
    document.getElementById('startTitle').textContent = tt('start_title');
    document.getElementById('startDesc').textContent = tt('start_desc');
    document.getElementById('btnStart').textContent = tt('start_btn');
    document.getElementById('lblRound').textContent = tt('round');
    document.getElementById('lblScore').textContent = tt('score');
    document.getElementById('lblBest').textContent = tt('best');
    document.getElementById('lblLives').textContent = tt('lives');
    document.getElementById('resultTitle').textContent = tt('game_over');
    document.getElementById('resultSubtitle').textContent = tt('bomb_exploded');
    document.getElementById('lblFinalRound').textContent = tt('final_round');
    document.getElementById('lblFinalWords').textContent = tt('final_words');
    document.getElementById('lblFinalLongest').textContent = tt('final_longest');
    document.getElementById('lblPoints').textContent = tt('points');
    document.getElementById('btnMenu').textContent = tt('menu');
    document.getElementById('btnRetry').textContent = tt('retry');
    document.getElementById('promptLabel').textContent = tt('prompt_label');
  },

  loadBest() {
    const best = +(localStorage.getItem('wordbomb_best') || 0);
    document.getElementById('bestDisplay').textContent = best;
    const rec = document.getElementById('bestRecord');
    if (best > 0) {
      rec.textContent = tt('best_score').replace('{score}', best);
    } else {
      rec.textContent = '';
    }
  },

  getBest() {
    return +(localStorage.getItem('wordbomb_best') || 0);
  },

  saveBest(score) {
    const prev = this.getBest();
    if (score > prev) {
      localStorage.setItem('wordbomb_best', score);
      return true;
    }
    return false;
  },

  getRandomPrompt() {
    return PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
  },

  start() {
    AudioEngine.init();
    this.round = 1;
    this.score = 0;
    this.lives = 3;
    this.usedWords = new Set();
    this.started = true;
    this.finished = false;
    this.longestWord = '';
    this.wordsFound = 0;
    this.timeLimit = 10;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('gameScreen').classList.add('active');
    document.getElementById('scoreBar').style.display = 'flex';

    this.updateDisplays();
    this.nextRound();
  },

  nextRound() {
    this.currentPrompt = this.getRandomPrompt();
    document.getElementById('promptLetters').textContent = this.currentPrompt;
    // Time decreases as rounds progress: 10s -> min 4s
    this.timeLimit = Math.max(4, 10 - (this.round - 1) * 0.3);
    this.timeLeft = this.timeLimit;

    const input = document.getElementById('wordInput');
    input.value = '';
    input.placeholder = tt('placeholder');
    input.focus();

    this.setFeedback('', '');
    this.updateTimerBar();
    this.startShaking(0);
    this.startBombTimer();
    this.startSparkEffect();
    this.startFuseSound();
  },

  startBombTimer() {
    clearInterval(this.timerInterval);
    const startTime = performance.now();
    const totalMs = this.timeLimit * 1000;

    this.timerInterval = setInterval(() => {
      if (!this.started || this.finished) {
        clearInterval(this.timerInterval);
        return;
      }
      const elapsed = performance.now() - startTime;
      this.timeLeft = Math.max(0, (totalMs - elapsed) / 1000);
      this.updateTimerBar();

      // Update shaking intensity
      const pct = this.timeLeft / this.timeLimit;
      if (pct < 0.25) this.startShaking(3);
      else if (pct < 0.5) this.startShaking(2);
      else if (pct < 0.75) this.startShaking(1);

      if (this.timeLeft <= 0) {
        clearInterval(this.timerInterval);
        this.bombExplode();
      }
    }, 50);
  },

  updateTimerBar() {
    const pct = (this.timeLeft / this.timeLimit) * 100;
    const bar = document.getElementById('timerBar');
    bar.style.width = pct + '%';
    bar.classList.remove('warn', 'danger');
    if (pct < 25) bar.classList.add('danger');
    else if (pct < 50) bar.classList.add('warn');

    document.getElementById('timerText').textContent = this.timeLeft.toFixed(1) + 's';
  },

  startShaking(level) {
    const container = document.getElementById('bombContainer');
    container.classList.remove('shake-1', 'shake-2', 'shake-3');
    if (level >= 1) container.classList.add('shake-' + Math.min(level, 3));
  },

  startSparkEffect() {
    clearInterval(this.sparkInterval);
    this.sparkInterval = setInterval(() => {
      if (!this.started || this.finished) {
        clearInterval(this.sparkInterval);
        return;
      }
      this.createSpark();
    }, 150);
  },

  createSpark() {
    const fuse = document.getElementById('bombFuse');
    if (!fuse) return;
    const spark = document.createElement('div');
    spark.className = 'spark';
    const sx = (Math.random() - 0.5) * 30;
    const sy = -(Math.random() * 20 + 5);
    spark.style.cssText = `--sx:${sx}px;--sy:${sy}px;top:-8px;left:50%;transform:translateX(-50%)`;
    fuse.appendChild(spark);
    setTimeout(() => spark.remove(), 600);
  },

  startFuseSound() {
    clearInterval(this.fuseInterval);
    this.fuseInterval = setInterval(() => {
      if (!this.started || this.finished) {
        clearInterval(this.fuseInterval);
        return;
      }
      AudioEngine.fuseBurn();
    }, 400);
  },

  submitWord() {
    if (!this.started || this.finished) return;
    const input = document.getElementById('wordInput');
    const word = input.value.trim().toLowerCase();
    input.value = '';

    if (word.length < 2) {
      this.setFeedback(tt('too_short'), 'wrong');
      AudioEngine.error();
      return;
    }

    if (this.usedWords.has(word)) {
      this.setFeedback(tt('already_used'), 'wrong');
      AudioEngine.error();
      return;
    }

    if (!word.includes(this.currentPrompt.toLowerCase())) {
      this.setFeedback(tt('not_contain').replace('{letters}', this.currentPrompt), 'wrong');
      AudioEngine.error();
      return;
    }

    if (!DICTIONARY.has(word)) {
      this.setFeedback(tt('not_valid'), 'wrong');
      AudioEngine.error();
      return;
    }

    // Valid word!
    this.usedWords.add(word);
    this.wordsFound++;
    if (word.length > this.longestWord.length) this.longestWord = word;

    // Score: 1 base + bonus for length
    let points = 1;
    const bonus = Math.max(0, word.length - 4);
    points += bonus;
    this.score += points;

    // Add to used words display
    this.addUsedWordDisplay(word);

    // Feedback
    if (bonus > 0) {
      this.setFeedback(tt('bonus').replace('{n}', points), 'bonus');
      AudioEngine.bonusWord();
    } else {
      this.setFeedback(tt('correct'), 'correct');
      AudioEngine.correctWord();
    }

    // Correct flash
    const flash = document.getElementById('correctFlash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 300);

    // Stop current timer, advance round
    clearInterval(this.timerInterval);
    clearInterval(this.sparkInterval);
    clearInterval(this.fuseInterval);
    this.startShaking(0);
    this.round++;
    this.updateDisplays();

    setTimeout(() => this.nextRound(), 500);
  },

  addUsedWordDisplay(word) {
    const container = document.getElementById('usedWords');
    const el = document.createElement('span');
    el.className = 'used-word';
    el.textContent = word;
    container.insertBefore(el, container.firstChild);
    // Keep max 20 visible
    while (container.children.length > 20) {
      container.removeChild(container.lastChild);
    }
  },

  setFeedback(text, cls) {
    const fb = document.getElementById('feedback');
    fb.textContent = text || '\u00a0';
    fb.className = 'feedback';
    if (cls) fb.classList.add(cls);
  },

  updateDisplays() {
    document.getElementById('roundDisplay').textContent = this.round;
    document.getElementById('scoreDisplay').textContent = this.score;
    document.getElementById('bestDisplay').textContent = Math.max(this.getBest(), this.score);
    this.updateLivesDisplay();
  },

  updateLivesDisplay() {
    let hearts = '';
    for (let i = 0; i < 3; i++) {
      hearts += i < this.lives ? '\u2764' : '\u00a0\u00a0';
    }
    document.getElementById('livesDisplay').innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const span = document.createElement('span');
      span.textContent = '\u2764';
      span.style.opacity = i < this.lives ? '1' : '0.15';
      span.style.transition = 'opacity .3s, transform .3s';
      if (i >= this.lives) span.style.transform = 'scale(0.7)';
      document.getElementById('livesDisplay').appendChild(span);
    }
  },

  bombExplode() {
    clearInterval(this.timerInterval);
    clearInterval(this.sparkInterval);
    clearInterval(this.fuseInterval);
    this.startShaking(0);

    AudioEngine.explosion();

    // Show explosion effect
    this.showExplosion();

    this.lives--;
    this.updateDisplays();

    if (this.lives <= 0) {
      // Game over after explosion animation
      setTimeout(() => this.gameOver(), 1200);
    } else {
      // Continue after explosion
      setTimeout(() => {
        document.getElementById('explosionOverlay').classList.remove('show');
        document.getElementById('explosionOverlay').innerHTML = '';
        this.round++;
        this.updateDisplays();
        this.nextRound();
      }, 1200);
    }
  },

  showExplosion() {
    const overlay = document.getElementById('explosionOverlay');
    overlay.innerHTML = '';
    overlay.classList.add('show');

    // Flash
    const flash = document.createElement('div');
    flash.className = 'explosion-flash';
    overlay.appendChild(flash);

    // Particles
    const colors = ['#f97316', '#ef4444', '#fbbf24', '#fb923c', '#dc2626', '#fef08a', '#f59e0b'];
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight * 0.4;

    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'explosion-particle';
      const size = 4 + Math.random() * 12;
      const angle = Math.random() * Math.PI * 2;
      const distance = 60 + Math.random() * 200;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;
      const dur = 0.4 + Math.random() * 0.6;
      const color = colors[Math.floor(Math.random() * colors.length)];

      p.style.cssText = `
        width:${size}px;height:${size}px;background:${color};
        left:${centerX}px;top:${centerY}px;
        box-shadow:0 0 ${size}px ${color};
        animation:none;
        transition:transform ${dur}s cubic-bezier(.25,.46,.45,.94),opacity ${dur}s ease-out;
        opacity:1;
      `;
      overlay.appendChild(p);

      // Trigger animation
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          p.style.transform = `translate(${dx}px, ${dy}px) scale(0.2)`;
          p.style.opacity = '0';
        });
      });
    }

    // Hide bomb briefly
    document.getElementById('bombContainer').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('bombContainer').style.opacity = '1';
    }, 800);
  },

  gameOver() {
    this.finished = true;
    this.started = false;
    clearInterval(this.timerInterval);
    clearInterval(this.sparkInterval);
    clearInterval(this.fuseInterval);

    document.getElementById('explosionOverlay').classList.remove('show');
    document.getElementById('explosionOverlay').innerHTML = '';

    setTimeout(() => AudioEngine.gameOver(), 300);

    const isNew = this.saveBest(this.score);

    if(typeof PuzzleUser!=='undefined') PuzzleUser.recordGame('word-bomb',{score:this.score,wordBombRounds:this.round});

    document.getElementById('finalScore').innerHTML = `${this.score} <span>${tt('points')}</span>`;
    document.getElementById('finalRound').textContent = this.round;
    document.getElementById('finalWords').textContent = this.wordsFound;
    document.getElementById('finalLongest').textContent = this.longestWord || '-';
    document.getElementById('bestLabel').textContent = isNew ? tt('new_best') : tt('best_score').replace('{score}', this.getBest());
    document.getElementById('bestLabel').style.color = isNew ? '#22d3ee' : '#fbbf24';

    document.getElementById('resultOverlay').classList.add('show');

    // Share
    if (typeof PuzzleShare !== 'undefined' && PuzzleShare.showShareModal) {
      setTimeout(() => {
        PuzzleShare.showShareModal({
          game: 'Word Bomb',
          score: this.score,
          label: tt('points'),
          extra: `Round ${this.round} | ${this.wordsFound} words`
        });
      }, 600);
    }
  },

  backToMenu() {
    this.finished = true;
    this.started = false;
    clearInterval(this.timerInterval);
    clearInterval(this.sparkInterval);
    clearInterval(this.fuseInterval);

    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('gameScreen').classList.remove('active');
    document.getElementById('scoreBar').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('usedWords').innerHTML = '';
    document.getElementById('explosionOverlay').classList.remove('show');
    document.getElementById('explosionOverlay').innerHTML = '';

    this.loadBest();
  }
};

// Init
game.init();
</script>
