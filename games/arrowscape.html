<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ArrowScape - Arrow Escape Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent1: #667eea;
  --accent2: #764ba2;
  --board-bg: #0f1028;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; }
.screen.active { display: flex; }

/* Title Screen */
.title-screen {
  justify-content: center;
  gap: 24px;
  padding: 40px 20px;
}
.title-logo {
  font-size: 56px;
  font-weight: 800;
  background: linear-gradient(135deg, #00d4ff, #ff44ff, #ffdd00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  letter-spacing: -2px;
  line-height: 1.1;
}
.title-sub {
  font-size: 16px;
  color: var(--text-dim);
  text-align: center;
}
.play-btn {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
  border: none;
  padding: 16px 48px;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(102,126,234,0.3);
}
.play-btn:active { transform: scale(0.95); }

/* Level Select */
.level-screen {
  padding: 20px;
  gap: 16px;
}
.level-header {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 400px;
  gap: 12px;
}
.back-btn {
  background: var(--surface2);
  border: none;
  color: var(--text);
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.level-title {
  font-size: 22px;
  font-weight: 700;
}
.level-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 400px;
  padding: 10px 0;
}
.level-cell {
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--surface);
  border: 2px solid var(--surface2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s;
  position: relative;
}
.level-cell:active { transform: scale(0.92); }
.level-cell.locked {
  opacity: 0.4;
  cursor: default;
}
.level-cell .stars-row {
  font-size: 9px;
  margin-top: 2px;
  letter-spacing: 1px;
}

/* Game Screen */
.game-screen {
  padding: 10px;
  gap: 8px;
}
.game-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 500px;
  padding: 4px 8px;
}
.hearts {
  font-size: 22px;
  display: flex;
  gap: 4px;
}
.game-level-label {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-dim);
}
.game-btns {
  display: flex;
  gap: 8px;
}
.game-btns button {
  background: var(--surface2);
  border: none;
  color: var(--text);
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}
.game-btns button:active { opacity: 0.7; }

#gameCanvas {
  border-radius: 16px;
  touch-action: none;
  max-width: 100%;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 24px;
  padding: 32px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-box h2 {
  font-size: 28px;
  margin-bottom: 8px;
}
.modal-stars {
  font-size: 40px;
  margin: 12px 0;
}
.modal-msg {
  color: var(--text-dim);
  margin-bottom: 20px;
  font-size: 15px;
}
.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.modal-btns button {
  padding: 12px 24px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
}
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
}

/* Toast */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(255,60,60,0.9);
  color: #fff;
  padding: 10px 24px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>

<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Title Screen -->
<div class="screen title-screen active" id="titleScreen">

</div>

<script>
// ============================================================
// ArrowScape - Arrow Escape Puzzle (Complete Rewrite)
// Lines/strokes on a grid, NOT thick bands filling cells
// ============================================================
'use strict';

// ── Constants ──
const TOTAL_LEVELS = 30;
const MAX_HEARTS = 3;

const COLORS = [
  '#00d4ff', '#ff8c00', '#ffaacc', '#ffdd00', '#00ff66',
  '#e0e0e0', '#ff44ff', '#4488ff', '#ff6b6b', '#88ff00',
];

const LEVEL_CONFIGS = [
  // [cols, rows, minArrows, maxArrows]
  [6,8,3,4],[6,8,3,4],[6,8,3,4],
  [6,9,4,5],[6,9,4,5],[6,9,4,5],
  [7,9,5,6],[7,9,5,6],[7,9,5,6],[7,9,5,6],
  [7,10,6,8],[7,10,6,8],[7,10,6,8],[7,10,6,8],[7,10,6,8],
  [7,10,8,10],[7,10,8,10],[7,10,8,10],[7,10,8,10],[7,10,8,10],
  [7,11,9,11],[7,11,9,11],[7,11,9,11],[7,11,9,11],[7,11,9,11],
  [8,12,10,13],[8,12,10,13],[8,12,10,13],[8,12,10,13],[8,12,10,13],
];

const DIRS = {
  up:    { dx: 0, dy:-1 },
  down:  { dx: 0, dy: 1 },
  left:  { dx:-1, dy: 0 },
  right: { dx: 1, dy: 0 },
};
const DIR_NAMES = ['up','down','left','right'];
const OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };

// ── Game-specific i18n ──
const GAME_STRINGS = {
  ko: { blocked:'막혀있어요!', level_clear:'레벨 클리어!', subtitle:'화살표를 탈출시키세요!', game_over:'게임 오버', hearts_gone:'하트를 다 잃었어요' },
  en: { blocked:'Blocked!', level_clear:'Level Clear!', subtitle:'Escape the arrows!', game_over:'Game Over', hearts_gone:'No hearts left' },
  ja: { blocked:'ブロック！', level_clear:'レベルクリア！', subtitle:'矢印を脱出させよう！', game_over:'ゲームオーバー', hearts_gone:'ハートがなくなりました' },
  zh: { blocked:'被挡住了！', level_clear:'关卡通过！', subtitle:'让箭头逃脱！', game_over:'游戏结束', hearts_gone:'没有心了' },
  es: { blocked:'¡Bloqueado!', level_clear:'¡Nivel completado!', subtitle:'¡Escapa las flechas!', game_over:'Fin del juego', hearts_gone:'Sin corazones' },
};

// ── State ──
let t, gs; // translations, game strings
let progress = {}; // {levelN: {stars, unlocked}}
let currentLevel = 1;
let hearts = MAX_HEARTS;
let arrows = [];     // [{cells:[{x,y}], dir:'right', color:'#fff', removed:false, animating:false, animProgress:0, animStart:0}]
let gridCols, gridRows;
let boardX, boardY, cellSize;
let canvas, ctx;
let hintArrowIdx = -1;
let hintTimer = null;
let shakeArrowIdx = -1;
let shakeStart = 0;
let removedCount = 0;
let mistakesMade = 0;

// ── Audio ──
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'whoosh') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.35);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'thud') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(100, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'victory') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.12);
      osc.frequency.setValueAtTime(784, now + 0.24);
      osc.frequency.setValueAtTime(1047, now + 0.36);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      osc.start(now); osc.stop(now + 0.6);
    }
  } catch(e) {}
}

// ── Seeded RNG ──
function seededRNG(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0x100000000;
  };
}

// ── Save/Load Progress ──
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('arrowscape_progress') || '{}');
    progress = d;
  } catch(e) { progress = {}; }
  if (!progress['1']) progress['1'] = { stars: 0, unlocked: true };
}
function saveProgress() {
  localStorage.setItem('arrowscape_progress', JSON.stringify(progress));
}

// ── Screen Management ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Toast ──
function showToast(msg, color) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color || 'rgba(255,60,60,0.9)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── Init ──
function init() {
  if (typeof getTranslations === 'function') t = getTranslations();
  else t = { back:'<- Back', level:'Level', level_select:'Select Level', restart:'Restart', hint:'Hint', clear:'Cleared!', perfect:'Perfect!', next_level:'Next Level', try_again:'Try Again', game_over:'Game Over', well_done:'Well done!', amazing:'Amazing!', excellent:'Excellent!' };
  const lang = (typeof getGameLang === 'function') ? getGameLang() : 'en';
  gs = GAME_STRINGS[lang] || GAME_STRINGS.en;

  loadProgress();

  document.getElementById('titleSub').textContent = gs.subtitle;
  document.getElementById('playBtn').onclick = () => { initAudio(); showLevelSelect(); };
  document.getElementById('backToTitle').onclick = () => showScreen('titleScreen');
  document.getElementById('backToLevels').onclick = () => showLevelSelect();
  document.getElementById('restartBtn').onclick = () => startLevel(currentLevel);
  document.getElementById('hintBtn').onclick = showHint;

  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  canvas.addEventListener('pointerdown', onPointerDown);

  showScreen('titleScreen');
}

// ── Level Select ──
function showLevelSelect() {
  showScreen('levelScreen');
  document.getElementById('levelSelectTitle').textContent = t.level_select || 'Select Level';
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    const cell = document.createElement('div');
    cell.className = 'level-cell';
    const p = progress[String(i)];
    const unlocked = p && p.unlocked;
    if (!unlocked) cell.classList.add('locked');
    cell.innerHTML = `<span>${i}</span>`;
    if (p && p.stars > 0) {
      const starsStr = '<span style="color:#ffdd00">' + '★'.repeat(p.stars) + '</span>' + '<span style="color:#555">' + '★'.repeat(3 - p.stars) + '</span>';
      cell.innerHTML += `<div class="stars-row">${starsStr}</div>`;
    }
    if (unlocked) {
      cell.onclick = () => { currentLevel = i; startLevel(i); };
    }
    grid.appendChild(cell);
  }
}

// ── Level Generation ──
function generateLevel(levelNum) {
  const cfg = LEVEL_CONFIGS[levelNum - 1];
  const cols = cfg[0], rows = cfg[1], minA = cfg[2], maxA = cfg[3];
  const rng = seededRNG(levelNum * 7919 + 12345);
  const numArrows = minA + Math.floor(rng() * (maxA - minA + 1));

  // Grid occupancy
  let grid = Array.from({length: rows}, () => Array(cols).fill(-1));
  let arrowList = [];

  for (let a = 0; a < numArrows; a++) {
    const color = COLORS[a % COLORS.length];

    let placed = false;
    for (let attempt = 0; attempt < 100; attempt++) {
      // Pick a random edge and a random cell ON that edge for the arrowhead
      const exitDir = DIR_NAMES[Math.floor(rng() * 4)];
      let headX, headY;
      if (exitDir === 'right') { headX = cols - 1; headY = Math.floor(rng() * rows); }
      else if (exitDir === 'left') { headX = 0; headY = Math.floor(rng() * rows); }
      else if (exitDir === 'down') { headX = Math.floor(rng() * cols); headY = rows - 1; }
      else { headX = Math.floor(rng() * cols); headY = 0; }

      if (grid[headY][headX] !== -1) continue;

      // Build path INWARD from the head cell
      let cells = [{x: headX, y: headY}];
      let pathLen = 3 + Math.floor(rng() * 6);
      let cx = headX, cy = headY;
      let lastDir = OPPOSITE[exitDir]; // start by going inward

      for (let step = 0; step < pathLen; step++) {
        let possibleDirs = [];
        for (const dn of DIR_NAMES) {
          if (dn === OPPOSITE[lastDir]) continue; // no U-turns
          const d = DIRS[dn];
          const nx = cx + d.dx, ny = cy + d.dy;
          if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
          if (grid[ny][nx] !== -1) continue;
          if (cells.some(c => c.x === nx && c.y === ny)) continue;
          possibleDirs.push(dn);
        }
        if (possibleDirs.length === 0) break;

        // Prefer turning for winding paths
        let chosen;
        const turnDirs = possibleDirs.filter(d => d !== lastDir);
        if (turnDirs.length > 0 && rng() < 0.55) {
          chosen = turnDirs[Math.floor(rng() * turnDirs.length)];
        } else {
          chosen = possibleDirs[Math.floor(rng() * possibleDirs.length)];
        }

        cx += DIRS[chosen].dx;
        cy += DIRS[chosen].dy;
        cells.push({x: cx, y: cy});
        lastDir = chosen;
      }

      if (cells.length < 3) continue;

      // cells[0] = head (on edge), cells[last] = tail (interior)
      // We want cells order: tail first, head last
      // So reverse: cells[0]=tail, cells[last]=head(on edge)
      cells.reverse();

      for (const c of cells) {
        grid[c.y][c.x] = arrowList.length;
      }

      arrowList.push({
        cells: cells,
        dir: exitDir,
        color: color,
        removed: false,
        animating: false,
        animOffset: {x:0, y:0},
        animStart: 0
      });
      placed = true;
      break;
    }
  }

  return { cols, rows, arrows: arrowList, grid };
}

function canReachEdge(x, y, dir, cols, rows) {
  // The head cell must be ON the edge for the given exit direction
  switch(dir) {
    case 'right': return x === cols - 1;
    case 'left':  return x === 0;
    case 'down':  return y === rows - 1;
    case 'up':    return y === 0;
  }
  return false;
}

// ── Solvability check: find a valid removal order ──
function findSolveOrder(arrowList, cols, rows) {
  const n = arrowList.length;
  let removed = new Set();
  let order = [];

  // Build occupancy grid dynamically
  function buildGrid() {
    let g = Array.from({length: rows}, () => Array(cols).fill(-1));
    for (let i = 0; i < n; i++) {
      if (removed.has(i)) continue;
      for (const c of arrowList[i].cells) {
        g[c.y][c.x] = i;
      }
    }
    return g;
  }

  for (let round = 0; round < n; round++) {
    let foundOne = false;
    const g = buildGrid();
    for (let i = 0; i < n; i++) {
      if (removed.has(i)) continue;
      if (isArrowFree(i, arrowList, g, cols, rows)) {
        removed.add(i);
        order.push(i);
        foundOne = true;
        break;
      }
    }
    if (!foundOne) return null; // unsolvable
  }
  return order;
}

function isArrowFree(idx, arrowList, grid, cols, rows) {
  const arrow = arrowList[idx];
  const dir = arrow.dir;
  const d = DIRS[dir];

  for (const cell of arrow.cells) {
    let cx = cell.x + d.dx;
    let cy = cell.y + d.dy;
    while (cx >= 0 && cx < cols && cy >= 0 && cy < rows) {
      const occupant = grid[cy][cx];
      if (occupant !== -1 && occupant !== idx) return false;
      cx += d.dx;
      cy += d.dy;
    }
  }
  return true;
}

// ── Generate & verify level ──
function generateVerifiedLevel(levelNum) {
  // Try with the base seed, if unsolvable try more seeds
  for (let seedOffset = 0; seedOffset < 50; seedOffset++) {
    const data = generateLevelWithSeed(levelNum, levelNum * 7919 + 12345 + seedOffset * 997);
    if (data.arrows.length === 0) continue;
    const order = findSolveOrder(data.arrows, data.cols, data.rows);
    if (order) {
      data.solveOrder = order;
      return data;
    }
  }
  // Fallback: return whatever we get
  return generateLevelWithSeed(levelNum, levelNum * 7919 + 12345);
}

function generateLevelWithSeed(levelNum, seed) {
  const cfg = LEVEL_CONFIGS[levelNum - 1];
  const cols = cfg[0], rows = cfg[1], minA = cfg[2], maxA = cfg[3];
  const rng = seededRNG(seed);
  const numArrows = minA + Math.floor(rng() * (maxA - minA + 1));

  let grid = Array.from({length: rows}, () => Array(cols).fill(-1));
  let arrowList = [];

  for (let a = 0; a < numArrows; a++) {
    const color = COLORS[a % COLORS.length];

    let placed = false;
    for (let attempt = 0; attempt < 100; attempt++) {
      // Pick a random exit direction and start HEAD on that edge
      const exitDir = DIR_NAMES[Math.floor(rng() * 4)];
      let headX, headY;
      if (exitDir === 'right') { headX = cols - 1; headY = Math.floor(rng() * rows); }
      else if (exitDir === 'left') { headX = 0; headY = Math.floor(rng() * rows); }
      else if (exitDir === 'down') { headX = Math.floor(rng() * cols); headY = rows - 1; }
      else { headX = Math.floor(rng() * cols); headY = 0; }

      if (grid[headY][headX] !== -1) continue;

      // Build path INWARD from head
      let cells = [{x: headX, y: headY}];
      let pathLen = 3 + Math.floor(rng() * 6);
      let cx = headX, cy = headY;
      let lastDir = null;

      for (let step = 0; step < pathLen; step++) {
        let possibleDirs = [];
        for (const dn of DIR_NAMES) {
          const d = DIRS[dn];
          const nx = cx + d.dx, ny = cy + d.dy;
          if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
          if (grid[ny][nx] !== -1) continue;
          if (cells.some(c => c.x === nx && c.y === ny)) continue;
          possibleDirs.push(dn);
        }
        if (possibleDirs.length === 0) break;

        let chosen;
        const turnDirs = possibleDirs.filter(d => d !== lastDir);
        if (turnDirs.length > 0 && (lastDir === null || rng() < 0.55)) {
          chosen = turnDirs[Math.floor(rng() * turnDirs.length)];
        } else {
          chosen = possibleDirs[Math.floor(rng() * possibleDirs.length)];
        }

        cx += DIRS[chosen].dx;
        cy += DIRS[chosen].dy;
        cells.push({x: cx, y: cy});
        lastDir = chosen;
      }

      if (cells.length < 3) continue;

      // Reverse so cells[0]=tail, cells[last]=head (on edge)
      cells.reverse();

      // Mark grid
      for (const c of cells) {
        grid[c.y][c.x] = arrowList.length;
      }

      arrowList.push({
        cells: cells,
        dir: exitDir,
        color: color,
        removed: false,
        animating: false,
        animOffset: {x:0, y:0},
        animStart: 0
      });
      placed = true;
      break;
    }
  }

  return { cols, rows, arrows: arrowList, grid };
}

// ── Start Level ──
function startLevel(levelNum) {
  currentLevel = levelNum;
  hearts = MAX_HEARTS;
  removedCount = 0;
  mistakesMade = 0;
  hintArrowIdx = -1;
  shakeArrowIdx = -1;

  const data = generateVerifiedLevel(levelNum);
  gridCols = data.cols;
  gridRows = data.rows;
  arrows = data.arrows;

  // Deep copy cells for reset
  arrows.forEach(a => {
    a.removed = false;
    a.animating = false;
    a.animOffset = {x:0, y:0};
  });

  showScreen('gameScreen');
  updateHeartsUI();
  document.getElementById('gameLevelLabel').textContent = `${t.level || 'Level'} ${levelNum}`;

  resizeCanvas();
  requestAnimationFrame(gameLoop);
}

// ── Canvas Resize ──
function resizeCanvas() {
  const container = document.querySelector('.game-screen');
  const maxW = Math.min(window.innerWidth - 20, 500);
  const maxH = window.innerHeight - 100;

  const cellW = Math.floor(maxW / gridCols);
  const cellH = Math.floor(maxH / gridRows);
  cellSize = Math.min(cellW, cellH);

  const bw = cellSize * gridCols;
  const bh = cellSize * gridRows;

  canvas.width = bw + 20;
  canvas.height = bh + 20;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';

  boardX = 10;
  boardY = 10;
}

// ── Hearts UI ──
function updateHeartsUI() {
  const el = document.getElementById('hearts');
  let s = '';
  for (let i = 0; i < MAX_HEARTS; i++) {
    s += i < hearts ? '❤️' : '🖤';
  }
  el.innerHTML = s;
}

// ── Build current grid ──
function buildCurrentGrid() {
  let g = Array.from({length: gridRows}, () => Array(gridCols).fill(-1));
  for (let i = 0; i < arrows.length; i++) {
    if (arrows[i].removed) continue;
    for (const c of arrows[i].cells) {
      g[c.y][c.x] = i;
    }
  }
  return g;
}

// ── Check if arrow is free ──
function isCurrentArrowFree(idx) {
  const grid = buildCurrentGrid();
  return isArrowFree(idx, arrows, grid, gridCols, gridRows);
}

// ── Input ──
function onPointerDown(e) {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;

  const col = Math.floor((px - boardX) / cellSize);
  const row = Math.floor((py - boardY) / cellSize);

  if (col < 0 || col >= gridCols || row < 0 || row >= gridRows) return;

  const grid = buildCurrentGrid();
  const idx = grid[row][col];
  if (idx === -1) return;
  if (arrows[idx].animating) return;

  // Clear hint
  hintArrowIdx = -1;
  if (hintTimer) { clearInterval(hintTimer); hintTimer = null; }

  if (isArrowFree(idx, arrows, grid, gridCols, gridRows)) {
    // Slide out
    slideOutArrow(idx);
    playSound('whoosh');
  } else {
    // Blocked
    hearts--;
    mistakesMade++;
    updateHeartsUI();
    shakeArrowIdx = idx;
    shakeStart = performance.now();
    playSound('thud');
    showToast(gs.blocked);

    if (hearts <= 0) {
      setTimeout(() => showGameOverModal(), 600);
    }
  }
}

// ── Snake-style path-following slide out ──
// Each cell follows the PATH toward the head, like a snake slithering through a maze.
// Head exits first via the arrowhead direction, body follows the winding path, tail last.
function slideOutArrow(idx) {
  const arrow = arrows[idx];
  arrow.animating = true;
  arrow.animStart = performance.now();
  arrow.animOffset = { x: 0, y: 0 }; // not used, kept for compat

  // Build extended path: original path + exit cells beyond the head going off-board
  const cells = arrow.cells;
  const head = cells[cells.length - 1];
  const d = DIRS[arrow.dir];
  const exitCells = [];
  for (let i = 1; i <= cells.length + 2; i++) {
    exitCells.push({ x: head.x + d.dx * i, y: head.y + d.dy * i });
  }
  arrow._extPath = cells.concat(exitCells);

  // animSnakeOffset: 0 = original positions, N = each cell shifted N positions toward head
  arrow._snakeOffset = 0;
  const totalSteps = cells.length + 2; // enough for all cells to exit

  // 150ms per step - slow enough to watch the snake slither out
  const duration = totalSteps * 150;

  function animate(now) {
    const elapsed = now - arrow.animStart;
    const prog = Math.min(elapsed / duration, 1);
    // Nearly linear for consistent snake speed
    arrow._snakeOffset = prog * totalSteps;

    if (prog < 1) {
      requestAnimationFrame(animate);
    } else {
      arrow.removed = true;
      arrow.animating = false;
      removedCount++;

      const allRemoved = arrows.every(a => a.removed);
      if (allRemoved) {
        setTimeout(() => showVictoryModal(), 300);
        playSound('victory');
      }
    }
  }

  requestAnimationFrame(animate);
}

// ── Hint ──
function showHint() {
  const grid = buildCurrentGrid();
  for (let i = 0; i < arrows.length; i++) {
    if (arrows[i].removed) continue;
    if (isArrowFree(i, arrows, grid, gridCols, gridRows)) {
      hintArrowIdx = i;
      if (hintTimer) clearInterval(hintTimer);
      let toggle = true;
      hintTimer = setInterval(() => {
        toggle = !toggle;
        // The render loop handles visual pulsing
      }, 400);
      setTimeout(() => {
        hintArrowIdx = -1;
        if (hintTimer) { clearInterval(hintTimer); hintTimer = null; }
      }, 3000);
      return;
    }
  }
}

// ── Modals ──
function showVictoryModal() {
  const stars = hearts === MAX_HEARTS ? 3 : hearts === MAX_HEARTS - 1 ? 2 : 1;

  // Save progress
  const key = String(currentLevel);
  if (!progress[key] || progress[key].stars < stars) {
    progress[key] = { stars, unlocked: true };
  }
  // Unlock next
  if (currentLevel < TOTAL_LEVELS) {
    const nextKey = String(currentLevel + 1);
    if (!progress[nextKey]) progress[nextKey] = { stars: 0, unlocked: true };
    else progress[nextKey].unlocked = true;
  }
  saveProgress();

  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = gs.level_clear;
  document.getElementById('modalStars').innerHTML = '<span style="color:#ffdd00">' + '★'.repeat(stars) + '</span>' + '<span style="color:#555">' + '☆'.repeat(3 - stars) + '</span>';
  document.getElementById('modalMsg').textContent = stars === 3 ? (t.excellent || 'Excellent!') : stars === 2 ? (t.amazing || 'Amazing!') : (t.well_done || 'Well done!');

  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';

  if (currentLevel < TOTAL_LEVELS) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-primary';
    nextBtn.textContent = t.next_level || 'Next Level';
    nextBtn.onclick = () => { overlay.classList.remove('active'); startLevel(currentLevel + 1); };
    btns.appendChild(nextBtn);
  }

  const levelBtn = document.createElement('button');
  levelBtn.className = 'btn-secondary';
  levelBtn.textContent = t.level_select || 'Levels';
  levelBtn.onclick = () => { overlay.classList.remove('active'); showLevelSelect(); };
  btns.appendChild(levelBtn);

  overlay.classList.add('active');

  // Integration hooks
  try {
    if (window.PuzzleShare) {
      PuzzleShare.showShareModal({
        title: 'ArrowScape',
        score: currentLevel,
        stars: stars,
        message: `Level ${currentLevel} - ${'★'.repeat(stars)}`,
        lang: (typeof getGameLang === 'function') ? getGameLang() : 'en',
        gameName: 'arrowscape'
      });
    }
    if (window.PuzzleUser) {
      PuzzleUser.recordGame('arrowscape', currentLevel, { stars, hearts, level: currentLevel });
    }
  } catch(e) {}
}

function showGameOverModal() {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = gs.game_over;
  document.getElementById('modalStars').innerHTML = '💔';
  document.getElementById('modalMsg').textContent = gs.hearts_gone;

  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';

  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn-primary';
  retryBtn.textContent = t.try_again || 'Try Again';
  retryBtn.onclick = () => { overlay.classList.remove('active'); startLevel(currentLevel); };
  btns.appendChild(retryBtn);

  const levelBtn = document.createElement('button');
  levelBtn.className = 'btn-secondary';
  levelBtn.textContent = t.level_select || 'Levels';
  levelBtn.onclick = () => { overlay.classList.remove('active'); showLevelSelect(); };
  btns.appendChild(levelBtn);

  overlay.classList.add('active');
}

// ── Drawing ──
function drawBoard() {
  const w = canvas.width, h = canvas.height;

  // Background
  ctx.fillStyle = '#0f1028';
  ctx.fillRect(0, 0, w, h);

  // Board area
  const bw = gridCols * cellSize;
  const bh = gridRows * cellSize;

  // Dark navy board background with subtle gradient
  const bgGrad = ctx.createLinearGradient(boardX, boardY, boardX + bw, boardY + bh);
  bgGrad.addColorStop(0, '#0d1030');
  bgGrad.addColorStop(1, '#0a0c24');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(boardX, boardY, bw, bh);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (let r = 0; r <= gridRows; r++) {
    for (let c = 0; c <= gridCols; c++) {
      ctx.beginPath();
      ctx.arc(boardX + c * cellSize, boardY + r * cellSize, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= gridRows; r++) {
    ctx.beginPath();
    ctx.moveTo(boardX, boardY + r * cellSize);
    ctx.lineTo(boardX + bw, boardY + r * cellSize);
    ctx.stroke();
  }
  for (let c = 0; c <= gridCols; c++) {
    ctx.beginPath();
    ctx.moveTo(boardX + c * cellSize, boardY);
    ctx.lineTo(boardX + c * cellSize, boardY + bh);
    ctx.stroke();
  }
}

function getCellCenter(cell, arrow) {
  const ox = (arrow && arrow.animating) ? arrow.animOffset.x : 0;
  const oy = (arrow && arrow.animating) ? arrow.animOffset.y : 0;
  return {
    x: boardX + cell.x * cellSize + cellSize / 2 + ox,
    y: boardY + cell.y * cellSize + cellSize / 2 + oy
  };
}

function getCellEdge(cell, dir, arrow) {
  const c = getCellCenter(cell, arrow);
  const half = cellSize / 2;
  switch(dir) {
    case 'left':  return { x: c.x - half, y: c.y };
    case 'right': return { x: c.x + half, y: c.y };
    case 'up':    return { x: c.x, y: c.y - half };
    case 'down':  return { x: c.x, y: c.y + half };
  }
}

function getDirBetween(from, to) {
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  if (dx === 1) return 'right';
  if (dx === -1) return 'left';
  if (dy === 1) return 'down';
  if (dy === -1) return 'up';
  return null;
}

function drawArrowPath(arrow, idx) {
  if (arrow.removed && !arrow.animating) return;

  const cells = arrow.cells;
  const lineW = cellSize * 0.28;
  const color = arrow.color;

  // All cells visible (whole path moves together)
  const visibleStart = 0;
  const visibleEnd = cells.length - 1;

  // Hint pulsing
  let alpha = 1;
  if (idx === hintArrowIdx) {
    const now = performance.now();
    alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(now / 200));
  }

  // Shake
  let shakeOx = 0;
  if (idx === shakeArrowIdx) {
    const elapsed = performance.now() - shakeStart;
    if (elapsed < 400) {
      shakeOx = Math.sin(elapsed / 30 * Math.PI) * 5 * (1 - elapsed / 400);
    } else {
      shakeArrowIdx = -1;
    }
  }

  ctx.save();
  if (shakeOx !== 0) ctx.translate(shakeOx, 0);
  ctx.globalAlpha = alpha;

  // Shadow/glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lineW;

  // Snake animation: each cell shifts forward along the extended path.
  // extPath = [...original cells, ...exit cells off board]
  // At offset S, cell[i] is displayed at extPath[i + S] position.
  // The tail (cell[0]) traces the entire original path, then exits.
  // The head (cell[N-1]) exits first.

  const extPath = arrow._extPath || cells;
  const offset = arrow.animating ? (arrow._snakeOffset || 0) : 0;
  const floorOff = Math.floor(offset);
  const fracOff = offset - floorOff;

  // Compute shifted positions for each cell
  // Cell i -> position interpolated between extPath[i+floorOff] and extPath[i+floorOff+1]
  const shiftedPos = [];
  for (let i = 0; i < cells.length; i++) {
    const idx = i + floorOff;
    if (idx >= extPath.length) { shiftedPos.push(null); continue; }
    const p1 = extPath[idx];
    const p2 = (idx + 1 < extPath.length) ? extPath[idx + 1] : p1;
    shiftedPos.push({
      x: boardX + (p1.x + (p2.x - p1.x) * fracOff) * cellSize + cellSize / 2,
      y: boardY + (p1.y + (p2.y - p1.y) * fracOff) * cellSize + cellSize / 2
    });
  }

  // Filter to only on-screen positions
  const bx1 = boardX - cellSize;
  const by1 = boardY - cellSize;
  const bx2 = boardX + gridCols * cellSize + cellSize;
  const by2 = boardY + gridRows * cellSize + cellSize;

  const visible = [];
  for (let i = 0; i < shiftedPos.length; i++) {
    const p = shiftedPos[i];
    if (p && p.x >= bx1 && p.x <= bx2 && p.y >= by1 && p.y <= by2) {
      visible.push({ pos: p, idx: i });
    }
  }

  if (visible.length === 0) return;

  // Draw path as connected line segments through shifted positions
  ctx.beginPath();
  ctx.moveTo(visible[0].pos.x, visible[0].pos.y);
  for (let i = 1; i < visible.length; i++) {
    ctx.lineTo(visible[i].pos.x, visible[i].pos.y);
  }
  ctx.stroke();

  // Arrowhead at the last visible position (head end)
  const headEntry = visible[visible.length - 1];
  let headDir = arrow.dir;
  if (visible.length >= 2) {
    const prev = visible[visible.length - 2].pos;
    const head = headEntry.pos;
    const ddx = head.x - prev.x;
    const ddy = head.y - prev.y;
    if (Math.abs(ddx) > Math.abs(ddy)) headDir = ddx > 0 ? 'right' : 'left';
    else headDir = ddy > 0 ? 'down' : 'up';
  }
  const tipOff = cellSize * 0.4;
  _drawArrowTriangle({
    x: headEntry.pos.x + (headDir === 'right' ? tipOff : headDir === 'left' ? -tipOff : 0),
    y: headEntry.pos.y + (headDir === 'down' ? tipOff : headDir === 'up' ? -tipOff : 0)
  }, headDir, color);

  // Rounded tail cap
  const tailPos = visible[0].pos;
  ctx.beginPath();
  ctx.arc(tailPos.x, tailPos.y, lineW / 2, 0, Math.PI * 2);
  ctx.fill();

  // Chevrons (static only)
  if (!arrow.animating) drawChevronsStatic(arrow);

  ctx.restore();
}

function _drawArrowTriangle(pos, direction, color) {
  const as = cellSize * 0.4;
  ctx.save();
  ctx.shadowBlur = 0;
  ctx.fillStyle = color;
  ctx.beginPath();
  switch(direction) {
    case 'right':
      ctx.moveTo(pos.x - as, pos.y - as * 0.55);
      ctx.lineTo(pos.x, pos.y);
      ctx.lineTo(pos.x - as, pos.y + as * 0.55);
      break;
    case 'left':
      ctx.moveTo(pos.x + as, pos.y - as * 0.55);
      ctx.lineTo(pos.x, pos.y);
      ctx.lineTo(pos.x + as, pos.y + as * 0.55);
      break;
    case 'down':
      ctx.moveTo(pos.x - as * 0.55, pos.y - as);
      ctx.lineTo(pos.x, pos.y);
      ctx.lineTo(pos.x + as * 0.55, pos.y - as);
      break;
    case 'up':
      ctx.moveTo(pos.x - as * 0.55, pos.y + as);
      ctx.lineTo(pos.x, pos.y);
      ctx.lineTo(pos.x + as * 0.55, pos.y + as);
      break;
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Chevrons are only drawn on non-animating arrows for simplicity
function drawChevronsStatic(arrow) {
  const cells = arrow.cells;
  if (cells.length < 4 || arrow.animating) return;

  const chevSize = cellSize * 0.15;

  for (let i = 2; i < cells.length - 1; i += 2) {
    const cell = cells[i];
    const nextCell = cells[i + 1] || cells[i];
    const dir = getDirBetween(cell, nextCell) || arrow.dir;
    const center = getCellCenter(cell);

    ctx.save();
    ctx.strokeStyle = arrow.color;
    ctx.globalAlpha = 0.4;
    ctx.lineWidth = cellSize * 0.06;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 0;

    ctx.beginPath();
    switch(dir) {
      case 'right':
        ctx.moveTo(center.x - chevSize, center.y - chevSize);
        ctx.lineTo(center.x + chevSize * 0.3, center.y);
        ctx.lineTo(center.x - chevSize, center.y + chevSize);
        break;
      case 'left':
        ctx.moveTo(center.x + chevSize, center.y - chevSize);
        ctx.lineTo(center.x - chevSize * 0.3, center.y);
        ctx.lineTo(center.x + chevSize, center.y + chevSize);
        break;
      case 'down':
        ctx.moveTo(center.x - chevSize, center.y - chevSize);
        ctx.lineTo(center.x, center.y + chevSize * 0.3);
        ctx.lineTo(center.x + chevSize, center.y - chevSize);
        break;
      case 'up':
        ctx.moveTo(center.x - chevSize, center.y + chevSize);
        ctx.lineTo(center.x, center.y - chevSize * 0.3);
        ctx.lineTo(center.x + chevSize, center.y + chevSize);
        break;
    }
    ctx.stroke();
    ctx.restore();
  }
}

// ── Game Loop ──
let lastFrameTime = 0;
function gameLoop(timestamp) {
  drawBoard();

  // Draw all arrows
  for (let i = 0; i < arrows.length; i++) {
    drawArrowPath(arrows[i], i);
  }

  requestAnimationFrame(gameLoop);
}

// ── Resize ──
window.addEventListener('resize', () => {
  if (document.getElementById('gameScreen').classList.contains('active')) {
    resizeCanvas();
  }
});

// ── Boot ──
document.addEventListener('DOMContentLoaded', init);
