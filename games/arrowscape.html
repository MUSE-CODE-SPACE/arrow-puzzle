<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ArrowScape - Arrow Escape Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent-gradient: linear-gradient(135deg, #667eea, #764ba2);
  --accent1: #667eea;
  --accent2: #764ba2;
  --board-bg: #141428;
  --board-border: #2a2a4a;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; }
.screen.active { display: flex; }

/* Top Bar */
.top-bar {
  width: 100%; max-width: 600px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  background: none; border: none; color: var(--text-dim); font-size: 14px;
  font-family: 'Outfit', sans-serif; cursor: pointer; padding: 8px 12px;
  border-radius: 8px; transition: all 0.2s;
}
.back-btn:hover { background: var(--surface); color: var(--text); }
.sound-btn {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim);
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all 0.2s;
}
.sound-btn:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }

/* Title Screen */
.title-area {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px; text-align: center;
}
.game-logo {
  font-size: 3rem; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, #667eea, #a855f7, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.game-tagline {
  font-size: 1rem; color: var(--text-dim); margin-bottom: 40px; font-weight: 400;
}
.menu-btn {
  width: 240px; padding: 14px 0; border-radius: 14px; border: none;
  font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 600;
  cursor: pointer; transition: all 0.25s; margin-bottom: 12px;
}
.menu-btn.primary {
  background: linear-gradient(135deg, #667eea, #a855f7);
  color: #fff; box-shadow: 0 4px 20px rgba(102,126,234,0.3);
}
.menu-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(102,126,234,0.45); }
.menu-btn.secondary {
  background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.08);
}
.menu-btn.secondary:hover { background: var(--surface2); }

/* Level Select */
.level-select-area {
  width: 100%; max-width: 500px; padding: 16px; flex: 1; overflow-y: auto;
}
.level-select-title {
  font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 20px;
  background: linear-gradient(135deg, #667eea, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.level-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
}
.level-cell {
  aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  font-weight: 700; font-size: 1.1rem; transition: all 0.2s;
  background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.level-cell:hover { background: var(--surface2); transform: translateY(-2px); }
.level-cell.locked {
  opacity: 0.4; cursor: not-allowed; pointer-events: none;
}
.level-cell.completed { border-color: rgba(102,126,234,0.3); }
.level-stars {
  font-size: 0.6rem; margin-top: 2px; letter-spacing: 1px; color: #ffd93d;
}
.level-stars .empty { color: #444; }

/* Game Screen */
.game-header {
  width: 100%; max-width: 600px; padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.game-level-label {
  font-size: 1rem; font-weight: 700;
  background: linear-gradient(135deg, #667eea, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hearts-display {
  display: flex; gap: 4px; font-size: 1.2rem;
}
.heart { transition: all 0.3s; }
.heart.lost { opacity: 0.2; transform: scale(0.8); }
.arrows-left {
  font-size: 0.85rem; color: var(--text-dim); font-weight: 500;
}

.game-canvas-wrapper {
  width: 100%; max-width: 500px; padding: 8px 16px; flex: 1;
  display: flex; align-items: center; justify-content: center;
}
#gameCanvas {
  border-radius: 16px; background: var(--board-bg);
  border: 2px solid var(--board-border);
  touch-action: none; cursor: pointer;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.3);
}

.game-actions {
  width: 100%; max-width: 500px; padding: 12px 16px;
  display: flex; gap: 10px; justify-content: center;
}
.action-btn {
  padding: 10px 20px; border-radius: 12px; border: none;
  font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; background: var(--surface);
  color: var(--text); border: 1px solid rgba(255,255,255,0.06);
}
.action-btn:hover { background: var(--surface2); transform: translateY(-1px); }
.action-btn.hint-btn {
  background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(168,85,247,0.15));
  border-color: rgba(102,126,234,0.2);
}

/* Modal Overlay */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-box {
  background: linear-gradient(145deg, #111128, #0e0e24);
  border: 1px solid rgba(168,85,247,0.2); border-radius: 20px;
  padding: 32px 28px; max-width: 360px; width: 90%; text-align: center;
  transform: translateY(20px) scale(0.95); transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
.modal-title {
  font-size: 1.5rem; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #667eea, #a855f7, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.modal-stars { font-size: 2rem; margin: 12px 0; }
.modal-stars .star { margin: 0 4px; transition: all 0.3s; }
.modal-stars .star.empty { opacity: 0.2; }
.modal-msg { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.modal-btn {
  padding: 12px 24px; border-radius: 12px; border: none;
  font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.modal-btn.primary {
  background: linear-gradient(135deg, #667eea, #a855f7); color: #fff;
}
.modal-btn.secondary {
  background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.08);
}
.modal-btn:hover { transform: translateY(-1px); }

/* Ad area */
.ad-area {
  width: 100%; max-width: 500px; padding: 8px 16px; text-align: center;
}

/* Animations */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes heartPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(0.8); opacity: 0.2; }
}

/* Responsive */
@media (max-height: 700px) {
  .game-header { padding: 4px 16px; }
  .game-actions { padding: 8px 16px; }
}
</style>
</head>

<script>
(function() {
'use strict';

// ===== i18n =====
const GAME_TEXT = {
  ko: {
    tagline: '탈출을 마스터하세요',
    play: '게임 시작',
    levelSelect: '레벨 선택',
    arrowsLeft: '남은 화살: {n}',
    gameOver: '게임 오버',
    noHeartsLeft: '하트를 모두 소진했습니다',

  },
  en: {
    tagline: 'Master the Escape',
    play: 'Play',
    levelSelect: 'Select Level',
    arrowsLeft: 'Arrows: {n}',
    gameOver: 'Game Over',
    noHeartsLeft: 'No hearts remaining',
    blocked: 'Blocked!',
    levelClear: 'Level Clear!',
    perfect: 'Perfect!',
    wellDone: 'Well Done!',
    niceTry: 'Cleared!',
  },
  ja: {
    tagline: '脱出をマスターせよ',
    play: 'プレイ',
    levelSelect: 'レベル選択',
    arrowsLeft: '残り矢印: {n}',
    gameOver: 'ゲームオーバー',
    noHeartsLeft: 'ハートがなくなりました',
    blocked: 'ブロックされています！',
    levelClear: 'レベルクリア！',
    perfect: 'パーフェクト！',
    wellDone: 'よくできました！',
    niceTry: 'クリア！',
  },
  zh: {
    tagline: '掌握逃脱之道',
    play: '开始游戏',
    levelSelect: '选择关卡',
    arrowsLeft: '剩余箭头: {n}',
    gameOver: '游戏结束',
    noHeartsLeft: '没有剩余的心了',
    blocked: '被挡住了！',
    levelClear: '关卡通过！',
    perfect: '完美！',
    wellDone: '做得好！',
    niceTry: '通关！',
  },
  es: {
    tagline: 'Domina el Escape',
    play: 'Jugar',
    levelSelect: 'Elegir Nivel',
    arrowsLeft: 'Flechas: {n}',
    gameOver: 'Fin del Juego',
    noHeartsLeft: 'Sin corazones',
    blocked: '¡Bloqueado!',
    levelClear: '¡Nivel Completado!',
    perfect: '¡Perfecto!',
    wellDone: '¡Bien hecho!',
    niceTry: '¡Completado!',
  }
};

let t, gt; // game text, general translations

function initI18n() {
  const lang = typeof getGameLang === 'function' ? getGameLang() : 'ko';
  gt = typeof getTranslations === 'function' ? getTranslations() : {};
  t = GAME_TEXT[lang] || GAME_TEXT.ko;
}

// ===== Audio =====
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playWhoosh() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const dur = 0.35;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + dur);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + dur);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
    // Add noise burst
    const bufSize = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const ng = ctx.createGain();
    const nf = ctx.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.value = 2000;
    nf.Q.value = 0.5;
    ng.gain.setValueAtTime(0.08, ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    noise.connect(nf);
    nf.connect(ng);
    ng.connect(ctx.destination);
    noise.start(ctx.currentTime);
    noise.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playThud() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playSuccess() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.12 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.35);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.35);
    });
  } catch(e) {}
}

// ===== Save/Load =====
const SAVE_KEY = 'arrowscape_progress';

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.levels) return d;
  } catch(e) {}
  return { levels: {} };
}

function saveProgress(progress) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function getLevelProgress(lvl) {
  const p = loadProgress();
  return p.levels[lvl] || null;
}

function saveLevelProgress(lvl, stars) {
  const p = loadProgress();
  const existing = p.levels[lvl];
  if (!existing || stars > existing.stars) {
    p.levels[lvl] = { stars, completed: true };
  }
  saveProgress(p);
}

function getMaxUnlockedLevel() {
  const p = loadProgress();
  let max = 1;
  for (let i = 1; i <= 30; i++) {
    if (p.levels[i] && p.levels[i].completed) max = i + 1;
    else break;
  }
  return Math.min(max, 30);
}

// ===== Arrow Path Colors =====
const COLORS = [
  '#00e5ff', // cyan
  '#ff6d00', // orange
  '#ff4081', // pink
  '#ffeb3b', // yellow
  '#69f0ae', // green
  '#e0e0e0', // white/light gray
  '#ea80fc', // magenta
  '#448aff', // blue
  '#ff8a65', // coral
  '#b2ff59', // lime
];

// ===== Direction helpers =====
const DIR = {
  UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3
};
const DIR_DX = [0, 1, 0, -1];
const DIR_DY = [-1, 0, 1, 0];
const DIR_NAMES = ['up', 'right', 'down', 'left'];

function oppositeDir(d) { return (d + 2) % 4; }

// ===== Level Definitions =====
// Each arrow: { cells: [[col,row],...], dir: exit direction, color: index }
// cells[last] is near the exit edge; dir is the direction the arrowhead points
// The arrow slides out in dir from cells[last]
// removalOrder: indices into arrows array, the correct order to remove them

// Grid size: 8 cols x 10 rows

const GRID_COLS = 8;
const GRID_ROWS = 10;

function buildLevels() {
  const levels = [];

  // Helper: create arrow definition
  function arrow(cells, dir, colorIdx) {
    return { cells, dir, color: colorIdx };
  }

  // Level 1: 3 arrows, very simple
  levels.push({
    arrows: [
      arrow([[1,2],[2,2],[3,2],[4,2]], DIR.RIGHT, 0),
      arrow([[3,5],[3,4],[3,3]], DIR.UP, 1),
      arrow([[5,7],[5,6],[5,5],[5,4]], DIR.UP, 2),
    ],
    removalOrder: [0, 2, 1]
  });

  // Level 2
  levels.push({
    arrows: [
      arrow([[6,3],[6,4],[6,5],[6,6]], DIR.DOWN, 3),
      arrow([[2,6],[3,6],[4,6],[5,6]], DIR.RIGHT, 0),
      arrow([[1,4],[2,4],[3,4]], DIR.RIGHT, 4),
    ],
    removalOrder: [0, 1, 2]
  });

  // Level 3
  levels.push({
    arrows: [
      arrow([[2,1],[2,2],[2,3],[2,4]], DIR.DOWN, 5),
      arrow([[5,8],[5,7],[5,6],[5,5]], DIR.UP, 2),
      arrow([[1,5],[2,5],[3,5],[4,5],[5,5]], DIR.RIGHT, 1),
    ],
    removalOrder: [0, 1, 2]
  });

  // Level 4
  levels.push({
    arrows: [
      arrow([[1,3],[2,3],[3,3],[4,3]], DIR.RIGHT, 0),
      arrow([[4,3],[4,4],[4,5],[4,6]], DIR.DOWN, 6),
      arrow([[6,1],[6,2],[6,3]], DIR.DOWN, 3),
      arrow([[2,7],[3,7],[4,7],[5,7]], DIR.RIGHT, 2),
    ],
    removalOrder: [2, 0, 1, 3]
  });

  // Level 5
  levels.push({
    arrows: [
      arrow([[3,0],[3,1],[3,2],[3,3]], DIR.DOWN, 7),
      arrow([[0,5],[1,5],[2,5],[3,5]], DIR.RIGHT, 4),
      arrow([[5,3],[5,4],[5,5]], DIR.DOWN, 1),
      arrow([[6,7],[6,6],[6,5]], DIR.UP, 0),
    ],
    removalOrder: [0, 2, 3, 1]
  });

  // Level 6: 4-5 arrows with turns
  levels.push({
    arrows: [
      arrow([[1,2],[2,2],[3,2],[3,3],[3,4]], DIR.DOWN, 0),
      arrow([[5,1],[5,2],[5,3],[5,4],[5,5]], DIR.DOWN, 3),
      arrow([[1,6],[2,6],[3,6],[4,6]], DIR.RIGHT, 2),
      arrow([[6,8],[6,7],[6,6]], DIR.UP, 5),
      arrow([[0,4],[1,4],[2,4]], DIR.RIGHT, 7),
    ],
    removalOrder: [1, 3, 0, 2, 4]
  });

  // Level 7
  levels.push({

const LEVELS = buildLevels();
const TOTAL_LEVELS = LEVELS.length;

// ===== Game State =====
let currentScreen = 'title';
let currentLevel = 1;
let hearts = 3;
let arrows = [];       // active arrows in current level
let removedArrows = []; // removed arrows (for animation trail)
let animating = false;
let hintArrowIdx = -1;
let hintFlashTimer = 0;

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cellSize = 40;
let boardX = 0, boardY = 0;
let canvasW = 0, canvasH = 0;
let dpr = 1;

// Animation state
let slideAnim = null; // { arrowIdx, progress, startTime, duration, arrow }

// ===== Screen Management =====
function showScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const map = { title: 'titleScreen', levels: 'levelScreen', game: 'gameScreen' };
  document.getElementById(map[name]).classList.add('active');
  if (name === 'levels') renderLevelGrid();
  if (name === 'game') initLevel(currentLevel);
}

// ===== Level Grid =====
function renderLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const maxUnlocked = getMaxUnlockedLevel();
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    const cell = document.createElement('div');
    cell.className = 'level-cell';
    const prog = getLevelProgress(i);
    if (i > maxUnlocked) {
      cell.classList.add('locked');
      cell.innerHTML = `<span>🔒</span>`;
    } else {
      if (prog && prog.completed) cell.classList.add('completed');
      cell.innerHTML = `<span>${i}</span>`;
      if (prog && prog.stars) {
        let starsHtml = '';
        for (let s = 0; s < 3; s++) {
          starsHtml += s < prog.stars ? '★' : '<span class="empty">★</span>';
        }
        cell.innerHTML += `<div class="level-stars">${starsHtml}</div>`;
      }
      cell.addEventListener('click', () => { currentLevel = i; showScreen('game'); });
    }
    grid.appendChild(cell);
  }
}

// ===== Init Level =====
function initLevel(lvl) {
  const levelData = LEVELS[lvl - 1];
  if (!levelData) return;
  hearts = 3;
  hintArrowIdx = -1;
  animating = false;
  slideAnim = null;
  removedArrows = [];

  // Deep copy arrows
  arrows = levelData.arrows.map((a, idx) => ({
    cells: a.cells.map(c => [...c]),
    dir: a.dir,
    color: COLORS[a.color % COLORS.length],
    colorIdx: a.color,
    removed: false,
    originalIdx: idx,
  }));

  updateHeartsDisplay();
  updateArrowsLeftDisplay();
  document.getElementById('gameLevelLabel').textContent =
    `${gt.level || 'Level'} ${lvl}`;

  resizeCanvas();
  render();
}

// ===== Canvas Sizing =====
function resizeCanvas() {
  const wrapper = document.querySelector('.game-canvas-wrapper');
  const maxW = wrapper.clientWidth - 32;
  const maxH = wrapper.clientHeight - 16;

  // Calculate cell size to fit grid
  const fitW = Math.floor(maxW / GRID_COLS);
  const fitH = Math.floor(maxH / GRID_ROWS);
  cellSize = Math.min(fitW, fitH, 50);

  canvasW = GRID_COLS * cellSize;
  canvasH = GRID_ROWS * cellSize;

  dpr = window.devicePixelRatio || 1;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';

  boardX = 0;
  boardY = 0;
}

// ===== Rendering =====
function render() {
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Board background
  ctx.fillStyle = '#141428';
  ctx.beginPath();
  roundRect(ctx, 0, 0, canvasW, canvasH, 14);
  ctx.fill();

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let r = 0; r <= GRID_ROWS; r++) {
    for (let c = 0; c <= GRID_COLS; c++) {
      ctx.beginPath();
      ctx.arc(c * cellSize, r * cellSize, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw removed arrow trails (faded)
  removedArrows.forEach(ra => {
    drawArrowPath(ra, 0.12, false);
  });

  // Draw active arrows
  const activeArrows = arrows.filter(a => !a.removed);
  activeArrows.forEach((a, i) => {
    const isHint = hintArrowIdx >= 0 && a.originalIdx === hintArrowIdx;
    const alpha = isHint ? 0.5 + 0.5 * Math.sin(hintFlashTimer * 5) : 1.0;
    drawArrowPath(a, alpha, true);
  });

  // Draw slide animation
  if (slideAnim) {
    drawSlideAnimation();
  }

  ctx.restore();
}

function drawArrowPath(arrow, alpha, drawHead) {
  if (arrow.cells.length < 2) return;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const thickness = cellSize * 0.45;

  // Draw path shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = thickness + 4;
  ctx.beginPath();
  arrow.cells.forEach((cell, i) => {
    const x = cell[0] * cellSize + cellSize / 2;
    const y = cell[1] * cellSize + cellSize / 2;
    if (i === 0) ctx.moveTo(x, y + 2);
    else ctx.lineTo(x, y + 2);
  });
  ctx.stroke();

  // Draw main path
  const grad = ctx.createLinearGradient(
    arrow.cells[0][0] * cellSize, arrow.cells[0][1] * cellSize,
    arrow.cells[arrow.cells.length-1][0] * cellSize,
    arrow.cells[arrow.cells.length-1][1] * cellSize
  );
  const baseColor = arrow.color;
  grad.addColorStop(0, baseColor);
  grad.addColorStop(1, adjustBrightness(baseColor, -20));

  ctx.strokeStyle = grad;
  ctx.lineWidth = thickness;
  ctx.beginPath();
  arrow.cells.forEach((cell, i) => {
    const x = cell[0] * cellSize + cellSize / 2;
    const y = cell[1] * cellSize + cellSize / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = thickness * 0.35;
  ctx.beginPath();
  arrow.cells.forEach((cell, i) => {
    const x = cell[0] * cellSize + cellSize / 2;
    const y = cell[1] * cellSize + cellSize / 2 - 1;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Draw arrowhead at the LAST cell
  if (drawHead) {
    const lastCell = arrow.cells[arrow.cells.length - 1];
    const hx = lastCell[0] * cellSize + cellSize / 2;
    const hy = lastCell[1] * cellSize + cellSize / 2;
    drawArrowHead(hx, hy, arrow.dir, baseColor, thickness);
  }

  ctx.restore();
}

function drawArrowHead(x, y, dir, color, thickness) {
  ctx.save();
  ctx.fillStyle = color;

  const size = thickness * 0.7;
  const angle = dir * Math.PI / 2 - Math.PI / 2; // UP=0 -> -PI/2

  ctx.translate(x, y);
  ctx.rotate(angle);

  // Arrow triangle pointing UP (then rotated)
  ctx.beginPath();
  ctx.moveTo(0, -size * 1.1);
  ctx.lineTo(-size * 0.8, size * 0.3);
  ctx.lineTo(size * 0.8, size * 0.3);
  ctx.closePath();
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.9);
  ctx.lineTo(-size * 0.4, size * 0.0);
  ctx.lineTo(size * 0.1, size * 0.0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawSlideAnimation() {
  if (!slideAnim) return;
  const { arrow: a, progress, dir } = slideAnim;

  const maxSlide = Math.max(canvasW, canvasH) + cellSize * 2;
  const offset = progress * maxSlide;

  ctx.save();
  // Translate the entire arrow in the exit direction
  ctx.translate(DIR_DX[dir] * offset, DIR_DY[dir] * offset);
  ctx.globalAlpha = 1.0 - progress * 0.5;

  drawArrowPath(a, 1.0, true);

  ctx.restore();

  // Draw trail particles
  if (progress < 0.7) {
    const lastCell = a.cells[a.cells.length - 1];
    const px = lastCell[0] * cellSize + cellSize / 2 + DIR_DX[dir] * offset;
    const py = lastCell[1] * cellSize + cellSize / 2 + DIR_DY[dir] * offset;
    drawTrailParticles(px, py, a.color, progress);
  }
}

function drawTrailParticles(x, y, color, progress) {
  ctx.save();
  const count = 6;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * cellSize * 0.8;
    const px = x + Math.cos(angle) * dist;
    const py = y + Math.sin(angle) * dist;
    const size = (1 - progress) * cellSize * 0.15 * Math.random();
    ctx.globalAlpha = (1 - progress) * 0.5;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function adjustBrightness(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  let r = Math.min(255, Math.max(0, ((num >> 16) & 0xff) + amount));
  let g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amount));
  let b = Math.min(255, Math.max(0, (num & 0xff) + amount));
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

// ===== Game Logic =====
function canRemoveArrow(arrowIdx) {
  const a = arrows[arrowIdx];
  if (!a || a.removed) return false;

  // Check if the exit path is clear
  // The arrow exits from its last cell in direction a.dir
  // We need to check all cells in the arrow along the exit direction
  // For each cell, check if the path from that cell to the edge in dir is clear

  // Build set of all occupied cells by OTHER active arrows
  const occupied = new Set();
  arrows.forEach((other, oi) => {
    if (oi === arrowIdx || other.removed) return;
    other.cells.forEach(c => occupied.add(`${c[0]},${c[1]}`));
  });

  // For each cell of this arrow, check if the cells in the exit direction
  // until the edge are free (from other arrows only)
  for (const cell of a.cells) {
    let cx = cell[0] + DIR_DX[a.dir];
    let cy = cell[1] + DIR_DY[a.dir];
    while (cx >= 0 && cx < GRID_COLS && cy >= 0 && cy < GRID_ROWS) {
      // Check if this position is occupied by another arrow AND
      // is not also occupied by this arrow (self-intersection is OK)
      const key = `${cx},${cy}`;
      const selfOccupied = a.cells.some(sc => sc[0] === cx && sc[1] === cy);
      if (occupied.has(key) && !selfOccupied) {
        return false;
      }
      cx += DIR_DX[a.dir];
      cy += DIR_DY[a.dir];
    }
  }

  return true;
}

function findNextRemovable() {
  const levelData = LEVELS[currentLevel - 1];
  if (!levelData) return -1;

  // Find the next arrow in the removal order that hasn't been removed
  for (const idx of levelData.removalOrder) {
    if (!arrows[idx].removed && canRemoveArrow(idx)) {
      return idx;
    }
  }
  // Fallback: find any removable
  for (let i = 0; i < arrows.length; i++) {
    if (!arrows[i].removed && canRemoveArrow(i)) return i;
  }
  return -1;
}

function attemptRemove(arrowIdx) {
  if (animating) return;
  if (arrows[arrowIdx].removed) return;

  if (canRemoveArrow(arrowIdx)) {
    // Success - animate removal
    animating = true;
    hintArrowIdx = -1;
    playWhoosh();

    const a = arrows[arrowIdx];
    slideAnim = {
      arrowIdx,
      arrow: { ...a, cells: a.cells.map(c => [...c]) },
      dir: a.dir,
      progress: 0,
      startTime: performance.now(),
      duration: 400,
    };

    a.removed = true;
    removedArrows.push({ ...a, cells: a.cells.map(c => [...c]) });

    animateSlide();
  } else {
    // Blocked
    playThud();
    hearts--;
    updateHeartsDisplay();
    shakeCanvas();

    if (hearts <= 0) {
      setTimeout(() => showGameOver(), 600);
    }
  }
}

function animateSlide() {
  if (!slideAnim) return;

  const elapsed = performance.now() - slideAnim.startTime;
  slideAnim.progress = Math.min(1, elapsed / slideAnim.duration);

  // Ease out
  slideAnim.progress = 1 - Math.pow(1 - slideAnim.progress, 3);

  render();

  if (elapsed < slideAnim.duration) {
    requestAnimationFrame(animateSlide);
  } else {
    slideAnim = null;
    animating = false;
    updateArrowsLeftDisplay();
    render();

    // Check win
    if (arrows.every(a => a.removed)) {
      setTimeout(() => showLevelComplete(), 300);
    }
  }
}

function shakeCanvas() {
  canvas.style.animation = 'shake 0.4s ease';
  setTimeout(() => { canvas.style.animation = ''; }, 400);
}

// ===== UI Updates =====
function updateHeartsDisplay() {
  const container = document.getElementById('heartsDisplay');
  let html = '';
  for (let i = 0; i < 3; i++) {
    html += `<span class="heart${i >= hearts ? ' lost' : ''}">❤️</span>`;
  }
  container.innerHTML = html;
}

function updateArrowsLeftDisplay() {
  const remaining = arrows.filter(a => !a.removed).length;
  document.getElementById('arrowsLeft').textContent =
    t.arrowsLeft.replace('{n}', remaining);
}

// ===== Click/Tap Handling =====
function getClickedArrow(x, y) {
  // Convert canvas coordinates to grid
  const col = Math.floor(x / cellSize);
  const row = Math.floor(y / cellSize);

  // Find which arrow contains this cell (check active arrows, prefer topmost/last)
  for (let i = arrows.length - 1; i >= 0; i--) {
    if (arrows[i].removed) continue;
    for (const cell of arrows[i].cells) {
      if (cell[0] === col && cell[1] === row) return i;
    }
  }

  // Also check nearby cells (for fat-finger tolerance)
  const nearCol = Math.round(x / cellSize - 0.5);
  const nearRow = Math.round(y / cellSize - 0.5);
  for (let i = arrows.length - 1; i >= 0; i--) {
    if (arrows[i].removed) continue;
    for (const cell of arrows[i].cells) {
      const dx = Math.abs(cell[0] - nearCol);
      const dy = Math.abs(cell[1] - nearRow);
      if (dx <= 0.5 && dy <= 0.5) return i;
    }
  }

  return -1;
}

canvas.addEventListener('click', (e) => {
  if (animating) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvasW / rect.width);
  const y = (e.clientY - rect.top) * (canvasH / rect.height);

  const idx = getClickedArrow(x, y);
  if (idx >= 0) attemptRemove(idx);
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (animating) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) * (canvasW / rect.width);
  const y = (touch.clientY - rect.top) * (canvasH / rect.height);

  const idx = getClickedArrow(x, y);
  if (idx >= 0) attemptRemove(idx);
}, { passive: false });

// ===== Modals =====
function showLevelComplete() {
  playSuccess();
  const stars = hearts; // 3 hearts = 3 stars, etc.
  saveLevelProgress(currentLevel, stars);

  const modal = document.getElementById('completeModal');
  document.getElementById('modalTitle').textContent = t.levelClear;

  let starsHtml = '';
  for (let i = 0; i < 3; i++) {
    starsHtml += `<span class="star${i >= stars ? ' empty' : ''}">⭐</span>`;
  }
  document.getElementById('modalStars').innerHTML = starsHtml;

  const msg = stars === 3 ? t.perfect : stars === 2 ? t.wellDone : t.niceTry;
  document.getElementById('modalMsg').textContent = msg;

  document.getElementById('modalRestart').textContent = gt.restart || 'Restart';
  document.getElementById('modalNext').textContent = gt.next_level || 'Next Level';

  modal.classList.add('active');

  // Share and record
  try {
    if (typeof PuzzleShare !== 'undefined') {
      PuzzleShare.showShareModal({
        gameName: 'ArrowScape',
        title: t.levelClear,
        stars: stars,
        message: `Level ${currentLevel} - ${msg}`,
      });
    }
  } catch(e) {}

  try {
    if (typeof PuzzleUser !== 'undefined') {
      PuzzleUser.recordGame('arrowscape', { level: currentLevel, stars });
    }
  } catch(e) {}
}

function showGameOver() {
  const modal = document.getElementById('gameOverModal');
  document.getElementById('goTitle').textContent = t.gameOver;
  document.getElementById('goMsg').textContent = t.noHeartsLeft;
  document.getElementById('goBack').textContent = gt.back || 'Back';
  document.getElementById('goRetry').textContent = gt.try_again || 'Retry';
  modal.classList.add('active');
}

function hideModal(id) {
  document.getElementById(id).classList.remove('active');
}

// ===== Hint =====
function showHint() {
  const idx = findNextRemovable();
  if (idx >= 0) {
    hintArrowIdx = idx;
    hintFlashTimer = 0;
    const startTime = performance.now();
    function flashHint() {
      hintFlashTimer = (performance.now() - startTime) / 1000;
      render();
      if (hintFlashTimer < 2.0) requestAnimationFrame(flashHint);
      else { hintArrowIdx = -1; render(); }
    }
    flashHint();
  }
}

// ===== Event Listeners =====
function setupEvents() {
  // Back buttons
  document.getElementById('backToMain').addEventListener('click', () => {
    window.location.href = typeof getBackLink === 'function' ? getBackLink() : '../index.html';
  });
  document.getElementById('backToTitle1').addEventListener('click', () => showScreen('title'));
  document.getElementById('backToTitle2').addEventListener('click', () => showScreen('title'));

  // Sound toggles
  [document.getElementById('soundToggle1'),
   document.getElementById('soundToggle2'),
   document.getElementById('soundToggle3')].forEach(btn => {
    btn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      const icon = soundEnabled ? '🔊' : '🔇';
      document.getElementById('soundToggle1').textContent = icon;
      document.getElementById('soundToggle2').textContent = icon;
      document.getElementById('soundToggle3').textContent = icon;
    });
  });

  // Menu buttons
  document.getElementById('playBtn').addEventListener('click', () => {
    currentLevel = getMaxUnlockedLevel();
    // If all completed, go to level 1
    const p = loadProgress();
    if (p.levels[TOTAL_LEVELS] && p.levels[TOTAL_LEVELS].completed) currentLevel = 1;
    showScreen('game');
  });
  document.getElementById('levelSelectBtn').addEventListener('click', () => showScreen('levels'));

  // Game actions
  document.getElementById('restartBtn').addEventListener('click', () => initLevel(currentLevel));
  document.getElementById('hintBtn').addEventListener('click', showHint);

  // Modal actions
  document.getElementById('modalRestart').addEventListener('click', () => {
    hideModal('completeModal');
    initLevel(currentLevel);
  });
  document.getElementById('modalNext').addEventListener('click', () => {
    hideModal('completeModal');
    if (currentLevel < TOTAL_LEVELS) {
      currentLevel++;
      initLevel(currentLevel);
    } else {
      showScreen('levels');
    }
  });
  document.getElementById('goBack').addEventListener('click', () => {
    hideModal('gameOverModal');
    showScreen('levels');
  });
  document.getElementById('goRetry').addEventListener('click', () => {
    hideModal('gameOverModal');
    initLevel(currentLevel);
  });

  // Resize
  window.addEventListener('resize', () => {
    if (currentScreen === 'game') {
      resizeCanvas();
      render();
    }
  });
}

// ===== Apply i18n to UI =====
function applyText() {
  document.getElementById('backToMain').textContent = gt.back || '← Back';
  document.getElementById('backToTitle1').textContent = gt.back || '← Back';
  document.getElementById('backToTitle2').textContent = gt.back || '← Back';
  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('playBtn').textContent = t.play;
  document.getElementById('levelSelectBtn').textContent = t.levelSelect;
  document.getElementById('levelSelectTitle').textContent = t.levelSelect;
  document.getElementById('restartBtn').textContent = gt.restart || 'Restart';
  document.getElementById('hintBtn').textContent = gt.hint || 'Hint';
}

// ===== Init =====
function init() {
  initI18n();
  applyText();
  setupEvents();
  showScreen('title');
}

init();

})();
</script>
