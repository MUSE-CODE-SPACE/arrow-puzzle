<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ArrowScape - Arrow Escape Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent1: #667eea;
  --accent2: #764ba2;
  --board-bg: #1a1a2e;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; }
.screen.active { display: flex; }

/* Title Screen */
.title-screen {
  justify-content: center;
  gap: 24px;
  padding: 40px 20px;
}
.title-logo {
  font-size: 56px;
  font-weight: 800;
  background: linear-gradient(135deg, #00d4ff, #ff44ff, #ffdd00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  letter-spacing: -2px;
  line-height: 1.1;
}
.title-sub {
  font-size: 16px;
  color: var(--text-dim);
  text-align: center;
}
.play-btn {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
  border: none;
  padding: 16px 64px;
  border-radius: 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(102, 126, 234, 0.3);
}
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(102, 126, 234, 0.5); }
.play-btn:active { transform: scale(0.97); }

/* Level Select */
.level-screen { padding: 20px; }
.level-header {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; margin-bottom: 16px;
}
.level-title { font-size: 22px; font-weight: 700; }
.back-btn {
  background: none; border: none; color: var(--text-dim); font-size: 14px;
  font-family: 'Outfit', sans-serif; cursor: pointer; padding: 8px 12px;
  border-radius: 8px; transition: all 0.2s;
}
.back-btn:hover { background: var(--surface); color: var(--text); }
.level-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  max-width: 480px;
  width: 100%;
}
.level-cell {
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  position: relative;
}
.level-cell.unlocked {
  background: var(--surface2);
  border-color: rgba(255,255,255,0.06);
}
.level-cell.unlocked:hover {
  border-color: var(--accent1);
  transform: translateY(-2px);
}
.level-cell.locked {
  background: rgba(255,255,255,0.03);
  color: var(--text-dim);
  cursor: default;
  opacity: 0.4;
}
.level-cell .stars-row {
  font-size: 10px;
  margin-top: 2px;
  letter-spacing: 1px;
  color: #f9d423;
}
.level-cell .lock-icon {
  font-size: 16px;
  opacity: 0.4;
}

/* Game Screen */
.game-screen { padding: 0; }
.top-bar {
  width: 100%; max-width: 600px; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-left { display: flex; align-items: center; gap: 8px; }
.top-right { display: flex; align-items: center; gap: 6px; }
.hearts { font-size: 20px; letter-spacing: 2px; }
.level-label { font-size: 16px; font-weight: 600; color: var(--text-dim); }
.icon-btn {
  background: none; border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); width: 36px; height: 36px;
  border-radius: 50%; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: 'Outfit', sans-serif;
}
.icon-btn:hover { background: var(--surface); color: var(--text); border-color: rgba(255,255,255,0.2); }

.canvas-wrap {
  width: 100%; max-width: 600px;
  display: flex; justify-content: center; align-items: center;
  flex: 1; padding: 8px;
}
#gameCanvas { display: block; border-radius: 12px; touch-action: none; }

.msg-bar {
  width: 100%; max-width: 600px; text-align: center;
  padding: 8px 16px; min-height: 36px;
  font-size: 14px; font-weight: 600; color: var(--text-dim);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.modal-overlay.active { display: flex; opacity: 1; }
.modal {
  background: linear-gradient(145deg, #111128, #0e0e24);
  border: 1px solid rgba(102, 126, 234, 0.2);
  border-radius: 20px; padding: 32px 28px;
  max-width: 360px; width: 90%; text-align: center;
}
.modal h2 {
  font-size: 24px; font-weight: 800; margin-bottom: 16px;
  background: linear-gradient(135deg, #667eea, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.modal .star-display { font-size: 40px; margin: 12px 0; letter-spacing: 6px; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
.modal-btn {
  padding: 12px 28px; border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.modal-btn.primary {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
}
.modal-btn.secondary {
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.1);
}
.modal-btn:hover { transform: translateY(-1px); }

.sound-btn {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim);
  font-size: 18px; width: 36px; height: 36px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; position: fixed; top: 12px; right: 12px; z-index: 100;
}
</style>
</head>
<body>

<!-- Title Screen -->
<div id="titleScreen" class="screen title-screen active">
  <div class="title-logo">Arrow<br>Scape</div>
  <div class="title-sub" data-i18n="escape"></div>
  <button class="play-btn" onclick="showScreen('levelScreen')">PLAY</button>
  <button class="sound-btn" id="soundToggle" onclick="toggleSound()">&#x1F50A;</button>
</div>

<!-- Level Select -->
<div id="levelScreen" class="screen level-screen">
  <div class="level-header">
    <button class="back-btn" onclick="showScreen('titleScreen')" data-i18n="back"></button>
    <div class="level-title" data-i18n="level_select"></div>
    <div style="width:60px"></div>
  </div>
  <div class="level-grid" id="levelGrid"></div>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="screen game-screen">
  <div class="top-bar">
    <div class="top-left">
      <button class="icon-btn" onclick="backToLevels()">&larr;</button>
      <span class="level-label" id="levelLabel"></span>
    </div>
    <div class="top-right">
      <span class="hearts" id="heartsDisplay"></span>
      <button class="icon-btn" id="hintBtn" onclick="useHint()">&#x1F4A1;</button>
      <button class="icon-btn" onclick="restartLevel()">&#x21A9;</button>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="msg-bar" id="msgBar"></div>
</div>

<!-- Level Complete Modal -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <h2 id="completeTitle"></h2>
    <div class="star-display" id="starDisplay"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="restartLevel(); closeModal();" data-i18n="restart"></button>
      <button class="modal-btn primary" id="nextLevelBtn" onclick="nextLevel(); closeModal();"></button>
    </div>
  </div>
</div>

<script>
// =============================================
// ArrowScape - Arrow Escape Puzzle (No Overlap)
// =============================================

const TOTAL_LEVELS = 30;
const COLORS = [
  '#00d4ff', '#ff8c00', '#ffaacc', '#ffdd00', '#00ff66',
  '#e0e0e0', '#ff44ff', '#4488ff', '#ff6b6b', '#88ff00',
  '#ff5599', '#88ddff', '#ddff88', '#ff88dd', '#88ffdd'
];
const BOARD_BG = '#1a1a2e';

// -- i18n --
const GAME_I18N_LOCAL = {
  ko: { escape: '탈출시켜라!', blocked: '막혀있어요!', level_clear: '레벨 클리어!', removed: '제거!', hearts: '하트', hint_used: '힌트 사용' },
  en: { escape: 'Escape!', blocked: 'Blocked!', level_clear: 'Level Clear!', removed: 'Removed!', hearts: 'Hearts', hint_used: 'Hint Used' },
  ja: { escape: '脱出せよ！', blocked: 'ブロック！', level_clear: 'レベルクリア！', removed: '除去！', hearts: 'ハート', hint_used: 'ヒント使用' },
  zh: { escape: '逃脱！', blocked: '被挡住了！', level_clear: '关卡通过！', removed: '消除！', hearts: '心', hint_used: '提示已用' },
  es: { escape: '!Escapa!', blocked: '!Bloqueado!', level_clear: '!Nivel completado!', removed: '!Eliminado!', hearts: 'Vidas', hint_used: 'Pista usada' },
};

function gt(key) {
  const lang = typeof getGameLang === 'function' ? getGameLang() : 'ko';
  const local = GAME_I18N_LOCAL[lang] || GAME_I18N_LOCAL.ko;
  if (local[key]) return local[key];
  if (typeof getTranslations === 'function') {
    const t = getTranslations();
    if (t[key]) return t[key];
  }
  return key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    const v = gt(k);
    if (v && v !== k) el.textContent = v;
  });
}

// -- Seeded RNG --
class SeededRNG {
  constructor(seed) { this.s = seed % 2147483647; if (this.s <= 0) this.s += 2147483646; }
  next() { this.s = (this.s * 16807) % 2147483647; return (this.s - 1) / 2147483646; }
  nextInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); }
  pick(arr) { return arr[this.nextInt(0, arr.length - 1)]; }
  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.nextInt(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

// -- Sound --
let soundEnabled = true;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '\u{1F50A}' : '\u{1F507}';
}
function playWhoosh() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const dur = 0.25;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / ctx.sampleRate;
      const env = Math.max(0, 1 - t / dur) * 0.3;
      const freq = 800 - t * 2000;
      d[i] = env * (Math.random() * 2 - 1) * (0.3 + 0.7 * Math.sin(2 * Math.PI * freq * t));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start();
  } catch(e) {}
}
function playThud() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(100, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}
function playVictory() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.12 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.12 + 0.35);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.4);
    });
  } catch(e) {}
}

// -- Screen Management --
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'levelScreen') buildLevelGrid();
  applyI18n();
}

// -- Progress --
function getProgress() {
  try { return JSON.parse(localStorage.getItem('arrowscape_progress') || '{}'); }
  catch(e) { return {}; }
}
function saveProgress(level, stars) {
  const p = getProgress();
  const prev = p[level] || 0;
  p[level] = Math.max(prev, stars);
  localStorage.setItem('arrowscape_progress', JSON.stringify(p));
}
function isUnlocked(level) {
  if (level === 1) return true;
  const p = getProgress();
  return (p[level - 1] || 0) > 0;
}

// -- Level Grid --
function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const p = getProgress();
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    const cell = document.createElement('div');
    const unlocked = isUnlocked(i);
    cell.className = 'level-cell ' + (unlocked ? 'unlocked' : 'locked');
    if (unlocked) {
      cell.innerHTML = '<span>' + i + '</span>';
      const s = p[i] || 0;
      if (s > 0) {
        const starsStr = '\u2605'.repeat(s) + '\u2606'.repeat(3 - s);
        cell.innerHTML += '<span class="stars-row">' + starsStr + '</span>';
      }
      cell.onclick = () => startLevel(i);
    } else {
      cell.innerHTML = '<span class="lock-icon">\u{1F512}</span>';
    }
    grid.appendChild(cell);
  }
}

// -- Direction Helpers --
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];
const DIR_NAMES = ['UP', 'RIGHT', 'DOWN', 'LEFT'];
function oppositeDir(d) { return (d + 2) % 4; }

// -- Level Configs --
function getLevelConfig(level) {
  if (level <= 3) return { cols: 6, rows: 8, numArrows: 3 + Math.min(level - 1, 1), minLen: 8, maxLen: 14 };
  if (level <= 6) return { cols: 6, rows: 9, numArrows: 4 + Math.floor((level - 4) / 2), minLen: 8, maxLen: 14 };
  if (level <= 10) return { cols: 7, rows: 9, numArrows: 5 + Math.floor((level - 7) / 2), minLen: 8, maxLen: 15 };
  if (level <= 15) return { cols: 7, rows: 10, numArrows: 6 + Math.floor((level - 11) / 2), minLen: 7, maxLen: 14 };
  if (level <= 20) return { cols: 7, rows: 10, numArrows: 8 + Math.floor((level - 16) / 2), minLen: 5, maxLen: 12 };
  if (level <= 25) return { cols: 7, rows: 11, numArrows: 9 + Math.floor((level - 21) / 2), minLen: 5, maxLen: 12 };
  return { cols: 8, rows: 12, numArrows: 10 + Math.floor((level - 26) / 2), minLen: 5, maxLen: 14 };
}

// =============================================
// LEVEL GENERATION - NO OVERLAPPING CELLS
// =============================================

function getEdgeDir(col, row, cols, rows) {
  // Returns direction pointing OUT of the board from this edge cell
  // Prioritize: top/bottom over left/right for corners
  if (row === 0) return DIR.UP;
  if (row === rows - 1) return DIR.DOWN;
  if (col === 0) return DIR.LEFT;
  if (col === cols - 1) return DIR.RIGHT;
  return -1;
}

function getEdgeCells(cols, rows) {
  const cells = [];
  for (let c = 0; c < cols; c++) { cells.push({ col: c, row: 0 }); cells.push({ col: c, row: rows - 1 }); }
  for (let r = 1; r < rows - 1; r++) { cells.push({ col: 0, row: r }); cells.push({ col: cols - 1, row: r }); }
  return cells;
}

function countEmptyNeighbors(col, row, cols, rows, grid) {
  let count = 0;
  for (let d = 0; d < 4; d++) {
    const nc = col + DX[d];
    const nr = row + DY[d];
    if (nc >= 0 && nc < cols && nr >= 0 && nr < rows && grid[nr][nc] === -1) count++;
  }
  return count;
}

function generateLevel(level) {
  const cfg = getLevelConfig(level);
  const { cols, rows, numArrows, minLen, maxLen } = cfg;

  // Try multiple seeds to find a solvable level
  for (let seedOffset = 0; seedOffset < 50; seedOffset++) {
    const rng = new SeededRNG(level * 7919 + 1337 + seedOffset * 311);

    // grid[row][col] = -1 (empty) or arrowIndex
    const grid = Array.from({ length: rows }, () => new Array(cols).fill(-1));
    const arrows = [];
    let success = true;

    for (let ai = 0; ai < numArrows; ai++) {
      let bestPath = null;
      let bestExitDir = -1;

      for (let attempt = 0; attempt < 120; attempt++) {
        // Pick a random edge for exit
        const edgeCells = getEdgeCells(cols, rows);
        const shuffledEdges = rng.shuffle(edgeCells);

        let exitCell = null;
        let exitDir = -1;

        for (const ec of shuffledEdges) {
          if (grid[ec.row][ec.col] === -1) {
            exitCell = ec;
            exitDir = getEdgeDir(ec.col, ec.row, cols, rows);
            break;
          }
        }

        if (!exitCell) break; // No free edge cells at all

        // Build path inward from exit cell using only empty cells
        const path = [{ col: exitCell.col, row: exitCell.row }];
        const pathSet = new Set();
        pathSet.add(exitCell.col + ',' + exitCell.row);

        let curDir = oppositeDir(exitDir); // Initial direction: inward
        const targetLen = rng.nextInt(minLen, maxLen);

        for (let step = 1; step < targetLen; step++) {
          const cur = path[path.length - 1];
          const candidates = [];

          // Try all 4 directions except going backward
          const dirs = rng.shuffle([0, 1, 2, 3]);
          for (const d of dirs) {
            if (d === oppositeDir(curDir) && path.length > 1) continue; // No U-turn
            const nc = cur.col + DX[d];
            const nr = cur.row + DY[d];
            if (nc < 0 || nc >= cols || nr < 0 || nr >= rows) continue;
            if (grid[nr][nc] !== -1) continue; // Cell occupied by another arrow
            if (pathSet.has(nc + ',' + nr)) continue; // Already in this path

            // Score: prefer turns, prefer cells with more empty neighbors (allows future paths)
            const isTurn = (d !== curDir) ? 1 : 0;
            const emptyN = countEmptyNeighbors(nc, nr, cols, rows, grid);
            // Avoid cells that would dead-end future paths too early
            const score = isTurn * 3 + emptyN * 2 + rng.next() * 4;
            candidates.push({ d, col: nc, row: nr, score });
          }

          if (candidates.length === 0) break;

          // Sort by score descending, pick from top candidates with some randomness
          candidates.sort((a, b) => b.score - a.score);
          const pickIdx = rng.nextInt(0, Math.min(1, candidates.length - 1));
          const chosen = candidates[pickIdx];

          path.push({ col: chosen.col, row: chosen.row });
          pathSet.add(chosen.col + ',' + chosen.row);
          curDir = chosen.d;
        }

        if (path.length >= Math.max(3, minLen - 2)) {
          if (!bestPath || path.length > bestPath.length) {
            bestPath = path;
            bestExitDir = exitDir;
          }
          if (path.length >= targetLen - 1) break;
        }
      }

      if (!bestPath || bestPath.length < 3) {
        success = false;
        break;
      }

      // Mark cells in grid
      for (const cell of bestPath) {
        grid[cell.row][cell.col] = ai;
      }

      arrows.push({
        id: ai,
        path: bestPath,
        exitDir: bestExitDir,
        color: COLORS[ai % COLORS.length],
        removed: false,
      });
    }

    if (!success) continue;

    // Verify solvability: there must always be at least one removable arrow
    if (verifySolvable(arrows, grid, cols, rows)) {
      return { cols, rows, arrows, grid };
    }
  }

  // Fallback: generate a simple solvable level with straight arrows
  return generateFallbackLevel(level);
}

function isArrowBlocked(arrow, arrows, grid, cols, rows) {
  if (arrow.removed) return false;
  const dir = arrow.exitDir;

  // For each cell in the arrow's path, look from that cell toward the exit edge
  // If any cell between it and the edge belongs to another non-removed arrow, blocked
  for (const cell of arrow.path) {
    let c = cell.col + DX[dir];
    let r = cell.row + DY[dir];
    while (c >= 0 && c < cols && r >= 0 && r < rows) {
      const occupant = grid[r][c];
      if (occupant !== -1 && occupant !== arrow.id) {
        // Check if that arrow is still present (not removed)
        const otherArrow = arrows[occupant];
        if (otherArrow && !otherArrow.removed) {
          return true;
        }
      }
      c += DX[dir];
      r += DY[dir];
    }
  }
  return false;
}

function verifySolvable(arrows, grid, cols, rows) {
  // Simulate removal: at each step there must be at least one removable arrow
  const simArrows = arrows.map(a => ({ ...a, removed: false }));
  const simGrid = grid.map(r => r.slice());
  let remaining = simArrows.length;

  while (remaining > 0) {
    let found = false;
    for (const a of simArrows) {
      if (a.removed) continue;
      if (!isArrowBlocked(a, simArrows, simGrid, cols, rows)) {
        // Remove this arrow
        a.removed = true;
        for (const cell of a.path) {
          simGrid[cell.row][cell.col] = -1;
        }
        remaining--;
        found = true;
        break; // Restart search (greedy)
      }
    }
    if (!found) return false; // Deadlock
  }
  return true;
}

function generateFallbackLevel(level) {
  const cfg = getLevelConfig(level);
  const { cols, rows, numArrows } = cfg;
  const grid = Array.from({ length: rows }, () => new Array(cols).fill(-1));
  const arrows = [];
  const rng = new SeededRNG(level * 13 + 42);

  // Generate simple non-overlapping straight/L-shaped arrows
  for (let ai = 0; ai < Math.min(numArrows, 6); ai++) {
    const isHorizontal = rng.next() > 0.5;
    let placed = false;

    for (let attempt = 0; attempt < 100 && !placed; attempt++) {
      const len = rng.nextInt(4, 8);
      if (isHorizontal) {
        const row = rng.nextInt(0, rows - 1);
        const startCol = rng.next() > 0.5 ? 0 : cols - 1;
        const dir = startCol === 0 ? DIR.LEFT : DIR.RIGHT;
        const step = startCol === 0 ? 1 : -1;
        const path = [];
        let c = startCol;
        for (let i = 0; i < len && c >= 0 && c < cols; i++, c += step) {
          if (grid[row][c] !== -1) break;
          path.push({ col: c, row });
        }
        if (path.length >= 4) {
          for (const cell of path) grid[cell.row][cell.col] = ai;
          arrows.push({ id: ai, path, exitDir: dir, color: COLORS[ai % COLORS.length], removed: false });
          placed = true;
        }
      } else {
        const col = rng.nextInt(0, cols - 1);
        const startRow = rng.next() > 0.5 ? 0 : rows - 1;
        const dir = startRow === 0 ? DIR.UP : DIR.DOWN;
        const step = startRow === 0 ? 1 : -1;
        const path = [];
        let r = startRow;
        for (let i = 0; i < len && r >= 0 && r < rows; i++, r += step) {
          if (grid[r][col] !== -1) break;
          path.push({ col, row: r });
        }
        if (path.length >= 4) {
          for (const cell of path) grid[cell.row][cell.col] = ai;
          arrows.push({ id: ai, path, exitDir: dir, color: COLORS[ai % COLORS.length], removed: false });
          placed = true;
        }
      }
    }
  }

  return { cols, rows, arrows, grid };
}

// =============================================
// GAME STATE
// =============================================

let currentLevel = 1;
let hearts = 3;
let levelData = null;
let canvas, ctx;
let cellSize, boardX, boardY;
let animating = false;
let slideAnim = null;
let hintArrow = -1;
let msgTimeout = null;
let rafId = null;

function startLevel(level) {
  currentLevel = level;
  hearts = 3;
  hintArrow = -1;
  animating = false;
  slideAnim = null;
  levelData = generateLevel(level);
  showScreen('gameScreen');
  document.getElementById('levelLabel').textContent = gt('level') + ' ' + level;
  updateHearts();
  initCanvas();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(gameLoop);
}

function restartLevel() { startLevel(currentLevel); }
function backToLevels() { showScreen('levelScreen'); }
function nextLevel() {
  if (currentLevel < TOTAL_LEVELS) startLevel(currentLevel + 1);
  else showScreen('levelScreen');
}

function updateHearts() {
  const el = document.getElementById('heartsDisplay');
  el.textContent = '\u2764\uFE0F'.repeat(hearts) + '\u{1F5A4}'.repeat(Math.max(0, 3 - hearts));
}

function showMsg(text, dur) {
  dur = dur || 1500;
  const bar = document.getElementById('msgBar');
  bar.textContent = text;
  if (msgTimeout) clearTimeout(msgTimeout);
  msgTimeout = setTimeout(function() { bar.textContent = ''; }, dur);
}

// =============================================
// CANVAS
// =============================================

function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas() {
  if (!levelData) return;
  const wrap = document.querySelector('.canvas-wrap');
  const maxW = Math.min(wrap.clientWidth - 16, 500);
  const maxH = Math.min(window.innerHeight - 160, 700);

  const { cols, rows } = levelData;
  const cs1 = Math.floor(maxW / cols);
  const cs2 = Math.floor(maxH / rows);
  cellSize = Math.min(cs1, cs2);

  const dpr = window.devicePixelRatio || 1;
  const bw = cols * cellSize;
  const bh = rows * cellSize;

  canvas.width = bw * dpr;
  canvas.height = bh * dpr;
  canvas.style.width = bw + 'px';
  canvas.style.height = bh + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  boardX = 0;
  boardY = 0;
}

window.addEventListener('resize', function() {
  if (levelData) resizeCanvas();
});

// =============================================
// DRAWING
// =============================================

function getSegDir(path, index) {
  // Returns { fromDir, toDir } for a cell in the path
  // fromDir = direction we came FROM (relative to this cell)
  // toDir = direction we go TO (relative to this cell)
  const curr = path[index];
  let fromDir = null, toDir = null;

  if (index > 0) {
    const prev = path[index - 1];
    const dx = curr.col - prev.col;
    const dy = curr.row - prev.row;
    if (dx === 1) fromDir = DIR.LEFT;
    else if (dx === -1) fromDir = DIR.RIGHT;
    else if (dy === 1) fromDir = DIR.UP;
    else if (dy === -1) fromDir = DIR.DOWN;
  }

  if (index < path.length - 1) {
    const next = path[index + 1];
    const dx = next.col - curr.col;
    const dy = next.row - curr.row;
    if (dx === 1) toDir = DIR.RIGHT;
    else if (dx === -1) toDir = DIR.LEFT;
    else if (dy === 1) toDir = DIR.DOWN;
    else if (dy === -1) toDir = DIR.UP;
  }

  return { fromDir, toDir };
}

function darkenColor(hex, factor) {
  factor = factor || 0.7;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return 'rgb(' + Math.floor(r * factor) + ',' + Math.floor(g * factor) + ',' + Math.floor(b * factor) + ')';
}

function lightenColor(hex, factor) {
  factor = factor || 1.3;
  const r = Math.min(255, Math.floor(parseInt(hex.slice(1, 3), 16) * factor));
  const g = Math.min(255, Math.floor(parseInt(hex.slice(3, 5), 16) * factor));
  const b = Math.min(255, Math.floor(parseInt(hex.slice(5, 7), 16) * factor));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// Draw a single path cell. The band width is ~85% of cellSize.
// entryEdges: which edges of the cell the path connects through.
function drawPathCell(x, y, s, fromDir, toDir, color, isHead, isTail, exitDir) {
  const pad = Math.max(1, s * 0.075); // gap on each side = 7.5%, so band = 85%
  const bandW = s - pad * 2; // band width

  ctx.fillStyle = color;

  if (isHead) {
    // Head cell: arrowhead pointing toward exitDir
    // The path continues in toDir direction (or if only 1 cell, no toDir)
    // Draw the segment body connecting toDir side to the exit edge
    // Then draw arrowhead triangle

    if (toDir !== null) {
      // Connect from toDir side to the exit edge (exitDir)
      drawBandConnection(x, y, s, pad, oppositeDir(toDir), exitDir, color);
    } else {
      // Single cell arrow (shouldn't happen but handle)
      drawBandConnection(x, y, s, pad, oppositeDir(exitDir), exitDir, color);
    }

    // Draw arrowhead triangle on the exit edge
    drawArrowTriangle(x, y, s, pad, exitDir, color);
    return;
  }

  if (isTail) {
    // Tail cell: has fromDir but no toDir. Draw band from fromDir side with rounded end.
    if (fromDir !== null) {
      drawBandHalf(x, y, s, pad, fromDir, color);
      // Rounded end cap on the opposite side
      drawRoundCap(x, y, s, pad, fromDir, color);
    } else {
      ctx.fillRect(x + pad, y + pad, bandW, bandW);
    }
    return;
  }

  // Middle cell: has both fromDir and toDir
  if (fromDir !== null && toDir !== null) {
    drawBandConnection(x, y, s, pad, fromDir, toDir, color);
  }
}

function drawBandConnection(x, y, s, pad, dir1, dir2, color) {
  // Draw a band connecting two edges of the cell
  // dir1 and dir2 are the edges the band connects

  ctx.fillStyle = color;
  const bandW = s - pad * 2;

  const sameAxis = (dir1 % 2) === (dir2 % 2);

  if (sameAxis) {
    // Straight: horizontal or vertical band
    if (dir1 === DIR.LEFT || dir1 === DIR.RIGHT) {
      // Horizontal band
      ctx.fillRect(x, y + pad, s, bandW);
    } else {
      // Vertical band
      ctx.fillRect(x + pad, y, bandW, s);
    }
  } else {
    // L-turn: draw two overlapping rectangles
    drawLBand(x, y, s, pad, dir1, dir2, color);
  }
}

function drawLBand(x, y, s, pad, dir1, dir2, color) {
  ctx.fillStyle = color;
  const bw = s - pad * 2; // band width

  const has = function(d) { return dir1 === d || dir2 === d; };

  // Each direction arm extends from that edge to the center of the cell
  // The center square (pad, pad, bw, bw) is always filled
  // Then extend toward each connected edge

  // Start with center block
  ctx.fillRect(x + pad, y + pad, bw, bw);

  // Extend toward each connected direction
  if (has(DIR.LEFT))  ctx.fillRect(x, y + pad, pad, bw);
  if (has(DIR.RIGHT)) ctx.fillRect(x + s - pad, y + pad, pad, bw);
  if (has(DIR.UP))    ctx.fillRect(x + pad, y, bw, pad);
  if (has(DIR.DOWN))  ctx.fillRect(x + pad, y + s - pad, bw, pad);
}

function drawBandHalf(x, y, s, pad, fromDir, color) {
  // Draw band from fromDir edge to center of cell
  ctx.fillStyle = color;
  const bw = s - pad * 2;

  // Center block
  ctx.fillRect(x + pad, y + pad, bw, bw);

  // Extend toward fromDir
  if (fromDir === DIR.LEFT)  ctx.fillRect(x, y + pad, pad, bw);
  if (fromDir === DIR.RIGHT) ctx.fillRect(x + s - pad, y + pad, pad, bw);
  if (fromDir === DIR.UP)    ctx.fillRect(x + pad, y, bw, pad);
  if (fromDir === DIR.DOWN)  ctx.fillRect(x + pad, y + s - pad, bw, pad);
}

function drawRoundCap(x, y, s, pad, fromDir, color) {
  // Draw a rounded end cap on the opposite side of fromDir
  ctx.fillStyle = color;
  const bw = s - pad * 2;
  const r = bw / 2;
  const cx = x + s / 2;
  const cy = y + s / 2;

  // The cap is a semicircle on the side opposite to fromDir
  ctx.beginPath();
  if (fromDir === DIR.LEFT) {
    // Cap on right side of center
    ctx.arc(x + pad + bw * 0.5, cy, r, -Math.PI / 2, Math.PI / 2);
  } else if (fromDir === DIR.RIGHT) {
    ctx.arc(x + s - pad - bw * 0.5, cy, r, Math.PI / 2, -Math.PI / 2);
  } else if (fromDir === DIR.UP) {
    ctx.arc(cx, y + pad + bw * 0.5, r, 0, Math.PI);
  } else if (fromDir === DIR.DOWN) {
    ctx.arc(cx, y + s - pad - bw * 0.5, r, Math.PI, 0);
  }
  ctx.fill();
}

function drawArrowTriangle(x, y, s, pad, exitDir, color) {
  ctx.fillStyle = lightenColor(color, 1.2);
  const cx = x + s / 2;
  const cy = y + s / 2;
  const triSize = s * 0.38;

  ctx.beginPath();
  switch (exitDir) {
    case DIR.UP:
      ctx.moveTo(cx, y - 1);
      ctx.lineTo(cx - triSize, y + pad + triSize * 0.4);
      ctx.lineTo(cx + triSize, y + pad + triSize * 0.4);
      break;
    case DIR.DOWN:
      ctx.moveTo(cx, y + s + 1);
      ctx.lineTo(cx - triSize, y + s - pad - triSize * 0.4);
      ctx.lineTo(cx + triSize, y + s - pad - triSize * 0.4);
      break;
    case DIR.LEFT:
      ctx.moveTo(x - 1, cy);
      ctx.lineTo(x + pad + triSize * 0.4, cy - triSize);
      ctx.lineTo(x + pad + triSize * 0.4, cy + triSize);
      break;
    case DIR.RIGHT:
      ctx.moveTo(x + s + 1, cy);
      ctx.lineTo(x + s - pad - triSize * 0.4, cy - triSize);
      ctx.lineTo(x + s - pad - triSize * 0.4, cy + triSize);
      break;
  }
  ctx.closePath();
  ctx.fill();
}

function drawChevron(x, y, s, flowDir, color) {
  ctx.strokeStyle = darkenColor(color, 0.55);
  ctx.lineWidth = Math.max(1.5, s * 0.05);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const cx = x + s / 2;
  const cy = y + s / 2;
  const cs = s * 0.14;

  ctx.beginPath();
  switch (flowDir) {
    case DIR.UP:
      ctx.moveTo(cx - cs, cy + cs * 0.5);
      ctx.lineTo(cx, cy - cs * 0.5);
      ctx.lineTo(cx + cs, cy + cs * 0.5);
      break;
    case DIR.DOWN:
      ctx.moveTo(cx - cs, cy - cs * 0.5);
      ctx.lineTo(cx, cy + cs * 0.5);
      ctx.lineTo(cx + cs, cy - cs * 0.5);
      break;
    case DIR.LEFT:
      ctx.moveTo(cx + cs * 0.5, cy - cs);
      ctx.lineTo(cx - cs * 0.5, cy);
      ctx.lineTo(cx + cs * 0.5, cy + cs);
      break;
    case DIR.RIGHT:
      ctx.moveTo(cx - cs * 0.5, cy - cs);
      ctx.lineTo(cx + cs * 0.5, cy);
      ctx.lineTo(cx - cs * 0.5, cy + cs);
      break;
  }
  ctx.stroke();
}

function drawBoard(timestamp) {
  if (!levelData) return;
  const { cols, rows, arrows } = levelData;
  const w = cols * cellSize;
  const h = rows * cellSize;

  // Clear background
  ctx.fillStyle = BOARD_BG;
  ctx.fillRect(0, 0, w, h);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let c = 1; c < cols; c++) {
    ctx.beginPath();
    ctx.moveTo(boardX + c * cellSize, boardY);
    ctx.lineTo(boardX + c * cellSize, boardY + h);
    ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    ctx.beginPath();
    ctx.moveTo(boardX, boardY + r * cellSize);
    ctx.lineTo(boardX + w, boardY + r * cellSize);
    ctx.stroke();
  }

  // Draw arrows (since no overlaps, order doesn't matter for drawing, but draw in id order)
  for (const arrow of arrows) {
    if (arrow.removed) continue;

    let offX = 0, offY = 0;

    // Slide animation
    if (slideAnim && slideAnim.arrowId === arrow.id) {
      const elapsed = timestamp - slideAnim.startTime;
      const t = Math.min(1, elapsed / slideAnim.duration);
      const ease = 1 - Math.pow(1 - t, 3);
      offX = slideAnim.dx * ease;
      offY = slideAnim.dy * ease;
    }

    // Hint glow
    let hasGlow = false;
    if (hintArrow === arrow.id) {
      const pulse = Math.sin(timestamp * 0.006) * 0.4 + 0.6;
      ctx.save();
      ctx.shadowColor = arrow.color;
      ctx.shadowBlur = 15 * pulse;
      hasGlow = true;
    }

    const path = arrow.path;
    for (let i = 0; i < path.length; i++) {
      const cell = path[i];
      const seg = getSegDir(path, i);
      const isHead = (i === 0);
      const isTail = (i === path.length - 1);

      const px = boardX + cell.col * cellSize + offX;
      const py = boardY + cell.row * cellSize + offY;

      drawPathCell(px, py, cellSize, seg.fromDir, seg.toDir, arrow.color, isHead, isTail, arrow.exitDir);

      // Draw chevrons on middle cells every 2-3 cells
      if (!isHead && !isTail && (i % 3 === 1)) {
        const flowDir = seg.toDir !== null ? seg.toDir : seg.fromDir;
        if (flowDir !== null) {
          drawChevron(px, py, cellSize, flowDir, arrow.color);
        }
      }
    }

    if (hasGlow) {
      ctx.restore();
    }
  }

  // Board border
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.strokeRect(boardX, boardY, w, h);
}

// =============================================
// GAME LOOP
// =============================================

function gameLoop(timestamp) {
  if (!levelData) return;
  drawBoard(timestamp);

  // Check slide animation completion
  if (slideAnim) {
    const elapsed = timestamp - slideAnim.startTime;
    if (elapsed >= slideAnim.duration) {
      const arrow = levelData.arrows[slideAnim.arrowId];
      arrow.removed = true;
      // Clear from grid
      for (const cell of arrow.path) {
        levelData.grid[cell.row][cell.col] = -1;
      }
      slideAnim = null;
      animating = false;

      // Check win
      if (levelData.arrows.every(function(a) { return a.removed; })) {
        setTimeout(function() { levelComplete(); }, 300);
      }
    }
  }

  rafId = requestAnimationFrame(gameLoop);
}

// =============================================
// INPUT HANDLING
// =============================================

function getArrowAtPos(px, py) {
  if (!levelData) return -1;
  const col = Math.floor((px - boardX) / cellSize);
  const row = Math.floor((py - boardY) / cellSize);
  if (col < 0 || col >= levelData.cols || row < 0 || row >= levelData.rows) return -1;

  const occupant = levelData.grid[row][col];
  if (occupant === -1) return -1;
  if (levelData.arrows[occupant].removed) return -1;
  return occupant;
}

function tryRemoveArrow(arrowIdx) {
  if (animating || arrowIdx < 0) return;

  const arrow = levelData.arrows[arrowIdx];
  if (arrow.removed) return;

  if (isArrowBlocked(arrow, levelData.arrows, levelData.grid, levelData.cols, levelData.rows)) {
    // Wrong tap: blocked
    playThud();
    hearts--;
    updateHearts();
    showMsg(gt('blocked'));
    hintArrow = -1;

    if (hearts <= 0) {
      setTimeout(function() {
        showMsg(gt('game_over') + ' - ' + gt('try_again'));
        setTimeout(function() { restartLevel(); }, 1500);
      }, 500);
    }
    return;
  }

  // Remove: slide out animation
  animating = true;
  hintArrow = -1;
  playWhoosh();
  showMsg(gt('removed'));

  const dir = arrow.exitDir;
  const dist = Math.max(levelData.cols, levelData.rows) * cellSize + cellSize * 2;
  slideAnim = {
    arrowId: arrow.id,
    startTime: performance.now(),
    duration: 400,
    dx: DX[dir] * dist,
    dy: DY[dir] * dist,
  };
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = (canvas.width / (window.devicePixelRatio || 1)) / rect.width;
  const scaleY = (canvas.height / (window.devicePixelRatio || 1)) / rect.height;
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

// Bind events
document.addEventListener('DOMContentLoaded', function() {
  canvas = document.getElementById('gameCanvas');

  canvas.addEventListener('click', function(e) {
    if (!levelData) return;
    const pos = getCanvasPos(e);
    const idx = getArrowAtPos(pos.x, pos.y);
    if (idx >= 0) tryRemoveArrow(idx);
  });

  canvas.addEventListener('touchstart', function(e) {
    if (!levelData) return;
    e.preventDefault();
    const pos = getCanvasPos(e);
    const idx = getArrowAtPos(pos.x, pos.y);
    if (idx >= 0) tryRemoveArrow(idx);
  }, { passive: false });
});

// =============================================
// HINT
// =============================================

function useHint() {
  if (!levelData || animating) return;

  // Find a removable arrow (not blocked)
  for (const a of levelData.arrows) {
    if (a.removed) continue;
    if (!isArrowBlocked(a, levelData.arrows, levelData.grid, levelData.cols, levelData.rows)) {
      hintArrow = a.id;
      showMsg(gt('hint_used'));
      return;
    }
  }
}

// =============================================
// LEVEL COMPLETE
// =============================================

function levelComplete() {
  playVictory();
  const stars = Math.max(1, hearts);
  saveProgress(currentLevel, stars);

  const modal = document.getElementById('completeModal');
  document.getElementById('completeTitle').textContent = gt('level_clear');
  document.getElementById('starDisplay').textContent = '\u2B50'.repeat(stars) + '\u2606'.repeat(3 - stars);
  document.getElementById('nextLevelBtn').textContent = gt('next_level');
  modal.classList.add('active');

  // Integration with shared modules
  try {
    if (typeof PuzzleShare !== 'undefined' && PuzzleShare.showShareModal) {
      PuzzleShare.showShareModal({
        title: 'ArrowScape',
        gameName: 'arrowscape',
        score: stars,
        stars: stars,
        message: gt('level_clear'),
        lang: typeof getGameLang === 'function' ? getGameLang() : 'ko',
      });
    }
  } catch(e) {}

  try {
    if (typeof PuzzleUser !== 'undefined' && PuzzleUser.recordGame) {
      PuzzleUser.recordGame('arrowscape', currentLevel * 100 + stars * 10, { level: currentLevel, stars: stars });
    }
  } catch(e) {}

  try {
    if (typeof PuzzleAds !== 'undefined' && PuzzleAds.onLevelComplete) {
      PuzzleAds.onLevelComplete('arrowscape', currentLevel);
    }
  } catch(e) {}
}

function closeModal() {
  document.getElementById('completeModal').classList.remove('active');
}

applyI18n();
