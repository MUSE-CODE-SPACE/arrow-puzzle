<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Fill - 컬러 필 퍼즐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #a855f7;
  --accent-rgb: 168, 85, 247;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; }
.screen.active { display: flex; }

/* Top Bar */
.top-bar {
  width: 100%; max-width: 600px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  background: none; border: none; color: var(--text-dim); font-size: 14px;
  font-family: 'Outfit', sans-serif; cursor: pointer; padding: 8px 12px;
  border-radius: 8px; transition: all 0.2s; text-decoration: none;
}
.back-btn:hover { background: var(--surface); color: var(--text); }
.sound-btn {
  background: none; border: 1px solid var(--surface2); color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 6px 10px; border-radius: 8px;
  transition: all 0.2s;
}
.sound-btn:hover { background: var(--surface); }

/* Ad Placeholder */
.ad-placeholder {
  width: 100%; max-width: 600px; height: 60px; margin: 0 auto;
  background: var(--surface); border: 1px dashed rgba(255,255,255,0.06);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 12px; opacity: 0.5;
}
.ad-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding: 8px 16px; }
.ad-bottom .ad-placeholder { height: 50px; border-radius: 0; max-width: 100%; }

/* Title Screen */
.title-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px;
}
.game-icon {
  width: 120px; height: 120px; border-radius: 28px;
  background: radial-gradient(circle at 40% 40%, rgba(var(--accent-rgb), 0.3), transparent 70%), var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.2), inset 0 0 30px rgba(var(--accent-rgb), 0.1);
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.2), inset 0 0 30px rgba(var(--accent-rgb), 0.1); }
  50% { box-shadow: 0 0 60px rgba(var(--accent-rgb), 0.35), inset 0 0 40px rgba(var(--accent-rgb), 0.2); }
}
.game-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
.game-subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 40px; text-align: center; }
.main-btn {
  background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.2), rgba(var(--accent-rgb), 0.05));
  border: 1px solid rgba(var(--accent-rgb), 0.4);
  color: var(--accent); font-family: 'Outfit', sans-serif;
  font-size: 16px; font-weight: 600; padding: 14px 48px;
  border-radius: 14px; cursor: pointer; margin-bottom: 12px;
  transition: all 0.25s; min-width: 200px;
}
.main-btn:hover {
  background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.3), rgba(var(--accent-rgb), 0.1));
  box-shadow: 0 0 25px rgba(var(--accent-rgb), 0.2);
  transform: translateY(-1px);
}
.secondary-btn {
  background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 500; padding: 12px 36px;
  border-radius: 12px; cursor: pointer; transition: all 0.2s; min-width: 200px;
}
.secondary-btn:hover { background: var(--surface2); }

/* Level Select */
.level-screen { padding: 0 16px 100px; }
.level-grid-title {
  font-size: 14px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px;
  width: 100%; max-width: 400px; text-align: left;
}
.level-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; width: 100%; max-width: 400px;
}
.level-cell {
  aspect-ratio: 1; border-radius: 12px; background: var(--surface);
  border: 1px solid var(--surface2); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; position: relative; font-size: 18px; font-weight: 600;
}
.level-cell:hover { background: var(--surface2); transform: scale(1.05); }
.level-cell.locked { opacity: 0.3; cursor: default; pointer-events: none; }
.level-cell.completed { border-color: rgba(var(--accent-rgb), 0.3); }
.level-cell .stars-mini { font-size: 8px; margin-top: 2px; letter-spacing: 1px; }
.level-cell.current {
  border-color: rgba(var(--accent-rgb), 0.6);
  box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.15);
}

/* Game Screen */
.game-header {
  width: 100%; max-width: 500px; padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.level-label { font-size: 14px; font-weight: 600; color: var(--text-dim); }
.game-stats { display: flex; gap: 16px; align-items: center; }
.stat { text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

/* Progress Bar */
.progress-bar-wrap {
  width: 100%; max-width: 500px; padding: 0 16px; margin: 4px 0;
}
.progress-bar-outer {
  width: 100%; height: 8px; background: var(--surface);
  border-radius: 4px; overflow: hidden; position: relative;
}
.progress-bar-inner {
  height: 100%; width: 0%; border-radius: 4px;
  background: linear-gradient(90deg, #a855f7, #ec4899);
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 11px; color: var(--text-dim); text-align: right;
  margin-top: 2px; font-weight: 500;
}

/* Grid */
.grid-wrapper {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 12px; width: 100%;
}
.grid-container {
  display: grid; gap: 2px; position: relative;
  max-width: min(90vw, 420px); max-height: min(55vh, 420px);
  width: 100%; aspect-ratio: 1;
}
.cell {
  border-radius: 4px; cursor: pointer; position: relative;
  transition: transform 0.15s, opacity 0.3s;
  overflow: hidden;
}
.cell.filled {
  animation: cellFill 0.35s ease-out;
}
@keyframes cellFill {
  0% { transform: scale(0.8); opacity: 0.5; }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.cell:hover { filter: brightness(1.2); }

/* Color Picker */
.color-picker-wrap {
  width: 100%; max-width: 500px; padding: 8px 16px 16px;
}
.color-picker {
  display: flex; gap: 10px; justify-content: center; align-items: center;
  flex-wrap: wrap;
}
.color-btn {
  width: 48px; height: 48px; border-radius: 14px; border: 3px solid transparent;
  cursor: pointer; transition: all 0.2s; position: relative;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.active {
  border-color: #fff;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
  transform: scale(1.15);
}
.color-btn.disabled {
  opacity: 0.3; cursor: default; pointer-events: none;
}

/* Action Buttons */
.game-actions {
  width: 100%; max-width: 500px; padding: 0 16px 16px;
  display: flex; gap: 8px; justify-content: center;
}
.action-btn {
  background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text-dim); font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500; padding: 10px 20px;
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.action-btn:hover { background: var(--surface2); color: var(--text); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); display: flex; align-items: center;
  justify-content: center; z-index: 1000; opacity: 0;
  transition: opacity 0.3s; pointer-events: none; padding: 20px;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: linear-gradient(145deg, #111128, #0e0e24);
  border: 1px solid rgba(var(--accent-rgb), 0.25);
  border-radius: 20px; padding: 32px 28px; max-width: 360px;
  width: 100%; text-align: center;
  transform: translateY(20px) scale(0.95);
  transition: transform 0.35s cubic-bezier(.22,1,.36,1);
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }
.modal-icon { font-size: 64px; margin-bottom: 16px; }
.modal-title {
  font-size: 24px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #a855f7, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.modal-stars { font-size: 36px; margin: 12px 0; letter-spacing: 4px; }
.modal-stars .star-empty { opacity: 0.2; }
.modal-msg { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.modal-btn {
  padding: 12px 28px; border-radius: 12px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  border: none;
}
.modal-btn-primary {
  background: linear-gradient(135deg, #a855f7, #ec4899);
  color: #fff;
}
.modal-btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
.modal-btn-secondary {
  background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text);
}
.modal-btn-secondary:hover { background: var(--surface2); }
.modal-btn-share {
  background: linear-gradient(135deg, #667eea, #a855f7);
  color: #fff; width: 100%; margin-top: 4px;
}
.modal-btn-share:hover { filter: brightness(1.15); }

/* Responsive */
@media (max-width: 400px) {
  .game-title { font-size: 26px; }
  .color-btn { width: 42px; height: 42px; border-radius: 12px; }
  .stat-val { font-size: 18px; }
}
@media (max-height: 700px) {
  .grid-container { max-height: min(50vh, 360px); }
  .color-btn { width: 40px; height: 40px; }
}
</style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="title-screen" class="screen active">
  <div class="top-bar">
    <a class="back-btn" href="../index.html" id="backBtn">← Back</a>
    <button class="sound-btn" id="soundToggle1">🔊</button>
  </div>
  <div class="ad-placeholder" id="adTop"><span data-i18n="ad_area">Ad Space</span></div>
  <div class="title-area">
    <div class="game-icon">🎨</div>
    <div class="game-title" id="titleText">Color Fill</div>
    <div class="game-subtitle" id="subtitleText"></div>
    <button class="main-btn" id="continueBtn"></button>
    <button class="secondary-btn" id="levelSelectBtn" data-i18n="level_select">Select Level</button>
  </div>
</div>

<!-- ===== LEVEL SELECT ===== -->
<div id="level-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="backToTitle">← Back</button>
    <button class="sound-btn" id="soundToggle2">🔊</button>
  </div>
  <div class="level-screen" id="levelGrid"></div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="backToLevels">← Back</button>
    <button class="sound-btn" id="soundToggle3">🔊</button>
  </div>
  <div class="game-header">
    <div class="level-label" id="levelLabel">Level 1</div>
    <div class="game-stats">
      <div class="stat">
        <div class="stat-val" id="movesVal">0</div>
        <div class="stat-label" id="movesLabel">Moves</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="movesLeft">20</div>
        <div class="stat-label" id="leftLabel">Left</div>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
  <div class="grid-wrapper">
    <div class="grid-container" id="gameGrid"></div>
  </div>
  <div class="color-picker-wrap">
    <div class="color-picker" id="colorPicker"></div>
  </div>
  <div class="game-actions">
    <button class="action-btn" id="restartBtn" data-i18n="restart">↩ Restart</button>
  </div>
  <div class="ad-bottom"><div class="ad-placeholder"><span data-i18n="ad_area">Ad Space</span></div></div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="modalIcon">🎉</div>
    <div class="modal-title" id="modalTitle">Clear!</div>
    <div class="modal-stars" id="modalStars"></div>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="share.js"></script>
<script>
'use strict';

// ===== Custom i18n =====
const CUSTOM_I18N = {
  ko: {

    movesUsed: '{n}回移動',
    levelClear: 'レベルクリア！',
    gameOver: 'ゲームオーバー',
    noMovesLeft: '移動回数が足りません',
    tryAgain: 'もう一度',

    share: 'シェア',

  zh: {

    subtitle: '选择颜色，将棋盘填充为同一种颜色！',

    startGame: '开始游戏',

    levelClear: '关卡通过！',
    gameOver: '游戏结束',
    noMovesLeft: '没有剩余步数',
    tryAgain: '再试一次',
    nextLevel: '下一关',
    share: '分享',
    allClear: '全部通关！',
    allClearMsg: '恭喜！你完成了所有关卡！',
    stageGroup1: '关卡 1-10',
    stageGroup2: '关卡 11-20',
    stageGroup3: '关卡 21-30',
  },
  es: {
    gameTitle: 'Color Fill',
    subtitle: '¡Elige colores para rellenar todo el tablero con un solo color!',
    continueGame: 'Continuar',
    startGame: 'Iniciar Juego',
    fillPercent: 'Relleno',
    movesUsed: '{n} movimientos',
    levelClear: '¡Nivel completado!',
    gameOver: 'Fin del juego',
    noMovesLeft: 'Sin movimientos restantes',
    tryAgain: 'Intentar de nuevo',
    nextLevel: 'Siguiente',
    share: 'Compartir',
    allClear: '¡Todos los niveles completados!',
    allClearMsg: '¡Felicidades! ¡Has completado todos los niveles!',
    stageGroup1: 'Etapa 1-10',
    stageGroup2: 'Etapa 11-20',
    stageGroup3: 'Etapa 21-30',
  },
};

const lang = getGameLang();
const t = { ...getTranslations(), ...(CUSTOM_I18N[lang] || CUSTOM_I18N.ko) };

// ===== Constants =====
const TOTAL_LEVELS = 30;
const STORAGE_KEY = 'colorFill_progress';

const COLORS_5 = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
const COLORS_6 = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];

// Level configs
function getLevelConfig(level) {
  if (level <= 10) {
    return { rows: 8, cols: 8, colors: COLORS_5, maxMoves: 18 + Math.floor(level * 0.5) };
  } else if (level <= 20) {
    return { rows: 10, cols: 10, colors: COLORS_6, maxMoves: 20 + Math.floor((level - 10) * 0.3) };
  } else {
    return { rows: 12, cols: 12, colors: COLORS_6, maxMoves: 22 + Math.floor((level - 20) * 0.2) };
  }
}

// ===== Seeded Random =====
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ===== State =====
let currentLevel = 1;
let grid = [];
let moveCount = 0;
let maxMoves = 20;
let gridRows = 8;
let gridCols = 8;
let currentColors = COLORS_5;
let isAnimating = false;
let soundEnabled = true;
let progress = {};

// ===== Sound (Web Audio API) =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playFillSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440 + moveCount * 15, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600 + moveCount * 15, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playCompleteSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch(e) {}
}

// ===== Progress =====
function loadProgress() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    progress = data ? JSON.parse(data) : {};
  } catch(e) { progress = {}; }
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function getMaxUnlocked() {
  let max = 1;
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    if (progress[i]) max = Math.max(max, i + 1);
  }
  return Math.min(max, TOTAL_LEVELS);
}

// ===== Screen Management =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Initialize =====
function init() {
  loadProgress();
  applyTranslations();
  setupEventListeners();
  showScreen('title-screen');
}

function applyTranslations() {
  document.getElementById('titleText').textContent = t.gameTitle;
  document.getElementById('subtitleText').textContent = t.subtitle;
  document.getElementById('backBtn').textContent = t.back;
  document.getElementById('backBtn').href = '../index.html';
  document.getElementById('levelSelectBtn').textContent = t.level_select;

  const maxUnlocked = getMaxUnlocked();
  if (maxUnlocked > 1 && progress[maxUnlocked - 1]) {
    document.getElementById('continueBtn').textContent = t.continueGame;
  } else {
    document.getElementById('continueBtn').textContent = t.startGame;
  }

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key]) el.textContent = t[key];
  });
}

function setupEventListeners() {
  document.getElementById('continueBtn').addEventListener('click', () => {
    currentLevel = getMaxUnlocked();
    if (currentLevel > TOTAL_LEVELS) currentLevel = TOTAL_LEVELS;
    startLevel(currentLevel);
  });

  document.getElementById('levelSelectBtn').addEventListener('click', () => {
    renderLevelSelect();
    showScreen('level-screen');
  });

  document.getElementById('backToTitle').addEventListener('click', () => {
    showScreen('title-screen');
    applyTranslations();
  });

  document.getElementById('backToLevels').addEventListener('click', () => {
    renderLevelSelect();
    showScreen('level-screen');
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    startLevel(currentLevel);
  });

  // Sound toggles
  [document.getElementById('soundToggle1'),
   document.getElementById('soundToggle2'),
   document.getElementById('soundToggle3')].forEach(btn => {
    btn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      const icon = soundEnabled ? '🔊' : '🔇';
      document.getElementById('soundToggle1').textContent = icon;
      document.getElementById('soundToggle2').textContent = icon;
      document.getElementById('soundToggle3').textContent = icon;
    });
  });

  // Modal click outside
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
}

// ===== Level Select =====
function renderLevelSelect() {
  const container = document.getElementById('levelGrid');
  container.innerHTML = '';
  const maxUnlocked = getMaxUnlocked();

  const groups = [
    { title: t.stageGroup1, start: 1, end: 10 },
    { title: t.stageGroup2, start: 11, end: 20 },
    { title: t.stageGroup3, start: 21, end: 30 },
  ];

  groups.forEach(group => {
    const title = document.createElement('div');
    title.className = 'level-grid-title';
    title.textContent = group.title;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'level-grid';
    container.appendChild(grid);

    for (let i = group.start; i <= group.end; i++) {
      const cell = document.createElement('div');
      cell.className = 'level-cell';
      const isUnlocked = i <= maxUnlocked;
      const data = progress[i];

      if (!isUnlocked) {
        cell.classList.add('locked');
        cell.innerHTML = `<span>🔒</span>`;
      } else {
        if (data) {
          cell.classList.add('completed');
          const starText = '★'.repeat(data.stars) + '<span class="star-empty">' + '★'.repeat(3 - data.stars) + '</span>';
          cell.innerHTML = `<span>${i}</span><div class="stars-mini">${starText}</div>`;
        } else {
          if (i === maxUnlocked) cell.classList.add('current');
          cell.innerHTML = `<span>${i}</span>`;
        }
        cell.addEventListener('click', () => startLevel(i));
      }
      grid.appendChild(cell);
    }
  });
}

// ===== Game Logic =====
function startLevel(level) {
  currentLevel = level;
  const config = getLevelConfig(level);
  gridRows = config.rows;
  gridCols = config.cols;
  currentColors = config.colors;
  maxMoves = config.maxMoves;
  moveCount = 0;
  isAnimating = false;

  generateGrid(level);
  renderGame();
  showScreen('game-screen');
}

function generateGrid(level) {
  const rand = seededRandom(level * 7919 + 1337);
  grid = [];
  for (let r = 0; r < gridRows; r++) {
    grid[r] = [];
    for (let c = 0; c < gridCols; c++) {
      const idx = Math.floor(rand() * currentColors.length);
      grid[r][c] = currentColors[idx];
    }
  }
}

function renderGame() {
  // Header
  document.getElementById('levelLabel').textContent = `${t.level} ${currentLevel}`;
  document.getElementById('movesLabel').textContent = t.moves;
  document.getElementById('leftLabel').textContent = t.remaining;

  updateStats();
  renderGrid();
  renderColorPicker();
}

function renderGrid() {
  const container = document.getElementById('gameGrid');
  container.innerHTML = '';
  container.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;

  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.background = grid[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;
      container.appendChild(cell);
    }
  }
}

function renderColorPicker() {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = '';
  const currentColor = grid[0][0];

  currentColors.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-btn';
    btn.style.background = color;
    if (color === currentColor) {
      btn.classList.add('disabled');
    }
    btn.addEventListener('click', () => {
      if (!isAnimating && color !== grid[0][0]) {
        doFloodFill(color);
      }
    });
    picker.appendChild(btn);
  });
}

function updateStats() {
  document.getElementById('movesVal').textContent = moveCount;
  const left = maxMoves - moveCount;
  document.getElementById('movesLeft').textContent = left;
  if (left <= 3 && left > 0) {
    document.getElementById('movesLeft').style.color = '#f39c12';
  } else if (left <= 0) {
    document.getElementById('movesLeft').style.color = '#e74c3c';
  } else {
    document.getElementById('movesLeft').style.color = '';
  }

  // Progress
  const filled = countFilled();
  const total = gridRows * gridCols;
  const pct = Math.round((filled / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${pct}% ${t.fillPercent}`;
}

function countFilled() {
  // Count cells connected to top-left with same color
  const color = grid[0][0];
  const visited = Array.from({length: gridRows}, () => Array(gridCols).fill(false));
  let count = 0;

  const queue = [[0, 0]];
  visited[0][0] = true;

  while (queue.length > 0) {
    const [r, c] = queue.shift();
    count++;
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols && !visited[nr][nc] && grid[nr][nc] === color) {
        visited[nr][nc] = true;
        queue.push([nr, nc]);
      }
    }
  }
  return count;
}

function doFloodFill(newColor) {
  const oldColor = grid[0][0];
  if (oldColor === newColor) return;

  isAnimating = true;
  moveCount++;

  // Find all connected cells from top-left
  const visited = Array.from({length: gridRows}, () => Array(gridCols).fill(false));
  const toFill = [];
  const queue = [[0, 0]];
  visited[0][0] = true;

  while (queue.length > 0) {
    const [r, c] = queue.shift();
    toFill.push([r, c]);
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols && !visited[nr][nc] && grid[nr][nc] === oldColor) {
        visited[nr][nc] = true;
        queue.push([nr, nc]);
      }
    }
  }

  // Sort by distance from top-left for wave effect
  toFill.sort((a, b) => (a[0] + a[1]) - (b[0] + b[1]));

  playFillSound();

  // Animate wave fill
  const cells = document.querySelectorAll('#gameGrid .cell');
  const getCellEl = (r, c) => cells[r * gridCols + c];

  let delay = 0;
  const batchSize = Math.max(1, Math.floor(toFill.length / 12));

  for (let i = 0; i < toFill.length; i++) {
    const [r, c] = toFill[i];
    grid[r][c] = newColor;

    const batchDelay = Math.floor(i / batchSize) * 30;
    setTimeout(() => {
      const el = getCellEl(r, c);
      if (el) {
        el.style.background = newColor;
        el.classList.remove('filled');
        void el.offsetWidth; // force reflow
        el.classList.add('filled');
      }
    }, batchDelay);

    delay = Math.max(delay, Math.floor(i / batchSize) * 30);
  }

  setTimeout(() => {
    isAnimating = false;
    updateStats();
    renderColorPicker();
    checkGameState();
  }, delay + 100);
}

function checkGameState() {
  const total = gridRows * gridCols;
  const filled = countFilled();

  if (filled === total) {
    // Win!
    const movesLeft = maxMoves - moveCount;
    let stars;
    if (movesLeft >= Math.floor(maxMoves * 0.3)) stars = 3;
    else if (movesLeft >= Math.floor(maxMoves * 0.1)) stars = 2;
    else stars = 1;

    playCompleteSound();

    // Save progress
    const prev = progress[currentLevel];
    if (!prev || prev.stars < stars) {
      progress[currentLevel] = { stars, moves: moveCount };
      saveProgress();
    }

    setTimeout(() => showWinModal(stars), 400);
  } else if (moveCount >= maxMoves) {
    // Lose
    setTimeout(() => showLoseModal(), 400);
  }
}

// ===== Modals =====
function showWinModal(stars) {
  const modal = document.getElementById('modal');
  document.getElementById('modalIcon').textContent = stars === 3 ? '🌟' : '🎉';
  document.getElementById('modalTitle').textContent = t.levelClear;
  document.getElementById('modalStars').innerHTML =
    '★'.repeat(stars) + '<span class="star-empty">' + '★'.repeat(3 - stars) + '</span>';

  let msg = '';
  if (stars === 3) msg = t.excellent || t.amazing;
  else if (stars === 2) msg = t.well_done;
  else msg = t.clear;
  document.getElementById('modalMsg').textContent = msg + ' ' + t.movesUsed.replace('{n}', moveCount);

  let btnsHTML = '';
  if (currentLevel < TOTAL_LEVELS) {
    btnsHTML += `<button class="modal-btn modal-btn-primary" id="modalNext">${t.nextLevel}</button>`;
  }
  btnsHTML += `<button class="modal-btn modal-btn-secondary" id="modalRetry">${t.restart}</button>`;
  btnsHTML += `<button class="modal-btn modal-btn-share" id="modalShare">📤 ${t.share}</button>`;

  document.getElementById('modalBtns').innerHTML = btnsHTML;

  modal.classList.add('active');

  setTimeout(() => {
    const nextBtn = document.getElementById('modalNext');
    if (nextBtn) nextBtn.addEventListener('click', () => {
      closeModal();
      startLevel(currentLevel + 1);
    });
    document.getElementById('modalRetry').addEventListener('click', () => {
      closeModal();
      startLevel(currentLevel);
    });
    document.getElementById('modalShare').addEventListener('click', () => {
      PuzzleShare.showShareModal({
        gameName: 'Color Fill',
        title: t.levelClear,
        stars: stars,
        message: `Level ${currentLevel} - ${t.movesUsed.replace('{n}', moveCount)}`,
        lang: lang,
      });
    });
  }, 50);
}

function showLoseModal() {
  const modal = document.getElementById('modal');
  document.getElementById('modalIcon').textContent = '😢';
  document.getElementById('modalTitle').textContent = t.gameOver;
  document.getElementById('modalStars').innerHTML = '';
  document.getElementById('modalMsg').textContent = t.noMovesLeft;

  document.getElementById('modalBtns').innerHTML =
    `<button class="modal-btn modal-btn-primary" id="modalRetry2">${t.tryAgain}</button>` +
    `<button class="modal-btn modal-btn-secondary" id="modalLevels2">${t.level_select}</button>`;

  modal.classList.add('active');

  setTimeout(() => {
    document.getElementById('modalRetry2').addEventListener('click', () => {
      closeModal();
      startLevel(currentLevel);
    });
    document.getElementById('modalLevels2').addEventListener('click', () => {
      closeModal();
      renderLevelSelect();
      showScreen('level-screen');
    });
  }, 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// ===== Start =====
init();
</script>
