<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>메모리 카드 - Memory Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent1: #a855f7;
  --accent2: #ec4899;
  --accent-rgb1: 168, 85, 247;
  --accent-rgb2: 236, 72, 153;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Screens */
.screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; }
.screen.active { display: flex; }

/* Header */
.top-bar {
  width: 100%; max-width: 600px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  background: none; border: none; color: var(--text-dim); font-size: 14px;
  font-family: 'Outfit', sans-serif; cursor: pointer; padding: 8px 12px;
  border-radius: 8px; transition: all 0.2s; text-decoration: none;
}
.back-btn:hover { background: var(--surface); color: var(--text); }
.sound-btn {
  background: none; border: 1px solid var(--surface2); color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 6px 10px; border-radius: 8px;
  transition: all 0.2s;
}
.sound-btn:hover { background: var(--surface); }

/* Title Screen */
.title-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.game-icon {
  width: 120px; height: 120px; border-radius: 28px;
  background: radial-gradient(circle at 40% 40%, rgba(var(--accent-rgb1), 0.3), transparent 70%), var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(var(--accent-rgb1), 0.2), inset 0 0 30px rgba(var(--accent-rgb1), 0.1);
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(var(--accent-rgb1), 0.2), inset 0 0 30px rgba(var(--accent-rgb1), 0.1); }
  50% { box-shadow: 0 0 60px rgba(var(--accent-rgb1), 0.35), inset 0 0 40px rgba(var(--accent-rgb1), 0.2); }
}
.game-title {
  font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #ec4899, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.game-subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 40px; }

.main-btn {
  background: linear-gradient(135deg, rgba(var(--accent-rgb1), 0.25), rgba(var(--accent-rgb2), 0.15));
  border: 1px solid rgba(var(--accent-rgb1), 0.4);
  color: var(--accent1); font-family: 'Outfit', sans-serif;
  font-size: 16px; font-weight: 600; padding: 14px 48px;
  border-radius: 14px; cursor: pointer; margin-bottom: 12px;
  transition: all 0.25s; min-width: 200px;
}
.main-btn:hover {
  background: linear-gradient(135deg, rgba(var(--accent-rgb1), 0.35), rgba(var(--accent-rgb2), 0.25));
  box-shadow: 0 0 25px rgba(var(--accent-rgb1), 0.2);
  transform: translateY(-1px);
}
.secondary-btn {
  background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 500; padding: 12px 36px;
  border-radius: 12px; cursor: pointer; transition: all 0.2s; min-width: 200px;
}
.secondary-btn:hover { background: var(--surface2); }

/* Level Select */
.level-screen { padding: 0 16px 100px; width: 100%; max-width: 500px; }
.diff-title {
  font-size: 14px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px;
  width: 100%; text-align: left;
  display: flex; align-items: center; gap: 8px;
}
.diff-title .diff-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 6px;
  background: rgba(var(--accent-rgb1), 0.15); color: var(--accent1);
}
.level-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; width: 100%;
}
.level-cell {
  aspect-ratio: 1; border-radius: 12px; background: var(--surface);
  border: 1px solid var(--surface2); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; position: relative; font-size: 18px; font-weight: 600;
}
.level-cell:hover { background: var(--surface2); transform: scale(1.05); }
.level-cell.locked { opacity: 0.3; cursor: default; pointer-events: none; }
.level-cell.completed { border-color: rgba(var(--accent-rgb1), 0.3); }
.level-cell .stars-mini { font-size: 8px; margin-top: 2px; letter-spacing: 1px; }
.level-cell.current {
  border-color: rgba(var(--accent-rgb1), 0.6);
  box-shadow: 0 0 15px rgba(var(--accent-rgb1), 0.15);
  animation: currentPulse 2s ease-in-out infinite;
}
@keyframes currentPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(var(--accent-rgb1), 0.15); }
  50% { box-shadow: 0 0 25px rgba(var(--accent-rgb1), 0.3); }
}

/* Game Screen */
.game-header {
  width: 100%; max-width: 500px; padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.level-label { font-size: 14px; font-weight: 600; color: var(--text-dim); }
.game-stats { display: flex; gap: 16px; align-items: center; }
.stat { text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

.grid-wrapper {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 12px; width: 100%;
}

/* Card Grid */
.card-grid {
  display: grid; gap: 8px;
  max-width: min(92vw, 460px);
  width: 100%;
}

/* Card */
.card-slot {
  aspect-ratio: 0.78;
  perspective: 600px;
  cursor: pointer;
}
.card {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
}
.card.flipped { transform: rotateY(180deg); }
.card.matched {
  transform: rotateY(180deg);
  animation: matchPop 0.5s ease-out;
}
@keyframes matchPop {
  0% { transform: rotateY(180deg) scale(1); }
  30% { transform: rotateY(180deg) scale(1.15); }
  60% { transform: rotateY(180deg) scale(0.95); }
  100% { transform: rotateY(180deg) scale(1); }
}
.card.matched .card-front {
  box-shadow: 0 0 20px rgba(var(--accent-rgb1), 0.5), 0 0 40px rgba(var(--accent-rgb1), 0.2);
  border-color: rgba(var(--accent-rgb1), 0.6);
}
.card.mismatched {
  animation: mismatchShake 0.5s ease-out;
}
@keyframes mismatchShake {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-6px); }
  40% { transform: rotateY(180deg) translateX(6px); }
  60% { transform: rotateY(180deg) translateX(-4px); }
  80% { transform: rotateY(180deg) translateX(3px); }
}

.card-face {
  position: absolute; inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid transparent;
}

.card-back {
  background: linear-gradient(145deg, #1e1e3a, #141430);
  border-color: rgba(var(--accent-rgb1), 0.2);
  overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute; inset: 0; border-radius: 12px;
  background: linear-gradient(135deg,
    rgba(var(--accent-rgb1), 0.08) 0%,
    transparent 40%,
    transparent 60%,
    rgba(var(--accent-rgb2), 0.06) 100%);
}
.card-back::after {
  content: '?';
  font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, rgba(var(--accent-rgb1), 0.3), rgba(var(--accent-rgb2), 0.3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.card-back .card-pattern {
  position: absolute; inset: 4px; border-radius: 9px;
  border: 1px solid rgba(var(--accent-rgb1), 0.08);
  background:
    repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(var(--accent-rgb1), 0.03) 8px, rgba(var(--accent-rgb1), 0.03) 9px),
    repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(var(--accent-rgb2), 0.03) 8px, rgba(var(--accent-rgb2), 0.03) 9px);
}

.card-front {
  background: linear-gradient(145deg, #1a1a35, #0f0f25);
  border-color: rgba(255,255,255,0.08);
  transform: rotateY(180deg);
  font-size: 32px;
}
.card-front .emoji {
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  transition: transform 0.3s;
}
.card.matched .card-front .emoji {
  animation: emojiFloat 2s ease-in-out infinite;
}
@keyframes emojiFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* Bottom bar */
.game-bottom {
  width: 100%; max-width: 500px; padding: 12px 16px 24px;
  display: flex; gap: 8px; justify-content: center;
}
.game-btn {
  background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500; padding: 10px 20px;
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.game-btn:hover { background: var(--surface2); }

/* Win overlay */
.win-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 100;
  backdrop-filter: blur(6px);
}
.win-overlay.active { display: flex; }
.win-card {
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: 20px; padding: 36px 32px; text-align: center;
  max-width: 340px; width: 90%;
  animation: winPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes winPop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.win-emoji { font-size: 48px; margin-bottom: 12px; }
.win-title {
  font-size: 24px; font-weight: 700; margin-bottom: 6px;
  background: linear-gradient(135deg, #ec4899, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.win-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
.win-stars { font-size: 36px; margin-bottom: 16px; letter-spacing: 4px; }
.win-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.win-stat-val { font-size: 22px; font-weight: 700; }
.win-stat-label { font-size: 11px; color: var(--text-dim); }
.win-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

/* Ad placeholders */
.ad-placeholder {
  width: 100%; max-width: 500px; height: 60px; margin: 8px auto;
  background: var(--surface); border: 1px dashed var(--surface2);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 11px; letter-spacing: 0.5px; flex-shrink: 0;
}

/* Confetti canvas */
#confettiCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 200;
}

/* Sparkle background */
#sparkleCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

/* Responsive */
@media (max-width: 380px) {
  .game-title { font-size: 26px; }
  .level-grid { gap: 6px; }
  .card-grid { gap: 5px; }
  .card-front { font-size: 26px; }
  .card-face { border-radius: 8px; }
}
</style>
</head>

<canvas id="sparkleCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<!-- TITLE SCREEN -->
<div id="titleScreen" class="screen active">
  <div class="top-bar">
    <a href="../index.html" class="back-btn" id="backLink">← 메인으로</a>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>
  <div class="title-area">
    <div class="game-icon">🃏</div>

    <button class="main-btn" id="btnContinue" onclick="continueGame()">이어하기</button>
    <button class="secondary-btn" id="btnLevels" onclick="showLevels()">레벨 선택</button>
  </div>
  <div class="ad-placeholder" id="adTitle">광고 영역</div>
</div>

<!-- LEVEL SELECT SCREEN -->
<div id="levelScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showTitle()" id="btnBackToTitle">← 뒤로</button>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>
  <div class="level-screen" id="levelList"></div>
  <div class="ad-placeholder" id="adLevel">광고 영역</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showLevels()" id="btnBackToLevels">← 레벨</button>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>
  <div class="game-header">
    <div class="level-label" id="levelLabel">레벨 1</div>
    <div class="game-stats">
      <div class="stat">
        <div class="stat-val" id="movesDisplay">0</div>
        <div class="stat-label" id="movesLabel">이동</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="matchDisplay">0/6</div>
        <div class="stat-label" id="matchLabel">매치</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="timeDisplay">0:00</div>
        <div class="stat-label" id="timeLabel">시간</div>
      </div>
    </div>
  </div>
  <div class="ad-placeholder" id="adGame">광고 영역</div>
  <div class="grid-wrapper">
    <div class="card-grid" id="cardGrid"></div>
  </div>
  <div class="game-bottom">
    <button class="game-btn" id="btnRestart" onclick="resetLevel()">↺ 초기화</button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="win-emoji">🎉</div>
    <div class="win-title" id="winTitle">클리어!</div>
    <div class="win-sub" id="winSub">훌륭해요!</div>
    <div class="win-stars" id="winStars">⭐⭐⭐</div>
    <div class="win-stats">
      <div class="stat"><div class="win-stat-val" id="winMoves">0</div><div class="win-stat-label" id="winMovesLabel">이동</div></div>
      <div class="stat"><div class="win-stat-val" id="winTime">0:00</div><div class="win-stat-label" id="winTimeLabel">시간</div></div>
    </div>
    <div class="win-btns">
      <button class="secondary-btn" id="btnWinLevels" onclick="showLevels(); closeWin();">레벨 선택</button>
      <button class="main-btn" id="btnNextLevel" onclick="nextLevel()">다음 레벨 →</button>
    </div>
  </div>
</div>

function mt() {
  const lang = getGameLang();
  return MEMORY_I18N[lang] || MEMORY_I18N.ko;
}

// ==================== AUDIO ====================
let audioCtx = null;
let soundEnabled = true;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playFlip() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.06);
  g.gain.setValueAtTime(0.1, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.1);
}

function playMatch() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const notes = [523, 659, 784];
  notes.forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + i * 0.08); o.stop(ctx.currentTime + i * 0.08 + 0.25);
  });
}

function playMismatch() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
  g.gain.setValueAtTime(0.06, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
}

function playWin() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
    g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.1 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.35);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + i * 0.1); o.stop(ctx.currentTime + i * 0.1 + 0.35);
  });
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.querySelectorAll('.sound-btn').forEach(b => b.textContent = soundEnabled ? '🔊' : '🔇');
  saveProgress();
}

function drawSparkles() {
  sparkleCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
  sparkles.forEach(s => {
    s.y -= s.speed;
    s.phase += 0.02;
    if (s.y < -5) { s.y = sparkleCanvas.height + 5; s.x = Math.random() * sparkleCanvas.width; }
    const a = (Math.sin(s.phase) * 0.5 + 0.5) * 0.35;
    sparkleCtx.beginPath();
    sparkleCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    sparkleCtx.fillStyle = `rgba(168,130,255,${a})`;
    sparkleCtx.fill();
  });

// ==================== CONFETTI ====================
const confettiCanvas = document.getElementById('confettiCanvas');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiParts = [];
let confettiActive = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

function launchConfetti() {
  confettiParts = [];
  const colors = ['#ec4899','#a855f7','#3b82f6','#22c55e','#eab308','#f97316'];
  for (let i = 0; i < 120; i++) {
    confettiParts.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 3 + 2,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      life: 1,
    });
  }
  confettiActive = true;
}

function drawConfetti() {
  if (!confettiActive) { requestAnimationFrame(drawConfetti); return; }
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = 0;
  confettiParts.forEach(p => {
    if (p.life <= 0) return;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.99;
    p.rot += p.rotV;
    if (p.y > confettiCanvas.height + 20) { p.life = 0; return; }
    alive++;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.globalAlpha = Math.min(1, p.life);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  });
  if (alive === 0) { confettiActive = false; confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); }
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

// ==================== EMOJI SETS ====================
const EMOJI_POOL = [
  ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
  ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍌','🍉','🫐','🥭','🍍','🥥','🍐'],
  ['🌸','🌻','🌹','🌺','🌷','🌼','🪻','💐','🌿','🍀','🪷','🌵','🎋','🌴','🎄'],
  ['⚽','🏀','🎾','🏈','⚾','🎱','🏓','🏸','🥎','🏐','🎳','🥏','🏑','🥍','🏒'],
  ['🚗','🚕','🚌','🏎','🚑','🚒','🚐','🛻','🚜','🚲','🏍','🚂','✈️','🚀','🛸'],
  ['🎸','🎹','🥁','🎺','🎻','🪗','🎷','🪈','🎤','🎧','🎵','🎶','🔔','📯','🪘'],
  ['🍕','🍔','🌮','🍣','🍩','🍪','🎂','🧁','🍰','🍫','🍿','🥨','🥐','🧇','🥞'],
  ['🦋','🐝','🐞','🦗','🐛','🪲','🕷','🦂','🐚','🐌','🪸','🦀','🦞','🐙','🦑'],
  ['🎃','👻','🤖','👽','🦄','🐉','🧙','🧛','🧜','🧚','🎅','🤡','👑','💎','🔮'],
  ['🌙','⭐','☀️','🌈','❄️','🔥','💧','⚡','🌊','🍂','☁️','🌪','💫','🪐','🌍'],
];

// ==================== DIFFICULTY CONFIG ====================
const DIFFICULTIES = [
  { name: 'easy',   cols: 4, rows: 3, pairs: 6,  levels: 10 },
  { name: 'medium', cols: 4, rows: 4, pairs: 8,  levels: 10 },
  { name: 'hard',   cols: 5, rows: 4, pairs: 10, levels: 10 },
  { name: 'expert', cols: 6, rows: 5, pairs: 15, levels: 10 },
];

const TOTAL_LEVELS = 40;

function getDifficultyForLevel(level) {
  if (level <= 10) return 0;
  if (level <= 20) return 1;
  if (level <= 30) return 2;
  return 3;
}

function getEmojiSetForLevel(level) {
  const diffIdx = getDifficultyForLevel(level);
  const diff = DIFFICULTIES[diffIdx];
  const localLevel = ((level - 1) % 10);
  // Use seeded selection so each level has consistent emojis
  const rng = new SeededRNG(level * 31337 + 42);
  // Pick a pool and select pairs from it
  const poolIdx = (localLevel + diffIdx * 3) % EMOJI_POOL.length;
  const pool = [...EMOJI_POOL[poolIdx]];
  // Shuffle pool with seeded rng
  for (let i = pool.length - 1; i > 0; i--) {
    const j = rng.nextInt(0, i);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, diff.pairs);
}

// ==================== SEEDED RNG ====================
class SeededRNG {
  constructor(seed) { this.state = seed % 2147483647; if (this.state <= 0) this.state += 2147483646; }
  next() { this.state = (this.state * 16807) % 2147483647; return (this.state - 1) / 2147483646; }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
}

// ==================== GAME STATE ====================
let progress = {
  unlocked: 1,
  levels: {},
  sound: true,
};

let currentLevel = 1;
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 0;
let moveCount = 0;
let timerInterval = null;
let elapsedSeconds = 0;
let lockBoard = false;

function saveProgress() {
  progress.sound = soundEnabled;
  localStorage.setItem('memorycard_progress', JSON.stringify(progress));
}

function loadProgress() {
  const saved = localStorage.getItem('memorycard_progress');
  if (saved) {
    const p = JSON.parse(saved);
    progress = { ...progress, ...p };
    soundEnabled = progress.sound !== undefined ? progress.sound : true;
    document.querySelectorAll('.sound-btn').forEach(b => b.textContent = soundEnabled ? '🔊' : '🔇');
  }
}

// ==================== STAR RATING ====================
function getStars(level, moves) {
  const diffIdx = getDifficultyForLevel(level);
  const diff = DIFFICULTIES[diffIdx];
  const pairs = diff.pairs;
  // Perfect = pairs moves (one flip per pair found)
  // 3 stars: moves <= pairs * 1.3
  // 2 stars: moves <= pairs * 1.8
  // 1 star: completed
  const ratio = moves / pairs;
  if (ratio <= 1.3) return 3;
  if (ratio <= 1.8) return 2;
  return 1;
}

// ==================== SCREENS ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTitle() {
  stopTimer();
  showScreen('titleScreen');
}

function showLevels() {
  stopTimer();
  showScreen('levelScreen');
  renderLevelSelect();
}

function showGame() { showScreen('gameScreen'); }

function continueGame() {
  startLevel(progress.unlocked);
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('active');
}

function nextLevel() {
  closeWin();
  if (currentLevel < TOTAL_LEVELS) {
    startLevel(currentLevel + 1);
  } else {
    showLevels();
  }
}

// ==================== LEVEL SELECT ====================
function renderLevelSelect() {
  const t = mt();
  const container = document.getElementById('levelList');
  container.innerHTML = '';

  const ranges = [
    { label: t.easy,   start: 1,  end: 10 },
    { label: t.medium, start: 11, end: 20 },
    { label: t.hard,   start: 21, end: 30 },
    { label: t.expert, start: 31, end: 40 },
  ];

  ranges.forEach((range, ri) => {
    const title = document.createElement('div');
    title.className = 'diff-title';
    title.innerHTML = `${range.label} <span class="diff-badge">${range.end - range.start + 1} ${t.level}</span>`;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'level-grid';

    for (let i = range.start; i <= range.end; i++) {
      const cell = document.createElement('div');
      cell.className = 'level-cell';
      const levelData = progress.levels[i];

      if (i > progress.unlocked) {
        cell.classList.add('locked');
        cell.innerHTML = '<span style="opacity:0.4">🔒</span>';
      } else {
        if (levelData && levelData.stars > 0) {
          cell.classList.add('completed');
          const starStr = '⭐'.repeat(levelData.stars) + '☆'.repeat(3 - levelData.stars);
          cell.innerHTML = `${i}<div class="stars-mini">${starStr}</div>`;
        } else {
          if (i === progress.unlocked) cell.classList.add('current');
          cell.textContent = i;
        }
        cell.onclick = () => startLevel(i);
      }

      grid.appendChild(cell);
    }
    container.appendChild(grid);
  });
}

// ==================== GAME LOGIC ====================
function startLevel(level) {
  currentLevel = level;
  const diffIdx = getDifficultyForLevel(level);
  const diff = DIFFICULTIES[diffIdx];
  const t = mt();

  // Reset state
  matchedPairs = 0;
  totalPairs = diff.pairs;
  moveCount = 0;
  flippedCards = [];
  lockBoard = false;
  stopTimer();
  elapsedSeconds = 0;

  // Update UI
  document.getElementById('levelLabel').textContent = `${t.level} ${level}`;
  document.getElementById('movesDisplay').textContent = '0';
  document.getElementById('matchDisplay').textContent = `0/${totalPairs}`;
  document.getElementById('timeDisplay').textContent = '0:00';

  // Generate card deck
  const emojis = getEmojiSetForLevel(level);
  let deck = [];
  emojis.forEach(e => { deck.push(e); deck.push(e); });

  // Shuffle deck with seeded rng
  const rng = new SeededRNG(level * 9973 + 7);
  for (let i = deck.length - 1; i > 0; i--) {
    const j = rng.nextInt(0, i);
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }

  cards = deck;

  // Build grid
  const grid = document.getElementById('cardGrid');
  grid.style.gridTemplateColumns = `repeat(${diff.cols}, 1fr)`;
  grid.innerHTML = '';

  deck.forEach((emoji, idx) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.innerHTML = `
      <div class="card" data-idx="${idx}" data-emoji="${emoji}">
        <div class="card-face card-back"><div class="card-pattern"></div></div>
        <div class="card-face card-front"><span class="emoji">${emoji}</span></div>
      </div>`;
    slot.onclick = () => flipCard(idx);
    grid.appendChild(slot);
  });

  // Brief peek at start (show cards for 1.5s on easy levels)
  if (diffIdx === 0) {
    lockBoard = true;
    const allCards = grid.querySelectorAll('.card');
    allCards.forEach(c => c.classList.add('flipped'));
    setTimeout(() => {
      allCards.forEach(c => c.classList.remove('flipped'));
      lockBoard = false;
      startTimer();
    }, 1500);
  } else {
    startTimer();
  }

  showGame();
}

function flipCard(idx) {
  if (lockBoard) return;
  const cardEl = document.querySelector(`.card[data-idx="${idx}"]`);
  if (!cardEl || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  // Init audio on first interaction
  getAudio();

  playFlip();
  cardEl.classList.add('flipped');
  flippedCards.push({ idx, emoji: cards[idx], el: cardEl });

  if (flippedCards.length === 2) {
    moveCount++;
    document.getElementById('movesDisplay').textContent = moveCount;
    lockBoard = true;

    const [a, b] = flippedCards;

    if (a.emoji === b.emoji) {
      // Match
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        playMatch();
        matchedPairs++;
        document.getElementById('matchDisplay').textContent = `${matchedPairs}/${totalPairs}`;
        flippedCards = [];
        lockBoard = false;

        if (matchedPairs === totalPairs) {
          onWin();
        }
      }, 300);
    } else {
      // Mismatch
      setTimeout(() => {
        a.el.classList.add('mismatched');
        b.el.classList.add('mismatched');
        playMismatch();
        setTimeout(() => {
          a.el.classList.remove('flipped', 'mismatched');
          b.el.classList.remove('flipped', 'mismatched');
          flippedCards = [];
          lockBoard = false;
        }, 600);
      }, 500);
    }
  }
}

function resetLevel() {
  startLevel(currentLevel);
}

// ==================== TIMER ====================
function startTimer() {
  stopTimer();
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    document.getElementById('timeDisplay').textContent = formatTime(elapsedSeconds);
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

// ==================== WIN ====================
function onWin() {
  stopTimer();
  playWin();
  launchConfetti();

  const stars = getStars(currentLevel, moveCount);
  const t = mt();

  // Update progress
  const prev = progress.levels[currentLevel];
  if (!prev || prev.stars < stars) {
    progress.levels[currentLevel] = { stars, moves: moveCount, time: elapsedSeconds };
  }
  if (currentLevel >= progress.unlocked && currentLevel < TOTAL_LEVELS) {
    progress.unlocked = currentLevel + 1;
  }
  saveProgress();

  // Show overlay
  setTimeout(() => {
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('winStars').textContent = starStr;
    document.getElementById('winMoves').textContent = moveCount;
    document.getElementById('winTime').textContent = formatTime(elapsedSeconds);
    document.getElementById('winTitle').textContent = stars === 3 ? t.perfect : t.clear;
    document.getElementById('winSub').textContent = stars === 3 ? t.amazing : stars === 2 ? t.well_done : t.good_job;

    if (currentLevel >= TOTAL_LEVELS) {
      document.getElementById('btnNextLevel').style.display = 'none';
    } else {
      document.getElementById('btnNextLevel').style.display = '';
    }

    document.getElementById('winOverlay').classList.add('active');

    // Try share
    try {
      if (typeof PuzzleShare !== 'undefined') {
        PuzzleShare.showShareModal({
          game: 'Memory Card',
          level: currentLevel,
          stars: stars,
          moves: moveCount,
          time: formatTime(elapsedSeconds),
        });
      }
    } catch(e) {}
  }, 800);
}
