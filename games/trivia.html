<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trivia Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#0a0a1a;color:#e2e8f0}
body{display:flex;flex-direction:column;align-items:center}

.ad-placeholder{width:100%;max-width:480px;height:50px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:12px;letter-spacing:1px;flex-shrink:0}
.ad-top{border-radius:0 0 8px 8px}.ad-bottom{border-radius:8px 8px 0 0;margin-top:auto}

.header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0}
.back-link{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px;transition:color .2s}
.back-link:hover{color:#e2e8f0}
.title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#f59e0b,#ec4899,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.score-bar{width:100%;max-width:480px;display:flex;justify-content:space-around;padding:6px 16px;flex-shrink:0}
.score-box{text-align:center}
.score-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.score-value{font-size:22px;font-weight:900;color:#f1f5f9;line-height:1.1}
.score-value.streak{color:#fbbf24}.score-value.best{color:#a855f7}.score-value.acc{color:#34d399}

.timer-wrap{width:100%;max-width:480px;padding:0 16px;flex-shrink:0;margin:4px 0}
.timer-bar-bg{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.timer-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#a855f7,#ec4899);transition:width .1s linear;width:100%}
.timer-bar-fill.urgent{background:linear-gradient(90deg,#ef4444,#f97316);animation:timerPulse .5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}
.timer-text{text-align:center;font-size:14px;font-weight:700;color:#94a3b8;margin-top:2px}
.timer-text.urgent{color:#ef4444;animation:timerPulse .5s ease-in-out infinite}

.progress-wrap{width:100%;max-width:480px;padding:0 16px;flex-shrink:0;margin:2px 0}
.progress-bar-bg{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#a855f7);transition:width .3s ease;width:0%}
.progress-text{text-align:center;font-size:12px;color:#64748b;font-weight:600;margin-top:2px}

.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:480px;padding:8px 16px;min-height:0;gap:10px;overflow-y:auto}

.question-box{width:100%;background:rgba(255,255,255,.04);border-radius:20px;border:1px solid rgba(255,255,255,.08);padding:20px 16px;text-align:center;position:relative;overflow:hidden;min-height:80px;display:flex;align-items:center;justify-content:center}
.question-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(168,85,247,.05));pointer-events:none}
.question-text{font-size:18px;font-weight:700;line-height:1.4;position:relative;z-index:1}
.category-badge{position:absolute;top:8px;left:12px;font-size:12px;font-weight:700;color:#a855f7;background:rgba(168,85,247,.15);padding:2px 10px;border-radius:20px;z-index:1}

.lifeline-bar{display:flex;gap:10px;align-items:center;width:100%;justify-content:center}
.lifeline-btn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fbbf24;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.lifeline-btn:hover{background:rgba(245,158,11,.25);transform:translateY(-1px)}
.lifeline-btn:disabled{opacity:.3;cursor:default;transform:none}
.lifeline-btn .count{background:rgba(0,0,0,.3);padding:1px 7px;border-radius:8px;font-size:11px}

.lives-display{display:flex;gap:4px;align-items:center;font-size:22px}
.life{transition:all .3s ease}.life.lost{opacity:.2;transform:scale(.7)}

.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.answer-btn{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 8px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;color:#e2e8f0;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.2}
.answer-btn:hover{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4)}
.answer-btn:active{transform:scale(.95)}
.answer-btn.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e;animation:btnPop .3s ease-out}
.answer-btn.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444;animation:btnShake .3s ease-out}
.answer-btn.reveal-correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5);color:#22c55e}
.answer-btn.hidden-5050{opacity:0;pointer-events:none;transform:scale(.8)}
.answer-btn:disabled{cursor:default;pointer-events:none}
@keyframes btnPop{0%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes btnShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;visibility:hidden;transition:all .3s}
.overlay.show{opacity:1;visibility:visible}
.overlay-box{background:#1a1a2e;border-radius:20px;padding:32px;text-align:center;max-width:400px;width:90%;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.overlay-box h2{font-size:28px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#f59e0b,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay-box .subtitle{font-size:14px;color:#94a3b8;margin-bottom:20px}
.overlay-box .final-score{font-size:56px;font-weight:900;color:#fbbf24;margin:8px 0;text-shadow:0 0 30px rgba(251,191,36,.3)}
.overlay-box .stat-row{display:flex;justify-content:space-around;margin:16px 0;gap:8px}
.overlay-box .stat-item{text-align:center}
.overlay-box .stat-val{font-size:22px;font-weight:800;color:#f1f5f9}
.overlay-box .stat-lbl{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase}
.overlay-box .best-label{font-size:14px;color:#a855f7;margin-bottom:16px;font-weight:600}

.mode-buttons{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.mode-btn{background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(236,72,153,.2));border:1px solid rgba(168,85,247,.3);color:#e2e8f0;padding:14px 20px;border-radius:12px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;text-align:left;display:flex;justify-content:space-between;align-items:center}
.mode-btn:hover{background:linear-gradient(135deg,rgba(168,85,247,.3),rgba(236,72,153,.3));transform:translateY(-1px)}
.mode-btn:active{transform:scale(.98)}
.mode-btn .mode-desc{font-size:12px;color:#94a3b8;font-weight:600}

.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;width:100%}
.cat-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 10px;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;color:#e2e8f0;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.cat-btn:hover{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);transform:translateY(-2px)}
.cat-btn .cat-icon{font-size:28px}
.cat-btn .cat-name{font-size:12px}

.primary-btn{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(168,85,247,.4);margin-top:8px}
.primary-btn:hover{transform:scale(1.05)}.primary-btn:active{transform:scale(.97)}
.share-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:#94a3b8;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:6px;transition:all .15s}
.share-btn:hover{border-color:rgba(255,255,255,.3);color:#e2e8f0}

.streak-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;opacity:0;font-weight:900;text-align:center;white-space:nowrap}
.streak-display.show{animation:streakIn .7s ease-out forwards}
@keyframes streakIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}30%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(1.1)}}

@media(max-width:380px){
  .question-text{font-size:15px}
  .answer-btn{font-size:13px;padding:12px 6px}
  .overlay-box{padding:24px 18px}
  .cat-btn{padding:10px 6px;font-size:12px}
}
</style>
</head>
<body>

<div class="ad-placeholder ad-top"><span data-i18n="ad_area">AD SPACE</span></div>

<div class="header">
  <a class="back-link" href="../index.html" data-i18n="back"></a>
  <div class="title" id="gameTitle"></div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-box"><div class="score-label" data-i18n="score"></div><div class="score-value" id="scoreDisplay">0</div></div>
  <div class="score-box"><div class="score-label" id="streakLabel"></div><div class="score-value streak" id="streakDisplay">0</div></div>
  <div class="score-box"><div class="score-label" id="accuracyLabel"></div><div class="score-value acc" id="accuracyDisplay">0%</div></div>
  <div class="score-box"><div class="score-label" data-i18n="best"></div><div class="score-value best" id="bestDisplay">0</div></div>
</div>

<div class="timer-wrap" id="timerWrap" style="display:none">
  <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerFill"></div></div>
  <div class="timer-text" id="timerText">15s</div>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
</div>

<div class="game-area" id="gameArea">
  <div id="livesDisplay" class="lives-display" style="display:none"></div>
  <div class="question-box" id="questionBox" style="display:none">
    <span class="category-badge" id="catBadge"></span>
    <div class="question-text" id="questionText"></div>
  </div>
  <div class="lifeline-bar" id="lifelineBar" style="display:none">
    <button class="lifeline-btn" id="fiftyBtn" onclick="useFiftyFifty()">50/50 <span class="count" id="fiftyCount">3</span></button>
  </div>
  <div class="answers-grid" id="answersGrid" style="display:none">
    <button class="answer-btn" id="ans0"></button>
    <button class="answer-btn" id="ans1"></button>
    <button class="answer-btn" id="ans2"></button>
    <button class="answer-btn" id="ans3"></button>
  </div>
</div>

<div class="ad-placeholder ad-bottom"><span data-i18n="ad_area">AD SPACE</span></div>

<div class="streak-display" id="streakPopup"></div>

<!-- Mode Select Overlay -->
<div class="overlay" id="modeOverlay">
  <div class="overlay-box" id="modeBox"></div>
</div>

<!-- Category Select Overlay -->
<div class="overlay" id="catOverlay">
  <div class="overlay-box" id="catBox"></div>
</div>

<!-- Game Over Overlay -->
<div class="overlay" id="overOverlay">
  <div class="overlay-box" id="overBox"></div>
</div>

<script src="i18n.js"></script>
<script src="share.js"></script>

// ─── Audio ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='sine',vol=.13){
  ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function sfxCorrect(){playTone(523,.08);setTimeout(()=>playTone(659,.08),80);setTimeout(()=>playTone(784,.15),160)}
function sfxWrong(){playTone(200,.15,'sawtooth',.1);setTimeout(()=>playTone(160,.2,'sawtooth',.1),120)}
function sfxTick(){playTone(800,.03,'sine',.06)}
function sfxSelect(){playTone(440,.06);setTimeout(()=>playTone(554,.06),60)}
function sfxGameOver(){playTone(400,.15,'triangle',.1);setTimeout(()=>playTone(350,.15,'triangle',.1),150);setTimeout(()=>playTone(300,.25,'triangle',.1),300)}
function sfxNewBest(){playTone(523,.1);setTimeout(()=>playTone(659,.1),100);setTimeout(()=>playTone(784,.1),200);setTimeout(()=>playTone(1047,.2),300)}

// ─── Game State ───
let mode=''; // quick, category, marathon
let selectedCategory='';
let questions=[];
let currentQ=0;
let score=0;
let streak=0;
let bestStreak=0;
let correctCount=0;
let wrongCount=0;
let lives=3;
let fiftyUses=3;
let timerInterval=null;
let timeLeft=15;
let totalTime=0;
let gameActive=false;

// ─── DOM refs ───
const $=id=>document.getElementById(id);
const scoreBar=$('scoreBar');
const timerWrap=$('timerWrap');
const progressWrap=$('progressWrap');
const questionBox=$('questionBox');
const questionText=$('questionText');
const catBadge=$('catBadge');
const answersGrid=$('answersGrid');
const lifelineBar=$('lifelineBar');
const livesDisplay=$('livesDisplay');
const scoreDisplay=$('scoreDisplay');
const streakDisplay=$('streakDisplay');
const accuracyDisplay=$('accuracyDisplay');
const bestDisplay=$('bestDisplay');
const timerFill=$('timerFill');
const timerText=$('timerText');
const progressFill=$('progressFill');
const progressText=$('progressText');
const fiftyBtn=$('fiftyBtn');
const fiftyCount=$('fiftyCount');
const streakPopup=$('streakPopup');

// ─── Init ───
function init(){
  $('gameTitle').textContent=tt.gameTitle;
  $('streakLabel').textContent=tt.streak;
  $('accuracyLabel').textContent=tt.accuracy;
  applyGameI18n();
  showModeSelect();
}

// ─── Mode Select ───
function showModeSelect(){
  gameActive=false;
  scoreBar.style.display='none';
  timerWrap.style.display='none';
  progressWrap.style.display='none';
  questionBox.style.display='none';
  answersGrid.style.display='none';
  lifelineBar.style.display='none';
  livesDisplay.style.display='none';

  const box=$('modeBox');
  box.innerHTML=`
    <h2>${tt.gameTitle}</h2>
    <div class="subtitle">${tt.selectMode}</div>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="selectMode('quick')"><span>${tt.quickPlay}</span><span class="mode-desc">${tt.quickDesc}</span></button>
      <button class="mode-btn" onclick="selectMode('category')"><span>${tt.categoryPlay}</span><span class="mode-desc">${tt.catDesc}</span></button>
      <button class="mode-btn" onclick="selectMode('marathon')"><span>${tt.marathon}</span><span class="mode-desc">${tt.marathonDesc}</span></button>
    </div>`;
  $('modeOverlay').classList.add('show');
  $('catOverlay').classList.remove('show');
  $('overOverlay').classList.remove('show');
}

function selectMode(m){
  sfxSelect();
  mode=m;
  $('modeOverlay').classList.remove('show');
  if(m==='category'){
    showCategorySelect();
  } else {
    startGame();
  }
}

// ─── Category Select ───
function showCategorySelect(){
  const box=$('catBox');
  let html=`<h2>${tt.selectCategory}</h2><div class="category-grid">`;
  CATEGORIES.forEach(c=>{
    html+=`<button class="cat-btn" onclick="selectCategory('${c.id}')"><span class="cat-icon">${c.icon}</span><span class="cat-name">${tt[c.key]}</span></button>`;
  });
  html+=`</div>`;
  box.innerHTML=html;
  $('catOverlay').classList.add('show');
}

function selectCategory(cat){
  sfxSelect();
  selectedCategory=cat;
  $('catOverlay').classList.remove('show');
  startGame();
}

// ─── Start Game ───
function startGame(){
  // Reset state
  currentQ=0; score=0; streak=0; bestStreak=0; correctCount=0; wrongCount=0;
  lives=3; fiftyUses=3; totalTime=0; gameActive=true;

  // Build question list
  if(mode==='quick'){
    let all=[];
    Object.keys(QUESTIONS).forEach(cat=>{
      QUESTIONS[cat].forEach(q=>all.push({...q,cat}));
    });
    shuffle(all);
    questions=all.slice(0,10);
  } else if(mode==='category'){
    let catQs=QUESTIONS[selectedCategory].map(q=>({...q,cat:selectedCategory}));
    shuffle(catQs);
    questions=catQs.slice(0,10);
  } else { // marathon
    let all=[];
    Object.keys(QUESTIONS).forEach(cat=>{
      QUESTIONS[cat].forEach(q=>all.push({...q,cat}));
    });
    shuffle(all);
    questions=all;
  }

  // Show UI
  scoreBar.style.display='flex';
  questionBox.style.display='flex';
  answersGrid.style.display='grid';
  lifelineBar.style.display='flex';
  timerWrap.style.display='block';

  if(mode==='marathon'){
    livesDisplay.style.display='flex';
    progressWrap.style.display='none';
    updateLives();
  } else {
    livesDisplay.style.display='none';
    progressWrap.style.display='block';
  }

  // Load best
  const bestKey=getBestKey();
  const best=parseInt(localStorage.getItem(bestKey))||0;
  bestDisplay.textContent=best;

  fiftyCount.textContent=fiftyUses;
  fiftyBtn.disabled=false;
  updateScore();
  showQuestion();
}

function getBestKey(){
  if(mode==='category') return 'trivia_best_'+mode+'_'+selectedCategory;
  return 'trivia_best_'+mode;
}

// ─── Show Question ───
function showQuestion(){
  if(!gameActive) return;
  if(mode!=='marathon' && currentQ>=questions.length){
    endGame(); return;
  }
  if(mode==='marathon' && currentQ>=questions.length){
    // Reshuffle if we run out
    let all=[];
    Object.keys(QUESTIONS).forEach(cat=>{
      QUESTIONS[cat].forEach(q=>all.push({...q,cat}));
    });
    shuffle(all);
    questions=questions.concat(all);
  }

  const q=questions[currentQ];
  const catObj=CATEGORIES.find(c=>c.id===q.cat);
  catBadge.textContent=catObj?catObj.icon+' '+tt[catObj.key]:'';
  questionText.textContent=q.q[lang]||q.q.en;

  // Shuffle answer order
  const indices=[0,1,2,3];
  shuffle(indices);

  for(let i=0;i<4;i++){
    const btn=$('ans'+i);
    btn.className='answer-btn';
    btn.style.opacity='1';btn.style.pointerEvents='auto';btn.style.transform='';
    const aIdx=indices[i];
    btn.textContent=q.a[aIdx][lang]||q.a[aIdx].en;
    btn.dataset.idx=aIdx;
    btn.onclick=()=>selectAnswer(i,aIdx);
  }

  // Update progress
  if(mode!=='marathon'){
    const pct=((currentQ)/questions.length)*100;
    progressFill.style.width=pct+'%';
    progressText.textContent=`${tt.question} ${currentQ+1}/${questions.length}`;
  }

  // Start timer
  startTimer();
}

// ─── Timer ───
function startTimer(){
  clearInterval(timerInterval);
  timeLeft=15;
  timerFill.style.width='100%';
  timerFill.classList.remove('urgent');
  timerText.classList.remove('urgent');
  timerText.textContent='15s';

  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    if(timeLeft<=0){
      timeLeft=0;
      clearInterval(timerInterval);
      timeUp();
    }
    const pct=(timeLeft/15)*100;
    timerFill.style.width=pct+'%';
    timerText.textContent=Math.ceil(timeLeft)+'s';
    if(timeLeft<=5){
      timerFill.classList.add('urgent');
      timerText.classList.add('urgent');
      if(Math.ceil(timeLeft)!==Math.ceil(timeLeft+0.1)) sfxTick();
    }
  },100);
}

function timeUp(){
  // Treat as wrong
  handleWrong(-1);
}

// ─── Answer Selection ───
function selectAnswer(btnIdx, ansIdx){
  if(!gameActive) return;
  clearInterval(timerInterval);
  const q=questions[currentQ];
  const timeBonus=Math.round(timeLeft*10);
  totalTime+=(15-timeLeft);

  // Disable all buttons
  for(let i=0;i<4;i++) $('ans'+i).onclick=null;

  if(ansIdx===q.correct){
    handleCorrect(btnIdx, timeBonus);
  } else {
    handleWrong(btnIdx);
  }
}

function handleCorrect(btnIdx, timeBonus){
  sfxCorrect();
  if(btnIdx>=0) $('ans'+btnIdx).classList.add('correct');
  correctCount++;
  streak++;
  if(streak>bestStreak) bestStreak=streak;
  const pts=100+timeBonus+(streak>1?streak*10:0);
  score+=pts;
  updateScore();

  if(streak>=3) showStreakPopup(streak);

  setTimeout(()=>{
    currentQ++;
    showQuestion();
  },800);
}

function handleWrong(btnIdx){
  sfxWrong();
  const q=questions[currentQ];
  if(btnIdx>=0) $('ans'+btnIdx).classList.add('wrong');
  wrongCount++;
  streak=0;

  // Reveal correct
  for(let i=0;i<4;i++){
    if(parseInt($('ans'+i).dataset.idx)===q.correct){
      $('ans'+i).classList.add('reveal-correct');
    }
  }

  if(mode==='marathon'){
    lives--;
    updateLives();
    if(lives<=0){
      setTimeout(()=>endGame(),1000);
      return;
    }
  }

  updateScore();

  setTimeout(()=>{
    currentQ++;
    showQuestion();
  },1200);
}

// ─── 50/50 Lifeline ───
function useFiftyFifty(){
  if(fiftyUses<=0||!gameActive) return;
  sfxSelect();
  fiftyUses--;
  fiftyCount.textContent=fiftyUses;
  if(fiftyUses<=0) fiftyBtn.disabled=true;

  const q=questions[currentQ];
  // Find 2 wrong answers to hide
  let wrongBtns=[];
  for(let i=0;i<4;i++){
    if(parseInt($('ans'+i).dataset.idx)!==q.correct) wrongBtns.push(i);
  }
  shuffle(wrongBtns);
  const toHide=wrongBtns.slice(0,2);
  toHide.forEach(i=>{
    $('ans'+i).classList.add('hidden-5050');
  });
}

// ─── UI Updates ───
function updateScore(){
  scoreDisplay.textContent=score;
  streakDisplay.textContent=streak;
  const total=correctCount+wrongCount;
  accuracyDisplay.textContent=total>0?Math.round((correctCount/total)*100)+'%':'0%';
}

function updateLives(){
  let html='';
  for(let i=0;i<3;i++){
    html+=`<span class="life${i>=lives?' lost':''}">${i<lives?'❤️':'🖤'}</span>`;
  }
  livesDisplay.innerHTML=html;
}

function showStreakPopup(s){
  const colors=['#fbbf24','#f59e0b','#ec4899','#a855f7'];
  streakPopup.textContent=`🔥 ${s} ${tt.streak}!`;
  streakPopup.style.fontSize=s>=10?'42px':s>=5?'36px':'30px';
  streakPopup.style.color=colors[Math.min(s-3,colors.length-1)];
  streakPopup.className='streak-display show';
  setTimeout(()=>streakPopup.className='streak-display',700);
}

// ─── End Game ───
function endGame(){
  gameActive=false;
  clearInterval(timerInterval);
  timerWrap.style.display='none';

  const bestKey=getBestKey();
  const prevBest=parseInt(localStorage.getItem(bestKey))||0;
  const isNewBest=score>prevBest;
  if(isNewBest) localStorage.setItem(bestKey,score);

  if(isNewBest) sfxNewBest(); else sfxGameOver();

  const total=correctCount+wrongCount;
  const acc=total>0?Math.round((correctCount/total)*100):0;
  const avgTime=total>0?(totalTime/total).toFixed(1):'0';

  let extraStat='';
  if(mode==='marathon'){
    extraStat=`<div class="stat-item"><div class="stat-val">${currentQ}</div><div class="stat-lbl">${tt.survived}</div></div>`;
  }

  const box=$('overBox');
  box.innerHTML=`
    <h2>${tt.gameOver}</h2>
    <div class="subtitle">${isNewBest?tt.newBest:tt.finalScore}</div>
    <div class="final-score" id="animScore">0</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-val">${correctCount}</div><div class="stat-lbl">${tt.correct}</div></div>
      <div class="stat-item"><div class="stat-val">${wrongCount}</div><div class="stat-lbl">${tt.wrong}</div></div>
      <div class="stat-item"><div class="stat-val">${acc}%</div><div class="stat-lbl">${tt.accuracy}</div></div>
      ${extraStat}
    </div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-val">${bestStreak}🔥</div><div class="stat-lbl">${tt.streak}</div></div>
      <div class="stat-item"><div class="stat-val">${avgTime}s</div><div class="stat-lbl">${tt.timeTaken}</div></div>
    </div>
    ${isNewBest?`<div class="best-label">🏆 ${tt.newBest}</div>`:''}
    <button class="primary-btn" onclick="restart()">${tt.playAgain}</button>
    <br>
    <button class="share-btn" onclick="shareResult()">${tt.shareResult}</button>
  `;
  $('overOverlay').classList.add('show');

  // Animate score counter
  animateCounter('animScore',score);
}

function animateCounter(elId,target){
  const el=$(elId);
  let cur=0;
  const step=Math.max(1,Math.floor(target/40));
  const iv=setInterval(()=>{
    cur+=step;
    if(cur>=target){cur=target;clearInterval(iv)}
    el.textContent=cur;
  },25);
}

function restart(){
  $('overOverlay').classList.remove('show');
  showModeSelect();
}

function shareResult(){
  const total=correctCount+wrongCount;
  const acc=total>0?Math.round((correctCount/total)*100):0;
  if(typeof PuzzleShare!=='undefined'){
    PuzzleShare.showShareModal({
      title:tt.gameTitle,
      score:score,
      message:`${correctCount}/${total} (${acc}%) | ${tt.streak}: ${bestStreak}🔥`,
      lang:lang,
      gameName:'Trivia Challenge'
    });
  }
}

// ─── Utils ───
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// Start
init();
</script>
</body>
