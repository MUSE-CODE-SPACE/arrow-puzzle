<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>반응속도 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#0a0a1a;color:#e2e8f0}
body{display:flex;flex-direction:column;align-items:center}

.ad-placeholder{width:100%;max-width:480px;height:50px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:12px;letter-spacing:1px;flex-shrink:0}
.ad-top{border-radius:0 0 8px 8px}
.ad-bottom{border-radius:8px 8px 0 0;margin-top:auto}

.header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0}
.back-link{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px;transition:color .2s}
.back-link:hover{color:#e2e8f0}
.title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ec4899,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:480px;padding:16px;position:relative;min-height:0;overflow-y:auto}

/* Phase indicator */
.phase-bar{width:100%;max-width:400px;display:flex;gap:4px;margin-bottom:16px;flex-shrink:0}
.phase-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.1);transition:background .3s}
.phase-dot.done{background:linear-gradient(135deg,#a855f7,#ec4899)}
.phase-dot.active{background:linear-gradient(135deg,#fbbf24,#f59e0b);animation:pulseDot 1s ease-in-out infinite}
@keyframes pulseDot{0%,100%{opacity:.7}50%{opacity:1}}

/* Stats row */
.stats-row{width:100%;max-width:400px;display:flex;justify-content:space-around;margin-bottom:12px;flex-shrink:0}
.stat-box{text-align:center}
.stat-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:20px;font-weight:900;color:#f1f5f9;line-height:1.1}
.stat-value.best-val{color:#a855f7}

/* Main tap zone */
.tap-zone{width:100%;max-width:400px;aspect-ratio:1/1;max-height:340px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:background .15s,transform .1s,box-shadow .3s;flex-shrink:0}
.tap-zone:active{transform:scale(.98)}

.tap-zone.waiting{background:linear-gradient(135deg,#1e1b4b,#312e81);border:2px solid rgba(139,92,246,.3);box-shadow:0 0 40px rgba(139,92,246,.1)}
.tap-zone.ready{background:linear-gradient(135deg,#dc2626,#ef4444);border:2px solid rgba(239,68,68,.5);box-shadow:0 0 60px rgba(239,68,68,.3);animation:pulseReady 1.2s ease-in-out infinite}
@keyframes pulseReady{0%,100%{box-shadow:0 0 40px rgba(239,68,68,.3)}50%{box-shadow:0 0 80px rgba(239,68,68,.5)}}
.tap-zone.go{background:linear-gradient(135deg,#16a34a,#22c55e);border:2px solid rgba(34,197,94,.6);box-shadow:0 0 80px rgba(34,197,94,.4)}
.tap-zone.too-early{background:linear-gradient(135deg,#b91c1c,#991b1b);border:2px solid rgba(220,38,38,.5);animation:shakeZone .4s ease-out}
@keyframes shakeZone{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.tap-zone.result{background:linear-gradient(135deg,#1e1b4b,#312e81);border:2px solid rgba(139,92,246,.3)}

/* Choice reaction arrows */
.tap-zone.choice-wait{background:linear-gradient(135deg,#1e1b4b,#312e81);border:2px solid rgba(139,92,246,.3)}
.tap-zone.choice-go{background:linear-gradient(135deg,#0f172a,#1e293b);border:2px solid rgba(59,130,246,.4);box-shadow:0 0 60px rgba(59,130,246,.2)}

/* Color reaction */
.tap-zone.color-wait{border:2px solid rgba(255,255,255,.1)}

.tap-text{font-size:28px;font-weight:800;text-align:center;line-height:1.2;pointer-events:none}
.tap-subtext{font-size:14px;font-weight:600;color:rgba(255,255,255,.6);margin-top:8px;pointer-events:none}
.tap-time{font-size:64px;font-weight:900;pointer-events:none;line-height:1}
.tap-ms{font-size:18px;font-weight:600;color:rgba(255,255,255,.7);pointer-events:none}

/* Arrow directions for choice reaction */
.arrow-display{font-size:100px;pointer-events:none;line-height:1;filter:drop-shadow(0 0 20px rgba(255,255,255,.3))}
.arrow-choices{display:flex;gap:12px;margin-top:16px;pointer-events:auto}
.arrow-btn{width:70px;height:70px;border-radius:16px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.arrow-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)}
.arrow-btn:active{transform:scale(.9);background:rgba(255,255,255,.15)}
.arrow-btn.correct{background:rgba(34,197,94,.3);border-color:#22c55e}
.arrow-btn.wrong{background:rgba(239,68,68,.3);border-color:#ef4444}

/* Color target indicator */
.color-target{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 16px;border-radius:12px;background:rgba(255,255,255,.05);flex-shrink:0}
.color-target-label{font-size:13px;color:#94a3b8;font-weight:600}
.color-target-swatch{width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.2)}
.color-target-name{font-size:15px;font-weight:700}

/* Round indicators */
.rounds-row{display:flex;gap:6px;margin-top:12px;flex-shrink:0}
.round-pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.round-pip.done{background:#22c55e}
.round-pip.current{background:#fbbf24;box-shadow:0 0 10px rgba(251,191,36,.5)}
.round-pip.fail{background:#ef4444}

/* Countdown overlay */
.countdown{position:absolute;font-size:120px;font-weight:900;opacity:0;pointer-events:none;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(168,85,247,.5))}
.countdown.show{animation:countPop .7s ease-out forwards}
@keyframes countPop{0%{opacity:0;transform:scale(2)}15%{opacity:1;transform:scale(.9)}30%{transform:scale(1.05)}50%{transform:scale(1)}100%{opacity:0;transform:scale(.8) translateY(-20px)}}

/* Results overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;visibility:hidden;transition:all .3s}
.overlay.show{opacity:1;visibility:visible}
.overlay-box{background:#1a1a2e;border-radius:24px;padding:32px 28px;text-align:center;max-width:360px;width:92%;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay-box h2{font-size:24px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#ec4899,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-rating{font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:16px}
.result-avg{font-size:56px;font-weight:900;background:linear-gradient(135deg,#22c55e,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.result-avg-label{font-size:14px;color:#94a3b8;margin-bottom:16px}
.result-breakdown{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.result-phase{background:rgba(255,255,255,.05);border-radius:12px;padding:10px 14px;text-align:center;min-width:90px}
.result-phase-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase}
.result-phase-value{font-size:20px;font-weight:800;color:#f1f5f9}
.result-comparison{font-size:13px;color:#94a3b8;margin-bottom:20px;line-height:1.5}
.result-best{font-size:13px;color:#a855f7;margin-bottom:16px;font-weight:600}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:14px 28px;border-radius:14px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:scale(1.04)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.4)}
.btn-secondary{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.12)}
.btn-share{background:linear-gradient(135deg,#3b82f6,#06b6d4);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.3)}

/* Sparkle BG */
#sparkleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* History panel */
.history-panel{width:100%;max-width:400px;margin-top:12px;flex-shrink:0}
.history-toggle{background:none;border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
.history-toggle:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
.history-list{max-height:120px;overflow-y:auto;margin-top:8px;display:none}
.history-list.open{display:block}
.history-item{display:flex;justify-content:space-between;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:4px;font-size:12px;color:#94a3b8}
.history-item .h-time{font-weight:700;color:#e2e8f0}
.history-item .h-rating{color:#a855f7}

@media(max-height:640px){
  .tap-zone{max-height:240px}
  .tap-time{font-size:48px}
  .arrow-display{font-size:72px}
  .stats-row{margin-bottom:6px}
  .phase-bar{margin-bottom:8px}
}

</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<div class="ad-placeholder ad-top">AD SPACE</div>

<div class="header">
  <a href="../index.html" class="back-link" id="backLink">← 메인으로</a>
  <div class="title" id="gameTitle">반응속도 테스트</div>
</div>

<div class="game-area">
  <!-- Phase progress -->
  <div class="phase-bar" id="phaseBar">
    <div class="phase-dot" id="phase0"></div>
    <div class="phase-dot" id="phase1"></div>
    <div class="phase-dot" id="phase2"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-label" id="roundLabel">ROUND</div><div class="stat-value" id="roundDisplay">-</div></div>
    <div class="stat-box"><div class="stat-label" id="avgLabel">AVG</div><div class="stat-value" id="avgDisplay">-</div></div>
    <div class="stat-box"><div class="stat-label" id="bestLabel">BEST</div><div class="stat-value best-val" id="bestDisplay">-</div></div>
  </div>

  <!-- Color target (shown only in color phase) -->
  <div class="color-target" id="colorTarget" style="display:none">
    <div class="color-target-label" id="colorTargetLabel">TAP WHEN:</div>
    <div class="color-target-swatch" id="colorTargetSwatch"></div>
    <div class="color-target-name" id="colorTargetName"></div>
  </div>

  <!-- Main tap zone -->
  <div class="tap-zone waiting" id="tapZone">
    <div class="tap-text" id="tapText">TAP TO START</div>
    <div class="tap-subtext" id="tapSubtext"></div>
    <div class="countdown" id="countdown"></div>
  </div>

  <!-- Round pips -->
  <div class="rounds-row" id="roundsRow"></div>

  <!-- History -->
  <div class="history-panel" id="historyPanel">
    <button class="history-toggle" id="historyToggle">HISTORY</button>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="ad-placeholder ad-bottom">AD SPACE</div>

<!-- Results Overlay -->
<div class="overlay" id="resultOverlay">
  <div class="overlay-box">
    <h2 id="resultTitle">Results</h2>
    <div class="result-rating" id="resultRating"></div>
    <div class="result-avg" id="resultAvg">0ms</div>
    <div class="result-avg-label" id="resultAvgLabel">Average Reaction Time</div>
    <div class="result-breakdown" id="resultBreakdown"></div>
    <div class="result-comparison" id="resultComparison"></div>
    <div class="result-best" id="resultBest"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnRetry">RETRY</button>
      <button class="btn btn-share" id="btnShare">SHARE</button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="share.js"></script>

function T(key) {
  const lang = (typeof getGameLang === 'function') ? getGameLang() : 'ko';
  const dict = RT_I18N[lang] || RT_I18N.ko;
  return dict[key] || RT_I18N.ko[key] || key;

// ===== AUDIO ENGINE =====
const Audio = {
  ctx: null,
  init() { if (this.ctx) return; this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  _play(fn) { this.init(); this.resume(); try { fn(this.ctx); } catch(e) {} },
  beep() {
    this._play(ctx => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.06);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.15);
    });
  },
  success() {
    this._play(ctx => {
      [523, 659, 784].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.08);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.2);
        o.start(ctx.currentTime + i * 0.08); o.stop(ctx.currentTime + i * 0.08 + 0.2);
      });
    });
  },
  buzz() {
    this._play(ctx => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(150, ctx.currentTime);
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
    });
  },
  countdown() {
    this._play(ctx => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle'; o.frequency.setValueAtTime(440, ctx.currentTime);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
    });
  },
  go() {
    this._play(ctx => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(660, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
    });
  },
  fanfare() {
    this._play(ctx => {
      const notes = [523, 659, 784, 1047, 784, 1047];
      notes.forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle'; o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
        o.start(ctx.currentTime + i * 0.1); o.stop(ctx.currentTime + i * 0.1 + 0.25);
      });
    });
  }
};

// ===== HELPERS =====
function getColorName(color) {
  const lang = (typeof getGameLang === 'function') ? getGameLang() : 'ko';
  if (lang === 'ko') return color.ko;
  if (lang === 'ja') return color.ja;
  if (lang === 'zh') return color.zh;
  if (lang === 'es') return color.es;
  return color.name;
}

function getRating(ms) {
  if (ms < 200) return T('ratingLightning');
  if (ms < 300) return T('ratingFast');
  if (ms < 400) return T('ratingAverage');
  return T('ratingSlow');
}

function getPercentile(ms) {
  // Approximate percentile based on typical human reaction times
  if (ms < 150) return 99;
  if (ms < 180) return 95;
  if (ms < 200) return 90;
  if (ms < 220) return 80;
  if (ms < 250) return 70;
  if (ms < 280) return 60;
  if (ms < 300) return 50;
  if (ms < 350) return 35;
  if (ms < 400) return 20;
  if (ms < 500) return 10;
  return 5;
}

function clearTimers() {
  if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
  if (colorChangeId) { clearInterval(colorChangeId); colorChangeId = null; }
}

function setTapZoneClass(cls) {

function updatePhaseDots() {

function updateRoundPips() {

}

function updateStats() {
  const phase = PHASES[currentPhase];
  $roundDisplay.textContent = `${currentRound + 1}/${phase.rounds}`;
  if (roundTimes.length > 0) {
    const avg = Math.round(roundTimes.reduce((a, b) => a + b, 0) / roundTimes.length);
    $avgDisplay.textContent = avg + 'ms';
  }
}

// ===== PHASE 1: SIMPLE REACTION =====
function startSimpleRound() {
  state = 'waiting';
  setTapZoneClass('ready');
  $tapText.textContent = T('waitForGreen');
  $tapSubtext.textContent = '';
  $colorTarget.style.display = 'none';
  $tapZone.innerHTML = '';
  appendTapContent();

  const delay = 1500 + Math.random() * 3000;
  timeoutId = setTimeout(() => {
    state = 'go';
    signalTime = performance.now();
    setTapZoneClass('go');
    $tapText.textContent = T('tapNow');
    Audio.go();
  }, delay);
}

function handleSimpleTap() {
  if (state === 'waiting') {
    // Too early!
    clearTimers();
    state = 'tooEarly';
    setTapZoneClass('too-early');
    $tapText.textContent = T('tooEarly');
    $tapSubtext.textContent = T('tapToRetry');
    Audio.buzz();
    return;
  }
  if (state === 'tooEarly') {
    startSimpleRound();
    return;
  }
  if (state === 'go') {
    const elapsed = Math.round(performance.now() - signalTime);
    roundTimes.push(elapsed);
    Audio.beep();
    state = 'result';
    setTapZoneClass('result');
    $tapZone.innerHTML = '';
    const timeEl = document.createElement('div');
    timeEl.className = 'tap-time';
    timeEl.textContent = elapsed;
    timeEl.style.cssText = 'animation:countPop .5s ease-out forwards;opacity:1;position:relative;' +
      'background:linear-gradient(135deg,#22c55e,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;';
    const msEl = document.createElement('div');
    msEl.className = 'tap-ms';
    msEl.textContent = 'ms';
    $tapZone.appendChild(timeEl);
    $tapZone.appendChild(msEl);
    currentRound++;
    updateRoundPips();
    updateStats();

    timeoutId = setTimeout(() => {
      if (currentRound >= PHASES[currentPhase].rounds) {
        finishPhase();
      } else {
        startSimpleRound();
      }
    }, 1200);
  }
}

// ===== PHASE 2: CHOICE REACTION =====
function startChoiceRound() {
  state = 'choiceWait';
  setTapZoneClass('choice-wait');
  $colorTarget.style.display = 'none';
  $tapZone.innerHTML = '';
  appendTapContent();
  $tapText.textContent = T('getReady');
  $tapSubtext.textContent = '';

  const delay = 1000 + Math.random() * 2000;
  timeoutId = setTimeout(() => {
    state = 'choiceGo';
    signalTime = performance.now();
    choiceDirection = ARROWS[Math.floor(Math.random() * ARROWS.length)];
    setTapZoneClass('choice-go');

    $tapZone.innerHTML = '';
    const arrowEl = document.createElement('div');
    arrowEl.className = 'arrow-display';
    arrowEl.textContent = ARROW_SYMBOLS[choiceDirection];
    $tapZone.appendChild(arrowEl);

    const subEl = document.createElement('div');
    subEl.className = 'tap-subtext';
    subEl.textContent = T('tapCorrectDir');
    $tapZone.appendChild(subEl);

    const choices = document.createElement('div');
    choices.className = 'arrow-choices';
    ARROWS.forEach(dir => {
      const btn = document.createElement('button');
      btn.className = 'arrow-btn';
      btn.textContent = ARROW_SYMBOLS[dir];
      btn.dataset.dir = dir;
      btn.addEventListener('click', (e) => { e.stopPropagation(); handleChoiceTap(dir, btn); });
      btn.addEventListener('touchstart', (e) => { e.stopPropagation(); });
      choices.appendChild(btn);
    });
    $tapZone.appendChild(choices);
    Audio.go();
  }, delay);
}

function handleChoiceTap(dir, btnEl) {
  if (state !== 'choiceGo') return;
  const elapsed = Math.round(performance.now() - signalTime);
  state = 'result';

  if (dir === choiceDirection) {
    btnEl.classList.add('correct');
    roundTimes.push(elapsed);
    Audio.beep();
  } else {
    btnEl.classList.add('wrong');
    // Find correct button and highlight it
    const btns = $tapZone.querySelectorAll('.arrow-btn');
    btns.forEach(b => { if (b.dataset.dir === choiceDirection) b.classList.add('correct'); });
    roundTimes.push(elapsed + 200); // penalty
    Audio.buzz();
  }

  currentRound++;
  updateRoundPips();
  updateStats();

  timeoutId = setTimeout(() => {
    if (currentRound >= PHASES[currentPhase].rounds) {
      finishPhase();
    } else {
      startChoiceRound();
    }
  }, 1200);
}

// ===== PHASE 3: COLOR REACTION =====
function startColorRound() {
  state = 'colorWait';
  // Pick target color
  targetColor = COLORS_LIST[Math.floor(Math.random() * COLORS_LIST.length)];
  $colorTarget.style.display = 'flex';
  $colorTargetSwatch.style.background = targetColor.hex;
  $colorTargetName.textContent = getColorName(targetColor);
  $colorTargetName.style.color = targetColor.hex;

  // Start with a random non-target color
  let startColor;
  do { startColor = COLORS_LIST[Math.floor(Math.random() * COLORS_LIST.length)]; } while (startColor === targetColor);
  currentDisplayColor = startColor;
  $tapZone.style.background = startColor.hex;
  setTapZoneClass('color-wait');
  $tapZone.style.background = `linear-gradient(135deg, ${startColor.hex}, ${adjustColor(startColor.hex, -30)})`;
  $tapZone.innerHTML = '';
  appendTapContent();
  $tapText.textContent = T('getReady');
  $tapSubtext.textContent = '';

  // Cycle colors, eventually show target
  const targetAppearance = 3 + Math.floor(Math.random() * 5); // show after 3-7 changes
  let changeCount = 0;

  colorChangeId = setInterval(() => {
    changeCount++;
    if (changeCount >= targetAppearance) {
      clearInterval(colorChangeId);
      colorChangeId = null;
      // Show target color
      currentDisplayColor = targetColor;
      state = 'colorGo';
      signalTime = performance.now();
      $tapZone.style.background = `linear-gradient(135deg, ${targetColor.hex}, ${adjustColor(targetColor.hex, -30)})`;
      $tapText.textContent = T('tapNow');
      Audio.go();
    } else {
      let nextColor;
      do { nextColor = COLORS_LIST[Math.floor(Math.random() * COLORS_LIST.length)]; } while (nextColor === targetColor || nextColor === currentDisplayColor);
      currentDisplayColor = nextColor;
      $tapZone.style.background = `linear-gradient(135deg, ${nextColor.hex}, ${adjustColor(nextColor.hex, -30)})`;
    }
  }, 800 + Math.random() * 600);
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, ((num >> 16) & 0xFF) + amount));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xFF) + amount));
  const b = Math.max(0, Math.min(255, (num & 0xFF) + amount));
  return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
}

function handleColorTap() {
  if (state === 'colorWait') {
    // Tapped on wrong color - too early / wrong
    clearTimers();
    state = 'tooEarly';
    $tapZone.style.background = '';
    setTapZoneClass('too-early');
    $tapText.textContent = T('tooEarly');
    $tapSubtext.textContent = T('tapToRetry');
    Audio.buzz();
    return;
  }
  if (state === 'tooEarly') {
    $tapZone.style.background = '';
    startColorRound();
    return;
  }
  if (state === 'colorGo') {
    const elapsed = Math.round(performance.now() - signalTime);
    roundTimes.push(elapsed);
    Audio.beep();
    state = 'result';
    $tapZone.style.background = '';
    setTapZoneClass('result');

    timeEl.style.cssText = 'background:linear-gradient(135deg,#22c55e,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;';
    const msEl = document.createElement('div');
    msEl.className = 'tap-ms';
    msEl.textContent = 'ms';
    $tapZone.appendChild(timeEl);
    $tapZone.appendChild(msEl);
    currentRound++;
    updateRoundPips();
    updateStats();

    timeoutId = setTimeout(() => {
      if (currentRound >= PHASES[currentPhase].rounds) {

      } else {

      }

  }

}

Object.defineProperty(window, '_tapText', { get() { return $tapZone.querySelector('.tap-text'); }});
Object.defineProperty(window, '_tapSubtext', { get() { return $tapZone.querySelector('.tap-subtext'); }});

// Simpler approach: just use $tapZone and manage inner content directly

function startGame() {
  Audio.init(); Audio.resume();
  currentPhase = 0;
  allPhaseTimes = [[], [], []];
  updatePhaseDots();
  startPhase();
}

function startPhase() {
  currentRound = 0;
  roundTimes = [];
  updatePhaseDots();
  updateRoundPips();
  $colorTarget.style.display = 'none';
  $tapZone.style.background = '';

  // Show phase name with countdown
  const phaseNames = [T('phase1'), T('phase2'), T('phase3')];
  setTapZoneClass('waiting');
  $tapZone.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'tap-text';
  title.textContent = phaseNames[currentPhase];
  title.style.fontSize = '22px';
  $tapZone.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'tap-subtext';
  const roundCounts = [5, 10, 5];
  sub.textContent = `${roundCounts[currentPhase]} ${T('round').toLowerCase()}s`;
  $tapZone.appendChild(sub);

  const cdEl = document.createElement('div');
  cdEl.className = 'countdown';
  $tapZone.appendChild(cdEl);

  state = 'countdown';
  $roundDisplay.textContent = `0/${PHASES[currentPhase].rounds}`;
  $avgDisplay.textContent = '-';

  timeoutId = setTimeout(() => {
    showCountdownInZone(cdEl, 3, () => {
      launchRound();
    });
  }, 800);
}

function showCountdownInZone(el, num, cb) {
  el.textContent = num;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  Audio.countdown();
  if (num > 1) {
    timeoutId = setTimeout(() => showCountdownInZone(el, num - 1, cb), 700);
  } else {
    timeoutId = setTimeout(() => { el.classList.remove('show'); cb(); }, 700);
  }
}

function launchRound() {
  updateRoundPips();
  updateStats();
  if (currentPhase === 0) startSimpleRound();
  else if (currentPhase === 1) startChoiceRound();
  else startColorRound();
}

function finishPhase() {
  clearTimers();
  const avg = roundTimes.length > 0 ? Math.round(roundTimes.reduce((a, b) => a + b, 0) / roundTimes.length) : 0;
  allPhaseTimes[currentPhase] = [...roundTimes];

  currentPhase++;
  if (currentPhase < 3) {
    Audio.success();
    startPhase();
  } else {
    showFinalResults();
  }
}

function showFinalResults() {
  state = 'finished';
  Audio.fanfare();

  // Calculate overall average
  const allTimes = allPhaseTimes.flat();
  const overallAvg = Math.round(allTimes.reduce((a, b) => a + b, 0) / allTimes.length);
  const rating = getRating(overallAvg);
  const pct = getPercentile(overallAvg);
  const isNewBest = bestAllTime === 0 || overallAvg < bestAllTime;

  if (isNewBest) {
    bestAllTime = overallAvg;
    localStorage.setItem('reactionTestBest', bestAllTime);
    $bestDisplay.textContent = bestAllTime + 'ms';
  }

  // Save to history
  history.push({ date: Date.now(), avg: overallAvg, rating: rating });
  if (history.length > 50) history = history.slice(-50);
  localStorage.setItem('reactionTestHistory', JSON.stringify(history));
  renderHistory();

  // Phase averages
  const phaseAvgs = allPhaseTimes.map(times =>
    times.length > 0 ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0
  );

  // Populate overlay
  document.getElementById('resultRating').textContent = rating;
  document.getElementById('resultAvg').textContent = overallAvg + 'ms';

  const breakdown = document.getElementById('resultBreakdown');
  breakdown.innerHTML = '';
  const phaseLabels = [T('simple'), T('choice'), T('color')];
  phaseAvgs.forEach((avg, i) => {
    const div = document.createElement('div');
    div.className = 'result-phase';
    div.innerHTML = `<div class="result-phase-label">${phaseLabels[i]}</div><div class="result-phase-value">${avg}ms</div>`;
    breakdown.appendChild(div);
  });

  const compText = T('fasterThan').replace('{pct}', pct);
  document.getElementById('resultComparison').textContent = compText;

  const bestText = isNewBest ? T('newBest') : T('bestRecord').replace('{ms}', bestAllTime);
  document.getElementById('resultBest').textContent = bestText;
  if (isNewBest) document.getElementById('resultBest').style.color = '#fbbf24';
  else document.getElementById('resultBest').style.color = '#a855f7';

  // Update phase dots to all done
  for (let i = 0; i < 3; i++) {
    document.getElementById('phase' + i).className = 'phase-dot done';
  }

  setTimeout(() => { $resultOverlay.classList.add('show'); }, 600);
}

// ===== EVENT HANDLERS =====
$tapZone.addEventListener('click', (e) => {
  Audio.init(); Audio.resume();

  if (state === 'idle') {
    startGame();
    return;
  }

  // Phase 1: simple
  if (currentPhase === 0 || (state === 'waiting' || state === 'go' || state === 'tooEarly')) {
    if (state === 'waiting' || state === 'go' || state === 'tooEarly') {
      handleSimpleTap();
      return;
    }
  }

  // Phase 3: color
  if (state === 'colorWait' || state === 'colorGo' || (state === 'tooEarly' && currentPhase === 2)) {
    handleColorTap();
    return;
  }

  // Phase 2: choice - tapping zone itself during wait is too early
  if (state === 'choiceWait') {
    clearTimers();
    state = 'tooEarly';
    setTapZoneClass('too-early');
    $tapZone.innerHTML = '';
    appendTapContent();
    const t = $tapZone.querySelector('.tap-text');
    const s = $tapZone.querySelector('.tap-subtext');
    if (t) t.textContent = T('tooEarly');
    if (s) s.textContent = T('tapToRetry');
    Audio.buzz();
    return;
  }
  if (state === 'tooEarly' && currentPhase === 1) {
    startChoiceRound();
    return;
  }
});

// Retry button
document.getElementById('btnRetry').addEventListener('click', () => {
  $resultOverlay.classList.remove('show');
  state = 'idle';
  currentPhase = 0;
  currentRound = 0;
  roundTimes = [];
  allPhaseTimes = [[], [], []];
  $colorTarget.style.display = 'none';
  $tapZone.style.background = '';
  setTapZoneClass('waiting');
  $tapZone.innerHTML = '';
  appendTapContent();
  const t = $tapZone.querySelector('.tap-text');
  if (t) t.textContent = T('tapToStart');
  $roundDisplay.textContent = '-';
  $avgDisplay.textContent = '-';
  $roundsRow.innerHTML = '';
  updatePhaseDots();
  setTimeout(() => startGame(), 300);
});

// Share button
document.getElementById('btnShare').addEventListener('click', () => {
  const allTimes = allPhaseTimes.flat();
  const overallAvg = Math.round(allTimes.reduce((a, b) => a + b, 0) / allTimes.length);
  if (typeof PuzzleShare !== 'undefined' && PuzzleShare.showShareModal) {
    PuzzleShare.showShareModal({
      game: T('title'),
      score: overallAvg + 'ms',
      rating: getRating(overallAvg)
    });
  } else {
    // Fallback: copy to clipboard
    const text = `${T('title')}: ${overallAvg}ms - ${getRating(overallAvg)}`;
    navigator.clipboard.writeText(text).catch(() => {});
  }
});

// Handle resize
window.addEventListener('resize', resizeSparkle);

// Prevent double-tap zoom on mobile
$tapZone.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });
$tapZone.addEventListener('touchstart', (e) => {
  // Trigger click manually for touch
  if (e.target.classList.contains('arrow-btn')) return; // let arrow buttons handle themselves
  e.preventDefault();
  $tapZone.click();
}, { passive: false });

// ===== INIT =====
setTapZoneClass('waiting');
$tapZone.innerHTML = '';
appendTapContent();
const initText = $tapZone.querySelector('.tap-text');
if (initText) initText.textContent = T('tapToStart');
updatePhaseDots();
if (bestAllTime > 0) $bestDisplay.textContent = bestAllTime + 'ms';
</script>
</body>
</html>
