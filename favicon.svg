<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gamepad body -->
  <rect x="116" y="196" width="280" height="160" rx="80" fill="white" opacity="0.95"/>
  <!-- D-pad vertical -->
  <rect x="182" y="232" width="36" height="96" rx="6" fill="url(#bg)"/>
  <!-- D-pad horizontal -->
  <rect x="170" y="256" width="60" height="36" rx="6" fill="url(#bg)"/>
  <!-- Buttons -->
  <circle cx="340" cy="260" r="16" fill="url(#bg)"/>
  <circle cx="372" cy="288" r="16" fill="url(#bg)"/>
  <circle cx="308" cy="288" r="16" fill="url(#bg)"/>
  <circle cx="340" cy="316" r="16" fill="url(#bg)"/>
  <!-- Joysticks -->
  <circle cx="200" cy="340" r="22" fill="url(#bg)" opacity="0.3"/>
  <circle cx="312" cy="340" r="22" fill="url(#bg)" opacity="0.3"/>
</svg>
