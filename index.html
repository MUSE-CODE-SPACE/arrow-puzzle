<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Puzzle 🏹</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a1a;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
  z-index: -1;
  animation: bgShift 8s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(30deg); }
}

/* Floating particles background */
.bg-particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  overflow: hidden;
}

.bg-particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: rgba(102, 126, 234, 0.3);
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.header {
  text-align: center;
  margin-bottom: 16px;
}

h1 {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  letter-spacing: -1px;
}

.subtitle {
  font-size: 0.9rem;
  color: #666;
  margin-top: 4px;
}

.info-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  font-size: 0.95rem;
  color: #888;
  background: rgba(255,255,255,0.03);
  padding: 10px 24px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
}

.info-item { display: flex; align-items: center; gap: 6px; }
.info-item .icon { font-size: 1.1rem; }
.info-item .val {
  color: #a855f7;
  font-weight: 700;
  font-size: 1.1rem;
  min-width: 20px;
  text-align: center;
}

.level-select {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.level-btn {
  width: 36px;
  height: 36px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #555;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.level-btn:hover {
  border-color: rgba(168, 85, 247, 0.4);
  color: #a855f7;
  background: rgba(168, 85, 247, 0.1);
  transform: translateY(-2px);
}

.level-btn.active {
  border-color: #a855f7;
  color: #fff;
  background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(168,85,247,0.3));
  box-shadow: 0 0 16px rgba(168, 85, 247, 0.3);
}

.level-btn.cleared {
  border-color: rgba(34, 197, 94, 0.4);
  color: #22c55e;
}

.level-btn.cleared::after {
  content: '✓';
  font-size: 0.6rem;
  position: absolute;
  margin-top: -14px;
  margin-left: 14px;
}

.level-btn { position: relative; }

#grid {
  display: grid;
  gap: 5px;
  padding: 16px;
  background: rgba(255,255,255,0.02);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow:
    0 0 60px rgba(102, 126, 234, 0.08),
    inset 0 0 60px rgba(0,0,0,0.3);
}

.cell {
  width: 68px;
  height: 68px;
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  border: 1px solid rgba(255,255,255,0.04);
}

.cell:not(.empty):hover {
  background: rgba(168, 85, 247, 0.15);
  border-color: rgba(168, 85, 247, 0.3);
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
}

.cell.empty { cursor: default; opacity: 0.4; }
.cell.empty:hover { transform: none; background: rgba(255,255,255,0.03); }

.arrow-icon {
  font-size: 1.8rem;
  filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.5));
  transition: transform 0.2s;
}

.cell:not(.empty):hover .arrow-icon {
  transform: scale(1.15);
}

/* Direction-specific colors */
.arrow-up { color: #22d3ee; filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.5)); }
.arrow-down { color: #f472b6; filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.5)); }
.arrow-left { color: #a78bfa; filter: drop-shadow(0 0 8px rgba(167, 139, 250, 0.5)); }
.arrow-right { color: #34d399; filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.5)); }

.cell.hit {
  animation: hitFlash 0.4s;
}

@keyframes hitFlash {
  0% { background: rgba(168, 85, 247, 0.5); transform: scale(1.1); }
  100% { background: rgba(255,255,255,0.03); transform: scale(1); }
}

.controls {
  margin-top: 20px;
  display: flex;
  gap: 12px;
}

button {
  padding: 12px 28px;
  font-size: 0.95rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  transition: all 0.15s;
}

.btn-restart {
  background: rgba(255,255,255,0.06);
  color: #aaa;
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-restart:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  transform: translateY(-2px);
}

.btn-next {
  background: linear-gradient(135deg, #667eea, #a855f7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
}

.btn-next:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4);
}

button:active { transform: scale(0.95) !important; }

#message {
  margin-top: 20px;
  font-size: 1.5rem;
  font-weight: 700;
  min-height: 2em;
  text-align: center;
}

.fly-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}

.flying-arrow {
  position: absolute;
  font-size: 2rem;
  z-index: 101;
  pointer-events: none;
}

.trail {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99;
  animation: trailFade 0.6s ease-out forwards;
}

@keyframes trailFade {
  0% { opacity: 0.8; transform: scale(1); }
  100% { opacity: 0; transform: scale(0); }
}

.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 102;
}

@keyframes particleBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

/* Win celebration */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  z-index: 200;
  pointer-events: none;
}

@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Combo text */
.combo-text {
  position: fixed;
  font-size: 1.5rem;
  font-weight: 800;
  pointer-events: none;
  z-index: 150;
  animation: comboFloat 1s ease-out forwards;
}

@keyframes comboFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
}

/* Responsive */
@media (max-width: 500px) {
  .cell { width: 54px; height: 54px; }
  .arrow-icon { font-size: 1.4rem; }
  h1 { font-size: 1.8rem; }
  #grid { padding: 10px; gap: 4px; }
}
</style>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>

<div class="header">
  <h1>Arrow Puzzle</h1>
  <div class="subtitle">화살표를 눌러 모든 화살을 날려보세요!</div>
</div>

<div class="info-bar">
  <div class="info-item"><span class="icon">📐</span> 레벨 <span class="val" id="levelNum">1</span></div>
  <div class="info-item"><span class="icon">🏹</span> 남은 <span class="val" id="remaining">0</span></div>
  <div class="info-item"><span class="icon">👆</span> 클릭 <span class="val" id="clicks">0</span></div>
  <div class="info-item"><span class="icon">⭐</span> 최소 <span class="val" id="minClicks">1</span></div>
</div>

<div class="level-select" id="levelSelect"></div>

<div id="grid"></div>

<div id="message"></div>

<div class="controls">
  <button class="btn-restart" onclick="restartLevel()">↩ 다시하기</button>
  <button class="btn-next" onclick="nextLevel()">다음 레벨 →</button>
</div>

<div class="fly-overlay" id="flyOverlay"></div>

<script>
// ===== SOUND ENGINE (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playShoot() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playHit(pitch = 1) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(400 * pitch, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800 * pitch, audioCtx.currentTime + 0.05);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playWin() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.4);
    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.4);
  });
}

function playClick() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.value = 300;
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

// ===== ARROW SYMBOLS (SVG-like with CSS) =====
const DIRS = {
  up:    { dr: -1, dc: 0,  symbol: '↑', cls: 'arrow-up',    color: '#22d3ee' },
  down:  { dr: 1,  dc: 0,  symbol: '↓', cls: 'arrow-down',  color: '#f472b6' },
  left:  { dr: 0,  dc: -1, symbol: '←', cls: 'arrow-left',  color: '#a78bfa' },
  right: { dr: 0,  dc: 1,  symbol: '→', cls: 'arrow-right', color: '#34d399' },
};

// ===== LEVELS =====
const LEVELS = [
  // 1: Tutorial
  { rows: 3, cols: 3, min: 1, grid: [
    [null,'down',null],
    [null,null,null],
    [null,'up',null],
  ]},
  // 2
  { rows: 3, cols: 3, min: 1, grid: [
    ['right',null,'down'],
    [null,null,null],
    [null,null,'left'],
  ]},
  // 3
  { rows: 4, cols: 4, min: 1, grid: [
    [null,'down',null,null],
    ['right',null,null,'down'],
    [null,null,null,null],
    [null,'right',null,'up'],
  ]},
  // 4
  { rows: 4, cols: 4, min: 1, grid: [
    ['down',null,null,'left'],
    [null,null,null,null],
    [null,null,null,null],
    ['right',null,null,'up'],
  ]},
  // 5
  { rows: 5, cols: 5, min: 1, grid: [
    [null,'down',null,null,null],
    [null,null,null,'left',null],
    ['right',null,null,null,'down'],
    [null,'right',null,null,null],
    [null,null,null,'up',null],
  ]},
  // 6
  { rows: 5, cols: 5, min: 1, grid: [
    ['right',null,'down',null,null],
    [null,null,null,null,'down'],
    [null,null,null,null,null],
    ['up',null,null,null,null],
    [null,null,'right',null,'up'],
  ]},
  // 7
  { rows: 5, cols: 5, min: 2, grid: [
    [null,'right',null,'down',null],
    ['down',null,null,null,'left'],
    [null,null,null,null,null],
    ['right',null,null,null,'up'],
    [null,'up',null,'left',null],
  ]},
  // 8
  { rows: 6, cols: 6, min: 1, grid: [
    [null,'down',null,null,null,null],
    [null,null,null,'left',null,null],
    ['right',null,null,null,null,'down'],
    [null,null,null,null,null,null],
    [null,null,'right',null,null,'up'],
    [null,'up',null,null,'left',null],
  ]},
  // 9
  { rows: 6, cols: 6, min: 2, grid: [
    ['right',null,'down',null,null,'down'],
    [null,null,null,null,null,null],
    [null,null,null,'left',null,null],
    [null,null,'right',null,null,null],
    [null,null,null,null,null,null],
    ['up',null,null,null,'right','up'],
  ]},
  // 10
  { rows: 6, cols: 6, min: 2, grid: [
    [null,'down',null,'right',null,'down'],
    ['right',null,null,null,null,null],
    [null,null,'down',null,'left',null],
    [null,'right',null,null,null,null],
    [null,null,null,'up',null,'up'],
    [null,'up',null,null,'left',null],
  ]},
  // 11
  { rows: 7, cols: 7, min: 2, grid: [
    [null,null,'down',null,'left',null,null],
    [null,null,null,null,null,null,'down'],
    ['right',null,null,null,null,null,null],
    [null,null,null,null,null,null,null],
    [null,null,null,null,null,null,'left'],
    ['up',null,null,null,null,null,null],
    [null,null,'right',null,'up',null,null],
  ]},
  // 12
  { rows: 7, cols: 7, min: 3, grid: [
    ['right',null,null,'down',null,null,'down'],
    [null,null,null,null,null,null,null],
    [null,null,'right',null,'down',null,null],
    [null,null,null,null,null,null,'left'],
    [null,null,'up',null,'left',null,null],
    [null,null,null,null,null,null,null],
    ['up',null,null,'right',null,null,'up'],
  ]},
];

let currentLevel = 0;
let gameGrid = [];
let rows = 0, cols = 0;
let clicks = 0;
let animating = false;
let hitCombo = 0;
let clearedLevels = new Set();

// Load progress
try {
  const saved = JSON.parse(localStorage.getItem('arrowPuzzleCleared') || '[]');
  clearedLevels = new Set(saved);
} catch(e) {}

function saveProgress() {
  localStorage.setItem('arrowPuzzleCleared', JSON.stringify([...clearedLevels]));
}

function deepCopy(grid) {
  return grid.map(row => [...row]);
}

// Background particles
function initBgParticles() {
  const container = document.getElementById('bgParticles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'bg-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }
}

function initLevelSelect() {
  const container = document.getElementById('levelSelect');
  container.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' +
      (i === currentLevel ? ' active' : '') +
      (clearedLevels.has(i) ? ' cleared' : '');
    btn.textContent = i + 1;
    btn.onclick = () => { currentLevel = i; loadLevel(); playClick(); };
    container.appendChild(btn);
  });
}

function loadLevel() {
  const level = LEVELS[currentLevel];
  rows = level.rows;
  cols = level.cols;
  gameGrid = deepCopy(level.grid);
  clicks = 0;
  animating = false;
  hitCombo = 0;
  document.getElementById('message').textContent = '';
  document.getElementById('clicks').textContent = '0';
  document.getElementById('levelNum').textContent = currentLevel + 1;
  document.getElementById('minClicks').textContent = level.min;
  initLevelSelect();
  renderGrid();
}

function countArrows() {
  let count = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (gameGrid[r][c]) count++;
  return count;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const cellSize = rows > 5 ? 58 : 68;
  grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  grid.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (gameGrid[r][c] ? '' : ' empty');
      cell.style.width = cell.style.height = cellSize + 'px';
      cell.dataset.row = r;
      cell.dataset.col = c;

      if (gameGrid[r][c]) {
        const dir = DIRS[gameGrid[r][c]];
        const arrow = document.createElement('span');
        arrow.className = 'arrow-icon ' + dir.cls;
        arrow.textContent = dir.symbol;
        arrow.id = `arrow-${r}-${c}`;
        cell.appendChild(arrow);
        cell.onclick = () => onCellClick(r, c);
      }

      cell.id = `cell-${r}-${c}`;
      grid.appendChild(cell);
    }
  }

  document.getElementById('remaining').textContent = countArrows();
}

function getCellCenter(r, c) {
  const cell = document.getElementById(`cell-${r}-${c}`);
  if (!cell) return null;
  const rect = cell.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function spawnParticles(x, y, color, count = 12) {
  const overlay = document.getElementById('flyOverlay');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 25 + Math.random() * 40;
    p.style.left = (x - 3) + 'px';
    p.style.top = (y - 3) + 'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 6px ${color}`;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.animation = `particleBurst 0.5s ease-out forwards`;
    overlay.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function spawnTrail(x, y, color) {
  const overlay = document.getElementById('flyOverlay');
  const t = document.createElement('div');
  t.className = 'trail';
  t.style.left = (x - 2) + 'px';
  t.style.top = (y - 2) + 'px';
  t.style.background = color;
  t.style.boxShadow = `0 0 4px ${color}`;
  overlay.appendChild(t);
  setTimeout(() => t.remove(), 600);
}

function showCombo(x, y, combo) {
  if (combo < 2) return;
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const colors = ['#22d3ee', '#a78bfa', '#f472b6', '#fbbf24', '#34d399'];
  el.style.color = colors[Math.min(combo - 2, colors.length - 1)];
  el.textContent = combo + 'x COMBO!';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnConfetti() {
  const colors = ['#667eea', '#a855f7', '#ec4899', '#22d3ee', '#34d399', '#fbbf24', '#f472b6'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = (5 + Math.random() * 8) + 'px';
    c.style.height = (5 + Math.random() * 8) + 'px';
    c.style.animation = `confettiFall ${1.5 + Math.random() * 2}s linear forwards`;
    c.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

async function onCellClick(r, c) {
  if (animating) return;
  if (!gameGrid[r][c]) return;

  animating = true;
  clicks++;
  hitCombo = 0;
  document.getElementById('clicks').textContent = clicks;

  playShoot();
  await fireArrow(r, c);

  animating = false;

  const remaining = countArrows();
  document.getElementById('remaining').textContent = remaining;

  if (remaining === 0) {
    clearedLevels.add(currentLevel);
    saveProgress();
    initLevelSelect();
    playWin();
    spawnConfetti();
    const level = LEVELS[currentLevel];
    const isPerfect = clicks <= level.min;
    document.getElementById('message').innerHTML =
      isPerfect
        ? '⭐ <span style="color:#fbbf24">퍼펙트!</span> ' + clicks + '번 만에 클리어!'
        : '🎉 클리어! ' + clicks + '번 클릭 (최소: ' + level.min + ')';
  }
}

async function fireArrow(startR, startC) {
  const dir = gameGrid[startR][startC];
  if (!dir) return;

  const { dr, dc, symbol, cls, color } = DIRS[dir];
  gameGrid[startR][startC] = null;

  hitCombo++;
  const startPos = getCellCenter(startR, startC);

  // Hide original
  const origCell = document.getElementById(`cell-${startR}-${startC}`);
  origCell.innerHTML = '';
  origCell.className = 'cell empty';

  // Spawn particles at start
  spawnParticles(startPos.x, startPos.y, color, 6);

  // Create flying arrow
  const overlay = document.getElementById('flyOverlay');
  const flyArrow = document.createElement('div');
  flyArrow.className = 'flying-arrow arrow-icon ' + cls;
  flyArrow.textContent = symbol;
  flyArrow.style.left = (startPos.x - 14) + 'px';
  flyArrow.style.top = (startPos.y - 14) + 'px';
  flyArrow.style.fontSize = '2rem';
  flyArrow.style.filter = `drop-shadow(0 0 12px ${color})`;
  overlay.appendChild(flyArrow);

  // Animate through grid
  const toFire = [];
  let cr = startR + dr, cc = startC + dc;

  // Trail interval
  let trailId = setInterval(() => {
    const curLeft = parseFloat(flyArrow.style.left) + 14;
    const curTop = parseFloat(flyArrow.style.top) + 14;
    spawnTrail(curLeft, curTop, color);
  }, 30);

  while (cr >= 0 && cr < rows && cc >= 0 && cc < cols) {
    if (gameGrid[cr][cc]) {
      const targetPos = getCellCenter(cr, cc);
      flyArrow.style.transition = 'left 0.18s ease-in, top 0.18s ease-in';
      flyArrow.style.left = (targetPos.x - 14) + 'px';
      flyArrow.style.top = (targetPos.y - 14) + 'px';
      await sleep(200);

      // Hit!
      hitCombo++;
      playHit(1 + (hitCombo - 1) * 0.15);
      const hitCell = document.getElementById(`cell-${cr}-${cc}`);
      hitCell.classList.add('hit');
      spawnParticles(targetPos.x, targetPos.y, DIRS[gameGrid[cr][cc]].color, 10);
      showCombo(targetPos.x - 30, targetPos.y - 40, hitCombo);

      toFire.push({ r: cr, c: cc });
      cr += dr;
      cc += dc;
    } else {
      cr += dr;
      cc += dc;
    }
  }

  clearInterval(trailId);

  // Fly off screen
  flyArrow.style.transition = 'left 0.25s ease-in, top 0.25s ease-in, opacity 0.25s';
  if (dc !== 0) flyArrow.style.left = (dc > 0 ? window.innerWidth + 50 : -50) + 'px';
  if (dr !== 0) flyArrow.style.top = (dr > 0 ? window.innerHeight + 50 : -50) + 'px';
  flyArrow.style.opacity = '0.3';

  await sleep(120);
  flyArrow.remove();

  // Chain reaction - fire all hit arrows
  const promises = toFire.map(({ r, c }) => fireArrow(r, c));
  await Promise.all(promises);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function restartLevel() {
  playClick();
  loadLevel();
}

function nextLevel() {
  playClick();
  if (currentLevel < LEVELS.length - 1) {
    currentLevel++;
  } else {
    currentLevel = 0;
  }
  loadLevel();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') restartLevel();
  if (e.key === 'ArrowRight') nextLevel();
  if (e.key === 'ArrowLeft' && currentLevel > 0) { currentLevel--; loadLevel(); }
});

// Init
initBgParticles();
loadLevel();
</script>
